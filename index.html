<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневник тренировок</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        html, body { height: 100%; }
        body {
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 16px 16px 100px 16px;
            display: flex;
            flex-direction: column;
        }
        #app { flex: 1; display: flex; flex-direction: column; }

        .card { background: var(--tg-theme-secondary-bg-color, #f5f5f5); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        input, button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; margin-bottom: 10px; }
        input { background: var(--tg-theme-secondary-bg-color, #f0f0f0); color: var(--tg-theme-text-color, #000); outline: none; }
        input:focus { outline: 2px solid var(--tg-theme-button-color, #007aff); }
        button { background: var(--tg-theme-button-color, #007aff); color: var(--tg-theme-button-text-color, #fff); font-weight: 600; cursor: pointer; }
        .btn-danger { background: #ff3b30; }
        .btn-success { background: #34c759; }
        .btn-warning { background: #ff9500; }
        .btn-secondary { background: var(--tg-theme-secondary-bg-color, #e5e5e5); color: var(--tg-theme-text-color, #000); }
        .row { display: flex; gap: 10px; }
        .row input { flex: 1; }
        .row button { width: auto; flex: 1; margin: 0; }

        .set-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 14px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-card { background: var(--tg-theme-secondary-bg-color, #f5f5f5); padding: 12px; border-radius: 10px; text-align: center; }
        .stat-card .num { font-size: 24px; font-weight: 700; color: var(--tg-theme-button-color, #007aff); }
        .stat-card .label { font-size: 12px; opacity: 0.6; }
        .hidden { display: none; }
        .tab-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-shrink: 0; }
        .tab-bar button { flex: 1; padding: 10px; background: var(--tg-theme-secondary-bg-color, #e5e5e5); color: var(--tg-theme-text-color, #000); border-radius: 10px; font-size: 14px; margin: 0; }
        .tab-bar button.active { background: var(--tg-theme-button-color, #007aff); color: #fff; }
        .content { flex: 1; overflow-y: auto; }

        .timer-bottom {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: auto;
            min-width: 140px;
            padding: 14px 24px;
            border-radius: 16px;
            background: var(--tg-theme-button-color, #007aff);
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: none;
            color: #fff;
            font-weight: 700;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .timer-bottom.running { background: #34c759; }
        .timer-bottom .time { font-size: 22px; font-variant-numeric: tabular-nums; letter-spacing: 0.5px; font-weight: 700; }
        .timer-bottom .ms { font-size: 16px; font-weight: 400; opacity: 0.8; letter-spacing: 0; }
        .timer-bottom .action { font-size: 15px; font-weight: 600; opacity: 0.95; background: rgba(255,255,255,0.2); padding: 4px 14px; border-radius: 20px; }
        .timer-bottom.running .action { background: rgba(255,255,255,0.25); }

        .sync-status { font-size: 12px; opacity: 0.6; text-align: center; padding: 4px; margin-top: 4px; }
        .sync-status.synced { color: #34c759; }
        .sync-status.syncing { color: #ff9500; }

        /* ===== НОВАЯ КАРТОЧКА УПРАЖНЕНИЯ ===== */
        .exercise-card .ex-header {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 8px;
        }
        .exercise-card .ex-header input {
            flex: 1;
            margin: 0;
        }
        .exercise-card .ex-header .ex-badge {
            background: var(--tg-theme-button-color, #007aff);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }
        .exercise-card .set-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .exercise-card .set-input-row input {
            width: 60px;
            padding: 10px 8px;
            font-size: 15px;
            margin: 0;
            flex-shrink: 0;
        }
        .exercise-card .set-input-row input.weight-input { width: 70px; }
        .exercise-card .set-input-row input.reps-input { width: 60px; }
        .exercise-card .set-input-row button {
            flex: 1;
            padding: 10px;
            font-size: 14px;
            margin: 0;
        }
        .exercise-card .sets-list {
            margin: 10px 0;
        }
        .exercise-card .sets-list .set-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 14px;
        }
        .exercise-card .sets-list .set-row .del-set-btn {
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 16px;
            cursor: pointer;
            padding: 0 6px;
            width: auto;
            margin: 0;
        }
        .exercise-card .ex-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .exercise-card .ex-actions button {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            margin: 0;
        }

        /* ===== ТЕКУЩАЯ ТРЕНИРОВКА (обновлённая) ===== */
        .workout-summary .ex-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .workout-summary .ex-summary .ex-name {
            font-weight: 600;
            font-size: 15px;
        }
        .workout-summary .ex-summary .ex-detail {
            font-size: 13px;
            opacity: 0.7;
            text-align: right;
        }
        .workout-summary .ex-summary .ex-detail .sets-count {
            font-weight: 600;
            opacity: 1;
        }

        /* ===== ИСТОРИЯ ===== */
        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.15s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .history-item:active {
            background: var(--tg-theme-secondary-bg-color, #e5e5e5);
        }
        .history-item .info {
            flex: 1;
            min-width: 0;
        }
        .history-item .title {
            font-weight: 600;
            font-size: 16px;
        }
        .history-item .sub {
            font-size: 13px;
            opacity: 0.6;
            margin-top: 2px;
        }
        .history-item .meta {
            font-size: 12px;
            opacity: 0.5;
            margin-top: 4px;
        }
        .history-item .delete-btn {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 59, 48, 0.15);
            border: none;
            color: #ff3b30;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            padding: 0;
            margin: 0;
        }
        .history-item .delete-btn:active {
            background: rgba(255, 59, 48, 0.3);
        }

        /* ===== МОДАЛЬНОЕ ОКНО ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.open { display: flex; }
        .modal-content {
            background: var(--tg-theme-bg-color, #fff);
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            border-radius: 20px 20px 0 0;
            padding: 24px 20px 30px;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        .modal-content .modal-handle {
            width: 40px;
            height: 4px;
            background: rgba(0,0,0,0.2);
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        .modal-content .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .modal-content .modal-date { font-size: 14px; opacity: 0.6; margin-bottom: 16px; }
        .modal-content .modal-ex {
            margin-bottom: 12px;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 10px;
        }
        .modal-content .modal-ex .modal-ex-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }
        .modal-content .modal-ex .modal-ex-set {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 14px;
            opacity: 0.8;
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        .modal-content .modal-ex .modal-ex-set:last-child { border-bottom: none; }
        .modal-content .modal-close {
            margin-top: 16px;
            background: var(--tg-theme-button-color, #007aff);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }
        .modal-content .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .modal-content .modal-actions button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .modal-content .modal-actions .btn-edit { background: #ff9500; color: #fff; }
        .modal-content .modal-actions .btn-delete { background: #ff3b30; color: #fff; }

        /* Режим редактирования в модалке */
        .modal-edit-ex {
            margin-bottom: 12px;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 10px;
        }
        .modal-edit-ex .modal-edit-ex-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 6px;
        }
        .modal-edit-ex .modal-edit-row {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 4px 0;
            flex-wrap: wrap;
        }
        .modal-edit-ex .modal-edit-row input {
            width: 55px;
            padding: 4px 6px;
            font-size: 14px;
            margin: 0;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.08);
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000);
        }
        .modal-edit-ex .modal-edit-row input.ex-name-input { width: 100px; }
        .modal-edit-ex .modal-edit-row .del-btn {
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            width: auto;
            margin: 0;
        }
        .modal-edit-add-btn {
            background: var(--tg-theme-button-color, #007aff);
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 4px;
        }
        .modal-edit-save-btn {
            background: #34c759;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }
        .modal-edit-cancel-btn {
            background: var(--tg-theme-secondary-bg-color, #e5e5e5);
            color: var(--tg-theme-text-color, #000);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="app">
        <div class="tab-bar">
            <button class="active" onclick="showTab('training')">🏋️ Тренировка</button>
            <button onclick="showTab('history')">📜 История</button>
            <button onclick="showTab('stats')">📊 Прогресс</button>
        </div>

        <div class="content" id="content">
            <!-- ВКЛАДКА ТРЕНИРОВКА -->
            <div id="tab-training">
                <!-- Карточка активного упражнения -->
                <div class="card exercise-card" id="exerciseCard">
                    <div class="ex-header">
                        <input id="ex-name-input" placeholder="Название упражнения" list="ex-list" autocomplete="off">
                        <datalist id="ex-list"></datalist>
                        <span class="ex-badge" id="setCounter">0 подходов</span>
                    </div>
                    <div class="sets-list" id="currentSetsList">
                        <p style="opacity:0.4; font-size:14px; padding:4px 0;">Нет подходов</p>
                    </div>
                    <div class="set-input-row">
                        <input type="number" class="weight-input" id="set-weight" placeholder="Вес">
                        <input type="number" class="reps-input" id="set-reps" placeholder="Повт.">
                        <button onclick="addSetToCurrentExercise()">➕ Добавить подход</button>
                    </div>
                    <div class="ex-actions">
                        <button class="btn-success" onclick="finishExercise()">✅ Закончить упражнение</button>
                        <button class="btn-danger" onclick="cancelExercise()">✕ Отменить</button>
                    </div>
                </div>

                <!-- Текущая тренировка -->
                <div class="card workout-summary">
                    <h3 style="margin-bottom:10px;">📋 Текущая тренировка</h3>
                    <div id="currentWorkoutList"><p style="opacity:0.5;">Пока ничего нет</p></div>
                    <button onclick="saveWorkout()" class="btn-success" style="margin-top:10px;">💾 Сохранить тренировку</button>
                    <div id="syncStatus" class="sync-status">☁️ Данные в облаке</div>
                </div>
            </div>

            <!-- ВКЛАДКА ИСТОРИЯ -->
            <div id="tab-history" class="hidden">
                <div id="historyList"></div>
            </div>

            <!-- ВКЛАДКА ПРОГРЕСС -->
            <div id="tab-stats" class="hidden">
                <div class="card">
                    <h3 style="margin-bottom:10px;">Прогресс</h3>
                    <input id="stats-ex" placeholder="Упражнение" list="ex-list">
                    <button onclick="showProgress()">📈 Показать</button>
                    <div id="stats-result" style="margin-top:12px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- СЕКУНДОМЕР -->
    <div class="timer-bottom" id="timerBtn" onclick="handleTimerClick()">
        <span class="time" id="timerDisplay">00:00<span class="ms">.00</span></span>
        <span class="action" id="timerAction">▶</span>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
        <div class="modal-content" id="modalContent">
            <div class="modal-handle"></div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ===== ОСНОВНЫЕ ДАННЫЕ =====
        let workouts = []; // [{ date, exercises: [{ name, sets: [{weight, reps}] }] }]
        let currentExercises = []; // [{ name, sets: [{weight, reps}] }]
        let activeExerciseIndex = -1; // индекс текущего редактируемого упражнения
        let allExercises = new Set();

        // ===== CLOUD STORAGE =====
        let cloudStorage = null;
        let isCloudReady = false;

        function initCloud() {
            if (window.Telegram && Telegram.WebApp) {
                cloudStorage = Telegram.WebApp.CloudStorage;
                isCloudReady = true;
            }
        }

        function saveToCloud(key, data) {
            return new Promise((resolve, reject) => {
                if (!isCloudReady || !cloudStorage) {
                    reject(new Error('CloudStorage недоступен'));
                    return;
                }
                try {
                    const json = JSON.stringify(data);
                    cloudStorage.setItem(key, json, (error, success) => {
                        if (error) reject(error);
                        else resolve(success);
                    });
                } catch (e) { reject(e); }
            });
        }

        function loadFromCloud(key) {
            return new Promise((resolve, reject) => {
                if (!isCloudReady || !cloudStorage) {
                    reject(new Error('CloudStorage недоступен'));
                    return;
                }
                cloudStorage.getItem(key, (error, value) => {
                    if (error) reject(error);
                    else {
                        try { resolve(value ? JSON.parse(value) : null); }
                        catch (e) { reject(e); }
                    }
                });
            });
        }

        // ===== СЕКУНДОМЕР =====
        let milliseconds = 0, seconds = 0, interval = null, isRunning = false, startTime = 0;
        const timerBtn = document.getElementById('timerBtn');
        const timerDisplay = document.getElementById('timerDisplay');

        function formatTime() {
            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            const ms = String(milliseconds).padStart(2, '0');
            return `${m}:${s}.<span class="ms">${ms}</span>`;
        }

        function updateTimerUI() {
            timerDisplay.innerHTML = formatTime();
            if (isRunning) {
                timerBtn.className = 'timer-bottom running';
                document.getElementById('timerAction').textContent = '⏹';
            } else {
                timerBtn.className = 'timer-bottom';
                document.getElementById('timerAction').textContent = '▶';
            }
        }

        function handleTimerClick() {
            if (isRunning) {
                clearInterval(interval);
                interval = null;
                isRunning = false;
                milliseconds = 0;
                seconds = 0;
                startTime = 0;
            } else {
                milliseconds = 0;
                seconds = 0;
                startTime = Date.now();
                isRunning = true;
                interval = setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    seconds = Math.floor(elapsed / 1000);
                    milliseconds = Math.floor((elapsed % 1000) / 10);
                    timerDisplay.innerHTML = formatTime();
                }, 20);
            }
            updateTimerUI();
        }

        // ===== РАБОТА С ДАННЫМИ =====
        function updateExerciseList() {
            const list = document.getElementById('ex-list');
            list.innerHTML = '';
            allExercises.forEach(ex => {
                const opt = document.createElement('option');
                opt.value = ex;
                list.appendChild(opt);
            });
        }

        async function loadData() {
            try {
                const saved = await loadFromCloud('workouts_v2');
                if (saved) {
                    workouts = saved;
                    workouts.forEach(w => {
                        w.exercises.forEach(ex => allExercises.add(ex.name));
                    });
                }
            } catch (e) {
                try {
                    const local = localStorage.getItem('workouts_backup_v2');
                    if (local) {
                        workouts = JSON.parse(local);
                        workouts.forEach(w => {
                            w.exercises.forEach(ex => allExercises.add(ex.name));
                        });
                    }
                } catch (e2) {}
            }
            updateExerciseList();
            renderHistory();
            renderCurrentWorkout();
        }

        async function syncToCloud() {
            const statusEl = document.getElementById('syncStatus');
            if (statusEl) {
                statusEl.textContent = '☁️ Синхронизация...';
                statusEl.className = 'sync-status syncing';
            }
            try {
                await saveToCloud('workouts_v2', workouts);
                localStorage.setItem('workouts_backup_v2', JSON.stringify(workouts));
                if (statusEl) {
                    statusEl.textContent = '✅ Сохранено в облаке';
                    statusEl.className = 'sync-status synced';
                }
            } catch (e) {
                localStorage.setItem('workouts_backup_v2', JSON.stringify(workouts));
                if (statusEl) {
                    statusEl.textContent = '⚠️ Сохранено локально';
                    statusEl.className = 'sync-status';
                }
            }
            if (statusEl) {
                setTimeout(() => {
                    statusEl.textContent = '☁️ Данные в облаке';
                    statusEl.className = 'sync-status';
                }, 3000);
            }
        }

        // ===== РАБОТА С ТЕКУЩИМ УПРАЖНЕНИЕМ =====
        function getActiveExercise() {
            if (activeExerciseIndex === -1) {
                // Создаём новое упражнение
                const name = document.getElementById('ex-name-input').value.trim();
                if (!name) {
                    alert('Введите название упражнения');
                    return null;
                }
                const newEx = { name, sets: [] };
                currentExercises.push(newEx);
                activeExerciseIndex = currentExercises.length - 1;
                allExercises.add(name);
                updateExerciseList();
                document.getElementById('ex-name-input').value = '';
            }
            return currentExercises[activeExerciseIndex];
        }

        function renderCurrentSets() {
            const div = document.getElementById('currentSetsList');
            const counter = document.getElementById('setCounter');
            if (activeExerciseIndex === -1 || currentExercises.length === 0 || activeExerciseIndex >= currentExercises.length) {
                div.innerHTML = '<p style="opacity:0.4; font-size:14px; padding:4px 0;">Нет подходов</p>';
                counter.textContent = '0 подходов';
                return;
            }
            const ex = currentExercises[activeExerciseIndex];
            if (!ex || ex.sets.length === 0) {
                div.innerHTML = '<p style="opacity:0.4; font-size:14px; padding:4px 0;">Нет подходов</p>';
                counter.textContent = '0 подходов';
                return;
            }
            counter.textContent = ex.sets.length + ' подходов';
            div.innerHTML = ex.sets.map((s, i) =>
                `<div class="set-row">
                    <span>Подход ${i+1}: ${s.weight}кг × ${s.reps}</span>
                    <button class="del-set-btn" onclick="removeSetFromCurrent(${i})">✕</button>
                </div>`
            ).join('');
        }

        function addSetToCurrentExercise() {
            const weight = parseFloat(document.getElementById('set-weight').value);
            const reps = parseInt(document.getElementById('set-reps').value);
            if (!weight || !reps || weight <= 0 || reps <= 0) {
                alert('Введите корректный вес и повторения');
                return;
            }
            let ex = getActiveExercise();
            if (!ex) return;
            ex.sets.push({ weight, reps });
            document.getElementById('set-weight').value = '';
            document.getElementById('set-reps').value = '';
            renderCurrentSets();
            renderCurrentWorkout();
        }

        function removeSetFromCurrent(index) {
            if (activeExerciseIndex === -1) return;
            const ex = currentExercises[activeExerciseIndex];
            if (!ex) return;
            ex.sets.splice(index, 1);
            if (ex.sets.length === 0) {
                // Если подходов не осталось, удаляем упражнение
                currentExercises.splice(activeExerciseIndex, 1);
                activeExerciseIndex = -1;
                document.getElementById('ex-name-input').value = '';
                renderCurrentSets();
                renderCurrentWorkout();
                return;
            }
            renderCurrentSets();
            renderCurrentWorkout();
        }

        function finishExercise() {
            if (activeExerciseIndex === -1) {
                alert('Нет активного упражнения. Добавьте подходы.');
                return;
            }
            const ex = currentExercises[activeExerciseIndex];
            if (!ex || ex.sets.length === 0) {
                alert('Добавьте хотя бы один подход перед завершением');
                return;
            }
            // Сбрасываем активное упражнение
            activeExerciseIndex = -1;
            document.getElementById('ex-name-input').value = '';
            document.getElementById('set-weight').value = '';
            document.getElementById('set-reps').value = '';
            renderCurrentSets();
            renderCurrentWorkout();
        }

        function cancelExercise() {
            if (activeExerciseIndex !== -1) {
                currentExercises.splice(activeExerciseIndex, 1);
                activeExerciseIndex = -1;
            }
            document.getElementById('ex-name-input').value = '';
            document.getElementById('set-weight').value = '';
            document.getElementById('set-reps').value = '';
            renderCurrentSets();
            renderCurrentWorkout();
        }

        // ===== ТЕКУЩАЯ ТРЕНИРОВКА =====
        function renderCurrentWorkout() {
            const div = document.getElementById('currentWorkoutList');
            if (currentExercises.length === 0) {
                div.innerHTML = '<p style="opacity:0.5;">Пока ничего нет</p>';
                return;
            }
            div.innerHTML = currentExercises.map((ex, idx) => {
                const totalSets = ex.sets.length;
                const totalWeight = ex.sets.reduce((sum, s) => sum + s.weight, 0);
                const avgWeight = totalSets > 0 ? Math.round(totalWeight / totalSets) : 0;
                const maxWeight = totalSets > 0 ? Math.max(...ex.sets.map(s => s.weight)) : 0;
                const minWeight = totalSets > 0 ? Math.min(...ex.sets.map(s => s.weight)) : 0;
                const weightRange = minWeight === maxWeight ? `${minWeight}кг` : `${minWeight}-${maxWeight}кг`;
                return `
                    <div class="ex-summary">
                        <span class="ex-name">${ex.name}</span>
                        <span class="ex-detail">
                            <span class="sets-count">${totalSets}</span> подходов · ${weightRange}
                        </span>
                    </div>
                `;
            }).join('');
        }

        async function saveWorkout() {
            if (currentExercises.length === 0) {
                alert('Нет упражнений для сохранения');
                return;
            }
            // Проверяем, есть ли незавершённое упражнение
            if (activeExerciseIndex !== -1) {
                const ex = currentExercises[activeExerciseIndex];
                if (ex && ex.sets.length > 0) {
                    if (!confirm(`Упражнение "${ex.name}" не завершено. Сохранить его как есть?`)) {
                        return;
                    }
                    activeExerciseIndex = -1;
                    document.getElementById('ex-name-input').value = '';
                    renderCurrentSets();
                }
            }
            const now = new Date();
            const date = now.toLocaleDateString('ru-RU') + ' ' + now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            // Сохраняем копию текущих упражнений
            const exercisesToSave = currentExercises.map(ex => ({
                name: ex.name,
                sets: ex.sets.map(s => ({ weight: s.weight, reps: s.reps }))
            }));
            workouts.push({ date, exercises: exercisesToSave });
            currentExercises = [];
            activeExerciseIndex = -1;
            renderCurrentWorkout();
            renderCurrentSets();
            renderHistory();
            await syncToCloud();
            alert('✅ Тренировка сохранена!');
        }

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function getDayName(dateStr) {
            const parts = dateStr.split(' ');
            const d = parts[0].split('.');
            const date = new Date(parseInt(d[2]), parseInt(d[1])-1, parseInt(d[0]));
            const days = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
            return days[date.getDay()];
        }

        function getExercisesCount(exercises) {
            return exercises.length;
        }

        function getTotalSets(exercises) {
            return exercises.reduce((sum, ex) => sum + ex.sets.length, 0);
        }

        // ===== ИСТОРИЯ =====
        function renderHistory() {
            const div = document.getElementById('historyList');
            if (workouts.length === 0) {
                div.innerHTML = '<div class="card"><p style="opacity:0.5;">История пуста</p></div>';
                return;
            }

            let html = '';
            workouts.slice().reverse().forEach((w, idx) => {
                const realIndex = workouts.length - 1 - idx;
                const dayName = getDayName(w.date);
                const exCount = getExercisesCount(w.exercises);
                const setCount = getTotalSets(w.exercises);

                html += `
                    <div class="history-item">
                        <div class="info" onclick="openModal(${realIndex})">
                            <div class="title">🏋️ Тренировка в ${dayName}</div>
                            <div class="sub">${w.date}</div>
                            <div class="meta">${exCount} упражнений · ${setCount} подходов</div>
                        </div>
                        <button class="delete-btn" onclick="deleteWorkout(${realIndex})">🗑️</button>
                    </div>
                `;
            });

            div.innerHTML = html;
        }

        // ===== МОДАЛЬНОЕ ОКНО =====
        let currentModalIndex = null;
        let isEditMode = false;

        function openModal(index) {
            currentModalIndex = index;
            isEditMode = false;
            const overlay = document.getElementById('modalOverlay');
            renderModalBody(index);
            overlay.classList.add('open');
        }

        function renderModalBody(index) {
            const body = document.getElementById('modalBody');
            const w = workouts[index];
            if (!w) return;

            let exercisesHtml = '';
            if (isEditMode) {
                // Режим редактирования
                w.exercises.forEach((ex, ei) => {
                    exercisesHtml += `
                        <div class="modal-edit-ex">
                            <div class="modal-edit-ex-name">${ex.name}</div>
                            ${ex.sets.map((s, si) => `
                                <div class="modal-edit-row">
                                    <input type="text" class="edit-ex-name" value="${ex.name}" data-ex="${ei}" data-set="${si}" style="width:80px;">
                                    <input type="number" class="edit-weight" value="${s.weight}" data-ex="${ei}" data-set="${si}" style="width:50px;">
                                    <span>×</span>
                                    <input type="number" class="edit-reps" value="${s.reps}" data-ex="${ei}" data-set="${si}" style="width:50px;">
                                    <button class="del-btn" onclick="deleteSetFromModal(${index}, ${ei}, ${si})">✕</button>
                                </div>
                            `).join('')}
                            <button class="modal-edit-add-btn" onclick="addSetToExerciseInModal(${index}, ${ei})">➕ Добавить подход</button>
                        </div>
                    `;
                });
                body.innerHTML = `
                    <div class="modal-title">✏️ Редактирование</div>
                    <div class="modal-date">${w.date}</div>
                    ${exercisesHtml}
                    <button class="modal-edit-save-btn" onclick="saveEditModal(${index})">💾 Сохранить изменения</button>
                    <button class="modal-edit-cancel-btn" onclick="switchToViewMode(${index})">↩ Отмена</button>
                    <button class="modal-close" onclick="closeModal()">Закрыть</button>
                `;
            } else {
                // Режим просмотра
                w.exercises.forEach(ex => {
                    exercisesHtml += `
                        <div class="modal-ex">
                            <div class="modal-ex-name">${ex.name}</div>
                            ${ex.sets.map(s => `
                                <div class="modal-ex-set">
                                    <span>${s.weight}кг × ${s.reps}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                });
                body.innerHTML = `
                    <div class="modal-title">🏋️ Тренировка в ${getDayName(w.date)}</div>
                    <div class="modal-date">${w.date}</div>
                    ${exercisesHtml}
                    <div class="modal-actions">
                        <button class="btn-edit" onclick="switchToEditMode(${index})">✏️ Редактировать</button>
                        <button class="btn-delete" onclick="deleteWorkout(${index}); closeModal();">🗑️ Удалить</button>
                    </div>
                    <button class="modal-close" onclick="closeModal()">Закрыть</button>
                `;
            }
        }

        function switchToEditMode(index) {
            isEditMode = true;
            renderModalBody(index);
        }

        function switchToViewMode(index) {
            isEditMode = false;
            renderModalBody(index);
        }

        function addSetToExerciseInModal(workoutIdx, exIdx) {
            if (workouts[workoutIdx] && workouts[workoutIdx].exercises[exIdx]) {
                workouts[workoutIdx].exercises[exIdx].sets.push({ weight: 0, reps: 0 });
                renderModalBody(workoutIdx);
            }
        }

        function deleteSetFromModal(workoutIdx, exIdx, setIdx) {
            if (workouts[workoutIdx] && workouts[workoutIdx].exercises[exIdx]) {
                workouts[workoutIdx].exercises[exIdx].sets.splice(setIdx, 1);
                if (workouts[workoutIdx].exercises[exIdx].sets.length === 0) {
                    workouts[workoutIdx].exercises.splice(exIdx, 1);
                }
                if (workouts[workoutIdx].exercises.length === 0) {
                    workouts.splice(workoutIdx, 1);
                    closeModal();
                    renderHistory();
                    syncToCloud();
                    return;
                }
                renderModalBody(workoutIdx);
                renderHistory();
                syncToCloud();
            }
        }

        function saveEditModal(index) {
            const body = document.getElementById('modalBody');
            const exNameInputs = body.querySelectorAll('.edit-ex-name');
            const weightInputs = body.querySelectorAll('.edit-weight');
            const repInputs = body.querySelectorAll('.edit-reps');

            // Группируем по упражнению
            const exMap = {};
            exNameInputs.forEach((el, i) => {
                const exName = el.value.trim();
                const weight = parseFloat(weightInputs[i].value);
                const reps = parseInt(repInputs[i].value);
                if (!exName || !weight || !reps || weight <= 0 || reps <= 0) return;
                if (!exMap[exName]) exMap[exName] = [];
                exMap[exName].push({ weight, reps });
                allExercises.add(exName);
            });

            const newExercises = Object.keys(exMap).map(name => ({
                name: name,
                sets: exMap[name]
            }));

            if (newExercises.length === 0) {
                alert('Заполните все поля корректно');
                return;
            }

            workouts[index].exercises = newExercises;
            updateExerciseList();
            renderHistory();
            syncToCloud();
            isEditMode = false;
            renderModalBody(index);
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
            currentModalIndex = null;
            isEditMode = false;
        }

        function closeModalOutside(e) {
            if (e.target === document.getElementById('modalOverlay')) {
                closeModal();
            }
        }

        // ===== УДАЛЕНИЕ ТРЕНИРОВКИ =====
        function deleteWorkout(index) {
            if (confirm('Удалить эту тренировку?')) {
                workouts.splice(index, 1);
                renderHistory();
                syncToCloud();
                if (document.getElementById('modalOverlay').classList.contains('open')) {
                    closeModal();
                }
            }
        }

        // ===== ПРОГРЕСС =====
        function showProgress() {
            const exName = document.getElementById('stats-ex').value.trim();
            const div = document.getElementById('stats-result');
            if (!exName) { div.innerHTML = 'Введите упражнение'; return; }
            const entries = [];
            workouts.forEach(w => {
                w.exercises.forEach(ex => {
                    if (ex.name === exName) {
                        ex.sets.forEach(s => {
                            entries.push({ date: w.date, weight: s.weight, reps: s.reps });
                        });
                    }
                });
            });
            if (entries.length === 0) { div.innerHTML = 'Нет данных'; return; }
            const maxWeight = Math.max(...entries.map(e => e.weight));
            const maxReps = Math.max(...entries.map(e => e.reps));
            div.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="num">${entries.length}</div><div class="label">Подходов</div></div>
                    <div class="stat-card"><div class="num">${maxWeight}кг</div><div class="label">Макс вес</div></div>
                    <div class="stat-card"><div class="num">${maxReps}</div><div class="label">Макс повторы</div></div>
                    <div class="stat-card"><div class="num">${entries[entries.length-1].weight}×${entries[entries.length-1].reps}</div><div class="label">Последний</div></div>
                </div>
                <div style="margin-top:10px;font-size:12px;opacity:0.6;">${entries.map(e => `${e.weight}×${e.reps}`).join(' → ')}</div>
            `;
        }

        // ===== ВКЛАДКИ =====
        function showTab(tab) {
            document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-bar button:nth-child(${tab === 'training' ? 1 : tab === 'history' ? 2 : 3})`).classList.add('active');
            document.getElementById('tab-training').classList.toggle('hidden', tab !== 'training');
            document.getElementById('tab-history').classList.toggle('hidden', tab !== 'history');
            document.getElementById('tab-stats').classList.toggle('hidden', tab !== 'stats');
            if (tab === 'history') renderHistory();
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        function initApp() {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
                initCloud();
                loadData();
                updateTimerUI();
            } else {
                setTimeout(initApp, 500);
            }
        }

        initApp();

        // При вводе названия упражнения — обновляем активное упражнение
        document.getElementById('ex-name-input').addEventListener('input', function() {
            // Если есть активное упражнение, но имя изменилось — обновляем
            if (activeExerciseIndex !== -1 && currentExercises[activeExerciseIndex]) {
                const newName = this.value.trim();
                if (newName) {
                    currentExercises[activeExerciseIndex].name = newName;
                    allExercises.add(newName);
                    updateExerciseList();
                    renderCurrentWorkout();
                }
            }
        });

        // Автозаполнение названия из истории при вводе
        document.getElementById('ex-name-input').addEventListener('focus', function() {
            if (activeExerciseIndex === -1) {
                // Просто показываем список
            }
        });
    </script>
</body>
</html>
