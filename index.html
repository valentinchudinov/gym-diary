<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Святилище ТРЕНЕРА</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #070707;
      --surface: rgba(255,255,255,.055);
      --surface-2: rgba(255,255,255,.075);
      --field: #171717;
      --line: rgba(255,255,255,.09);
      --line-strong: rgba(255,255,255,.13);
      --text: #fff;
      --muted: rgba(255,255,255,.58);
      --muted-strong: rgba(255,255,255,.72);
      --accent: #ff6418;
      --accent-soft: rgba(255,100,24,.10);
      --accent-line: rgba(255,100,24,.24);
      --danger: #ef4444;
      --danger-soft: rgba(255,70,70,.12);
      --danger-line: rgba(255,90,90,.28);
      --danger-text: #ff8a8a;
      --radius: 18px;
      --radius-lg: 26px;
      --shadow: 0 18px 40px rgba(0,0,0,.18);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      background:
        radial-gradient(circle at 80% 0%, rgba(255,100,24,.18), transparent 36%),
        linear-gradient(180deg, #12100f 0%, var(--bg) 46%);
      color: var(--text);
      padding: max(14px, var(--safe-top)) 14px calc(28px + var(--safe-bottom));
      font-size: 15px;
    }

    button,
    input,
    select {
      font: inherit;
      color: inherit;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 750;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:disabled {
      opacity: .42;
      cursor: default;
    }

    input,
    select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: var(--field);
      color: #fff;
      outline: none;
    }

    input::placeholder {
      color: rgba(255,255,255,.38);
    }

    input:focus,
    select:focus {
      border-color: rgba(255,100,24,.75);
      box-shadow: 0 0 0 3px rgba(255,100,24,.13);
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 28px;
      line-height: 1.08;
      font-weight: 850;
    }

    .sheet .title {
      margin-bottom: 22px;
    }

    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .section {
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .card {
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 13px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
    }

    .empty,
    .progress-empty {
      padding: 22px 12px;
      text-align: center;
      color: var(--muted);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      align-items: end;
      background: #050505;
      overflow: hidden;
      transition: opacity .35s ease, visibility .35s ease;
    }

    .splash.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.02);
      filter: saturate(.98) brightness(.86) contrast(1.02);
    }

    .splash::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.18) 38%, rgba(0,0,0,.92));
    }

    .splash-content {
      position: relative;
      z-index: 2;
      padding: 28px 22px calc(34px + var(--safe-bottom));
    }

    .splash-title {
      max-width: 360px;
      font-size: 42px;
      line-height: 1.05;
      font-weight: 850;
    }

    .splash-title span {
      color: var(--accent);
    }

    .splash-sub {
      margin-top: 12px;
      max-width: 310px;
      color: rgba(255,255,255,.72);
      line-height: 1.45;
    }

    .loader {
      width: 100%;
      height: 5px;
      margin-top: 24px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      overflow: hidden;
    }

    .loader i {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      animation: load 1.5s ease-in-out infinite;
    }

    @keyframes load {
      0% {
        transform: translateX(-120%);
      }

      100% {
        transform: translateX(260%);
      }
    }

    .tabs-shell {
      width: 100%;
      padding: 7px;
      margin-bottom: 16px;
      border-radius: var(--radius-lg);
      background:
        linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.055)),
        rgba(255,255,255,.075);
      border: 1px solid var(--line-strong);
      box-shadow:
        0 18px 40px rgba(0,0,0,.24),
        inset 0 1px 0 rgba(255,255,255,.08);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .tab {
      min-height: 50px;
      border-radius: var(--radius);
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.08);
      color: rgba(255,255,255,.72);
      box-shadow: none;
      font-size: 14px;
      font-weight: 750;
    }

    .tab.active {
      color: var(--accent);
      background: rgba(255,100,24,.14);
      border-color: rgba(255,100,24,.32);
    }

    .tab:active {
      background: rgba(255,255,255,.08);
    }

    .tab.active:active {
      background: rgba(255,100,24,.2);
    }

    .form-stack,
    .modal-form {
      display: grid;
      gap: 9px;
    }

    .form-numbers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    .row > * {
      flex: 1;
    }

    #formHint {
      text-align: center;
    }

    .btn-card {
      min-height: 54px;
      padding: 0 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: none;
      font-weight: 750;
    }

    .btn-muted,
    .ghost {
      color: #fff;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
    }

    .btn-accent {
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid var(--accent-line);
    }

    .btn-danger,
    .danger {
      color: var(--danger-text);
      background: var(--danger-soft);
      border: 1px solid var(--danger-line);
    }

    .btn-muted:active,
    .ghost:active {
      background: rgba(255,255,255,.09);
    }

    .btn-accent:active {
      background: rgba(255,100,24,.16);
    }

    .btn-danger:active,
    .danger:active {
      background: rgba(255,70,70,.18);
    }

    .icon-square {
      width: 54px;
      min-width: 54px;
      padding: 0;
      font-size: 18px;
    }

    #repeatSetBtn,
    #addSetBtn {
      min-height: 54px;
      border-radius: var(--radius);
      box-shadow: none;
    }

    #repeatSetBtn {
      color: #fff;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
    }

    #addSetBtn {
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid var(--accent-line);
    }

    .fallback-finish {
      display: none;
      width: 100%;
      margin-top: 10px;
    }

    .exercise {
      padding: 16px 0;
      border-bottom: 1px solid var(--line);
    }

    .exercise:last-child {
      border-bottom: 0;
    }

    .exercise-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }

    .exercise-name {
      font-size: 16px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .set-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      min-height: 46px;
    }

    .set-value {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 54px;
      padding: 14px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      color: #fff;
      font-weight: 700;
    }

    #draftList .set-row {
      grid-template-columns: 1fr 54px 54px;
      align-items: stretch;
      min-height: 54px;
      margin-bottom: 9px;
    }

    #draftList .set-row:last-child {
      margin-bottom: 0;
    }

    .history-group {
      margin-bottom: 18px;
    }

    .history-month-title {
      margin: 18px 2px 10px;
      font-size: 15px;
      font-weight: 850;
      color: rgba(255,255,255,.78);
    }

    .history-row {
      display: grid;
      grid-template-columns: 1fr 54px 54px;
      gap: 8px;
      align-items: stretch;
      margin-bottom: 9px;
    }

    .history-item {
      width: 100%;
      min-height: 54px;
      text-align: left;
      display: block;
      background: var(--surface);
      color: #fff;
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .history-title {
      font-weight: 820;
      font-size: 17px;
      margin-bottom: 4px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 10px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 13px;
    }

    .stat-num {
      font-size: 23px;
      font-weight: 850;
      color: var(--accent);
      overflow-wrap: anywhere;
    }

    .progress-chart {
      width: 100%;
      height: 190px;
      margin-top: 14px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .progress-chart svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .chart-label {
      margin-top: 8px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + var(--safe-bottom));
      transform: translateX(-50%);
      max-width: calc(100vw - 28px);
      padding: 11px 15px;
      border-radius: 999px;
      background: rgba(20,20,20,.92);
      border: 1px solid var(--line);
      color: #fff;
      font-size: 14px;
      z-index: 40;
      display: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.64);
      display: none;
      align-items: flex-end;
      z-index: 30;
      backdrop-filter: blur(8px);
    }

    .modal.open {
      display: flex;
    }

    .sheet {
      width: 100%;
      max-width: 560px;
      max-height: 88vh;
      margin: 0 auto;
      overflow: auto;
      background: #0b0b0b;
      border: 1px solid var(--line);
      border-radius: 24px 24px 0 0;
      padding: 18px 14px calc(28px + var(--safe-bottom));
    }

    .handle {
      width: 42px;
      height: 4px;
      border-radius: 4px;
      background: rgba(255,255,255,.22);
      margin: 0 auto 16px;
    }

    .sheet-actions {
      position: sticky;
      bottom: -14px;
      padding-top: 12px;
      margin-top: 12px;
      background: linear-gradient(180deg, transparent, rgba(11,11,11,.95) 44%, #0b0b0b 90%);
    }

    .sheet-actions .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .sheet-actions button {
      min-height: 54px;
      border-radius: var(--radius);
      box-shadow: none;
    }

    .modal-set-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 40px;
      padding: 8px 0;
    }

    .edit-exercise-group {
      margin-top: 14px;
      padding-top: 2px;
    }

    .edit-group-title {
      font-size: 15px;
      font-weight: 850;
      color: rgba(255,255,255,.86);
      margin: 0 2px 8px;
      overflow-wrap: anywhere;
    }

    .edit-set-card {
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 14px;
      background: rgba(255,255,255,.045);
      box-shadow: none;
    }

    .edit-set-head {
      display: grid;
      grid-template-columns: 1fr 54px;
      gap: 8px;
      align-items: stretch;
      margin-bottom: 8px;
    }

    .remove-anim {
      transition: opacity .18s ease, transform .18s ease;
      opacity: 0;
      transform: translateY(-6px) scale(.98);
    }

    .top,
    .tabs-shell,
    .section,
    .card,
    .history-group,
    .stat,
    .progress-chart {
      animation: softIn .24s ease both;
    }

    .panel.active {
      animation: panelIn .18s ease both;
    }

    .exercise,
    .set-row,
    .history-row,
    .edit-set-card {
      animation: itemIn .18s ease both;
    }

    button,
    .history-item,
    .set-value,
    input,
    select {
      transition:
        transform .14s ease,
        background-color .16s ease,
        border-color .16s ease,
        box-shadow .16s ease,
        opacity .16s ease;
    }

    button:active,
    .history-item:active {
      transform: scale(.975);
    }

    input:focus,
    select:focus {
      transform: translateY(-1px);
    }

    .toast.show {
      animation: toastIn .18s ease both;
    }

    .modal.open {
      animation: fadeIn .16s ease both;
    }

    .modal.open .sheet {
      animation: sheetIn .22s ease both;
    }

    @keyframes softIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes panelIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes itemIn {
      from {
        opacity: 0;
        transform: translateY(6px) scale(.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translate(-50%, 8px);
      }

      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes sheetIn {
      from {
        opacity: 0;
        transform: translateY(22px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="splash" id="splash">
    <img class="splash-img" src="loading.jpg" alt="Загрузка" />
    <div class="splash-content">
      <div class="splash-title">Святилище<br><span>ТРЕНЕРА</span></div>
      <div class="splash-sub">всем привет сегодня трена</div>
      <div class="loader"><i></i></div>
    </div>
  </div>

  <div class="app">
    <header class="top">
      <div>
        <div class="title" id="screenTitle">Трена</div>
        <div class="meta" id="screenMeta">Загрузка данных</div>
      </div>
    </header>

    <div class="tabs-shell">
      <nav class="tabs">
        <button class="tab active" data-tab="today">Трена</button>
        <button class="tab" data-tab="history">История</button>
        <button class="tab" data-tab="progress">Прогресс</button>
      </nav>
    </div>

    <main>
      <section class="panel active" id="todayPanel">
        <section class="section">
          <div class="section-title">Добавить подход</div>

          <div class="card">
            <div class="form-stack">
              <input id="exerciseInput" placeholder="Упражнение" list="exerciseList" autocomplete="off" />

              <div class="form-numbers">
                <input id="weightInput" placeholder="кг" inputmode="decimal" />
                <input id="repsInput" placeholder="Повторений" inputmode="numeric" />
              </div>

              <datalist id="exerciseList"></datalist>

              <div class="row">
                <button id="repeatSetBtn" disabled>Такой же</button>
                <button id="addSetBtn" disabled>Добавить</button>
              </div>

              <div class="muted" id="formHint">Выбери упражнение, вес и повторы</div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-title">Текущая тренировка</div>
          <div class="card" id="draftList"></div>
          <button id="fallbackFinishBtn" class="fallback-finish btn-card btn-accent">Завершить тренировку</button>
        </section>
      </section>

      <section class="panel" id="historyPanel">
        <div id="historyList"></div>
      </section>

      <section class="panel" id="progressPanel">
        <div class="card">
          <select id="progressSelect"></select>
          <div id="progressResult"></div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal" id="modal">
    <div class="sheet">
      <div class="handle"></div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const CONFIG = {
        storageKey: "workouts_v4",
        draftKey: "draft_workout_v4",
        localDataKey: "trainer_data_v1",
        cloudBaseKey: "trainer_data_v1",
        cloudChunkSize: 3500,
        splashDelay: 4000,
        toastDelay: 2200
      };

      const tg = window.Telegram && window.Telegram.WebApp
        ? window.Telegram.WebApp
        : null;

      const state = {
        tab: "today",
        workouts: [],
        draft: createDraft(),
        exercises: new Set(),
        syncing: false
      };

      const el = {
        splash: document.getElementById("splash"),
        screenTitle: document.getElementById("screenTitle"),
        screenMeta: document.getElementById("screenMeta"),

        tabs: [...document.querySelectorAll(".tab")],
        panels: {
          today: document.getElementById("todayPanel"),
          history: document.getElementById("historyPanel"),
          progress: document.getElementById("progressPanel")
        },

        exerciseInput: document.getElementById("exerciseInput"),
        weightInput: document.getElementById("weightInput"),
        repsInput: document.getElementById("repsInput"),
        exerciseList: document.getElementById("exerciseList"),
        addSetBtn: document.getElementById("addSetBtn"),
        repeatSetBtn: document.getElementById("repeatSetBtn"),
        formHint: document.getElementById("formHint"),

        draftList: document.getElementById("draftList"),
        fallbackFinishBtn: document.getElementById("fallbackFinishBtn"),

        historyList: document.getElementById("historyList"),

        progressSelect: document.getElementById("progressSelect"),
        progressResult: document.getElementById("progressResult"),

        toast: document.getElementById("toast"),
        modal: document.getElementById("modal"),
        modalBody: document.getElementById("modalBody")
      };

      function id() {
        if (window.crypto && window.crypto.randomUUID) {
          return window.crypto.randomUUID();
        }

        return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function createDraft() {
        return {
          id: id(),
          status: "draft",
          createdAt: new Date().toISOString(),
          exercises: []
        };
      }

      function text(node, value) {
        if (!node) return;
        node.textContent = value == null ? "" : String(value);
      }

      function make(tag, className, content) {
        const node = document.createElement(tag);

        if (className) {
          node.className = className;
        }

        if (content !== undefined) {
          text(node, content);
        }

        return node;
      }

      function sameName(a, b) {
        return String(a || "").trim().toLowerCase() === String(b || "").trim().toLowerCase();
      }

      function normalizeNumber(value) {
        return Number(String(value).trim().replace(",", "."));
      }

      function parseSetInput(weightValue, repsValue) {
        const weight = normalizeNumber(weightValue);
        const reps = Number(String(repsValue).trim());

        if (!Number.isFinite(weight) || weight < 0) return null;
        if (!Number.isInteger(reps) || reps <= 0) return null;

        return { weight, reps };
      }

      function safeJsonParse(value, fallback = null) {
        try {
          return value ? JSON.parse(value) : fallback;
        } catch {
          return fallback;
        }
      }

      function safeStorageGet(key) {
        try {
          return localStorage.getItem(key);
        } catch {
          return null;
        }
      }

      function safeStorageSet(key, value) {
        try {
          localStorage.setItem(key, value);
          return true;
        } catch {
          toast("Не удалось сохранить данные");
          return false;
        }
      }

      function isCloudAvailable() {
        return Boolean(tg && tg.CloudStorage);
      }

      function cloudGetItem(key) {
        return new Promise(resolve => {
          if (!isCloudAvailable()) {
            resolve(null);
            return;
          }

          tg.CloudStorage.getItem(key, (error, value) => {
            if (error) {
              console.warn("CloudStorage getItem error:", error);
              resolve(null);
              return;
            }

            resolve(value || null);
          });
        });
      }

      function cloudSetItem(key, value) {
        return new Promise(resolve => {
          if (!isCloudAvailable()) {
            resolve(false);
            return;
          }

          tg.CloudStorage.setItem(key, value, error => {
            if (error) {
              console.warn("CloudStorage setItem error:", error);
              resolve(false);
              return;
            }

            resolve(true);
          });
        });
      }

      function cloudRemoveItem(key) {
        return new Promise(resolve => {
          if (!isCloudAvailable()) {
            resolve(false);
            return;
          }

          tg.CloudStorage.removeItem(key, error => {
            if (error) {
              console.warn("CloudStorage removeItem error:", error);
              resolve(false);
              return;
            }

            resolve(true);
          });
        });
      }

      function cloudMetaKey() {
        return `${CONFIG.cloudBaseKey}_meta`;
      }

      function cloudChunkKey(index) {
        return `${CONFIG.cloudBaseKey}_${index}`;
      }

      async function readCloudSnapshot() {
        const meta = safeJsonParse(await cloudGetItem(cloudMetaKey()), null);

        if (!meta || !Number.isInteger(meta.chunks) || meta.chunks <= 0) {
          return null;
        }

        const parts = [];

        for (let index = 0; index < meta.chunks; index += 1) {
          const part = await cloudGetItem(cloudChunkKey(index));
          if (part == null) return null;
          parts.push(part);
        }

        const snapshot = safeJsonParse(parts.join(""), null);

        if (!snapshot || !Array.isArray(snapshot.workouts) || !snapshot.draft) {
          return null;
        }

        return snapshot;
      }

      async function writeCloudSnapshot(snapshot) {
        if (!isCloudAvailable() || state.syncing) return false;

        state.syncing = true;

        try {
          const json = JSON.stringify(snapshot);
          const chunks = [];

          for (let index = 0; index < json.length; index += CONFIG.cloudChunkSize) {
            chunks.push(json.slice(index, index + CONFIG.cloudChunkSize));
          }

          const oldMeta = safeJsonParse(await cloudGetItem(cloudMetaKey()), null);
          const oldChunks = oldMeta && Number.isInteger(oldMeta.chunks) ? oldMeta.chunks : 0;

          for (let index = 0; index < chunks.length; index += 1) {
            const saved = await cloudSetItem(cloudChunkKey(index), chunks[index]);
            if (!saved) return false;
          }

          const metaSaved = await cloudSetItem(cloudMetaKey(), JSON.stringify({
            chunks: chunks.length,
            updatedAt: snapshot.updatedAt
          }));

          if (!metaSaved) return false;

          for (let index = chunks.length; index < oldChunks; index += 1) {
            await cloudRemoveItem(cloudChunkKey(index));
          }

          return true;
        } finally {
          state.syncing = false;
        }
      }

      function createSnapshot(updatedAt = Date.now()) {
        return {
          updatedAt,
          workouts: state.workouts,
          draft: state.draft
        };
      }

      function readLocalSnapshot() {
        const snapshot = safeJsonParse(safeStorageGet(CONFIG.localDataKey), null);

        if (snapshot && Array.isArray(snapshot.workouts) && snapshot.draft) {
          return snapshot;
        }

        const workouts = safeJsonParse(safeStorageGet(CONFIG.storageKey), []);
        const draft = safeJsonParse(safeStorageGet(CONFIG.draftKey), null);

        return {
          updatedAt: 0,
          workouts: Array.isArray(workouts) ? workouts : [],
          draft: isValidDraft(draft) ? draft : createDraft()
        };
      }

      function writeLocalSnapshot(snapshot) {
        safeStorageSet(CONFIG.localDataKey, JSON.stringify(snapshot));
        safeStorageSet(CONFIG.storageKey, JSON.stringify(snapshot.workouts));
        safeStorageSet(CONFIG.draftKey, JSON.stringify(snapshot.draft));
      }

      function chooseSnapshot(localSnapshot, cloudSnapshot) {
        if (!cloudSnapshot) return localSnapshot;
        if (!localSnapshot) return cloudSnapshot;

        const localUpdatedAt = Number(localSnapshot.updatedAt) || 0;
        const cloudUpdatedAt = Number(cloudSnapshot.updatedAt) || 0;

        return cloudUpdatedAt > localUpdatedAt ? cloudSnapshot : localSnapshot;
      }

      function applySnapshot(snapshot) {
        const safeSnapshot = snapshot || {
          workouts: [],
          draft: createDraft()
        };

        state.workouts = Array.isArray(safeSnapshot.workouts)
          ? sanitizeWorkouts(safeSnapshot.workouts)
          : [];

        state.draft = isValidDraft(safeSnapshot.draft)
          ? sanitizeWorkout(safeSnapshot.draft)
          : createDraft();

        state.draft.status = "draft";
      }

      function toast(message) {
        text(el.toast, message);
        el.toast.style.display = "block";
        el.toast.classList.remove("show");

        requestAnimationFrame(() => {
          el.toast.classList.add("show");
        });

        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => {
          el.toast.style.display = "none";
          el.toast.classList.remove("show");
        }, CONFIG.toastDelay);
      }

      function haptic(type = "light") {
        if (tg && tg.HapticFeedback) {
          tg.HapticFeedback.impactOccurred(type);
        }
      }

      function hideKeyboard() {
        if (document.activeElement && document.activeElement.blur) {
          document.activeElement.blur();
        }
      }

      function showPopup(message) {
        if (tg && tg.showPopup) {
          return new Promise(resolve => {
            tg.showPopup({
              message,
              buttons: [
                { id: "cancel", type: "cancel", text: "Отмена" },
                { id: "ok", type: "default", text: "ОК" }
              ]
            }, resolve);
          });
        }

        return Promise.resolve(window.confirm(message) ? "ok" : "cancel");
      }

      async function loadData() {
        const localSnapshot = readLocalSnapshot();
        const cloudSnapshot = await readCloudSnapshot();
        const selectedSnapshot = chooseSnapshot(localSnapshot, cloudSnapshot);

        applySnapshot(selectedSnapshot);
        rebuildExerciseCatalog();
        renderAll();

        const normalizedSnapshot = createSnapshot(Number(selectedSnapshot.updatedAt) || Date.now());
        writeLocalSnapshot(normalizedSnapshot);

        if (isCloudAvailable() && (!cloudSnapshot || selectedSnapshot === localSnapshot)) {
          writeCloudSnapshot(normalizedSnapshot).then(saved => {
            if (!saved) console.warn("Initial cloud sync failed");
          });
        }

        setTimeout(() => {
          el.splash.classList.add("hide");
        }, CONFIG.splashDelay);
      }

      function commit() {
        rebuildExerciseCatalog();

        const snapshot = createSnapshot();

        writeLocalSnapshot(snapshot);
        renderAll();

        if (isCloudAvailable()) {
          writeCloudSnapshot(snapshot).then(saved => {
            if (!saved) toast("Не удалось синхронизировать с облаком");
          });
        }
      }

      function isValidDraft(value) {
        return value && value.status === "draft" && Array.isArray(value.exercises);
      }

      function sanitizeWorkouts(workouts) {
        return workouts
          .filter(workout => workout && Array.isArray(workout.exercises))
          .map(sanitizeWorkout)
          .filter(workout => workout.exercises.length);
      }

      function sanitizeWorkout(workout) {
        return {
          id: workout.id || id(),
          status: workout.status || "completed",
          createdAt: workout.createdAt || new Date().toISOString(),
          finishedAt: workout.finishedAt,
          exercises: workout.exercises
            .filter(ex => ex && ex.name && Array.isArray(ex.sets))
            .map(ex => ({
              id: ex.id || id(),
              name: String(ex.name).trim(),
              sets: ex.sets
                .map(set => ({
                  id: set.id || id(),
                  weight: Number(set.weight),
                  reps: Number(set.reps)
                }))
                .filter(set => Number.isFinite(set.weight) && set.weight >= 0 && Number.isInteger(set.reps) && set.reps > 0)
            }))
            .filter(ex => ex.name && ex.sets.length)
        };
      }

      function rebuildExerciseCatalog() {
        state.exercises = new Set();

        state.workouts.forEach(workout => {
          workout.exercises.forEach(ex => state.exercises.add(ex.name));
        });

        state.draft.exercises.forEach(ex => {
          state.exercises.add(ex.name);
        });
      }

      function getWorkoutStats(workout) {
        const exercises = workout.exercises.length;
        const sets = workout.exercises.reduce((sum, ex) => sum + ex.sets.length, 0);
        const volume = workout.exercises.reduce((sum, ex) => {
          return sum + ex.sets.reduce((inner, set) => inner + set.weight * set.reps, 0);
        }, 0);

        return { exercises, sets, volume };
      }

      function renderAll() {
        updateMeta();
        renderTabs();
        renderExerciseList();
        renderDraft();
        renderHistory();
        renderProgress();
        updateForm();
        updateMainActions();
      }

      function updateMeta() {
        const titles = {
          today: "Трена",
          history: "История",
          progress: "Прогресс"
        };

        text(el.screenTitle, titles[state.tab]);

        if (state.tab === "today") {
          const stats = getWorkoutStats(state.draft);
          text(el.screenMeta, `${stats.exercises} упражнений · ${stats.sets} подходов · ${Math.round(stats.volume)} кг`);
          return;
        }

        if (state.tab === "history") {
          text(el.screenMeta, `${state.workouts.length} тренировок сохранено`);
          return;
        }

        text(el.screenMeta, "Лучшие веса и объем");
      }

      function renderTabs() {
        el.tabs.forEach(tab => {
          const active = tab.dataset.tab === state.tab;
          tab.classList.toggle("active", active);

          const panel = el.panels[tab.dataset.tab];
          if (panel) {
            panel.classList.toggle("active", active);
          }
        });
      }

      function renderExerciseList() {
        el.exerciseList.replaceChildren();

        [...state.exercises].sort((a, b) => a.localeCompare(b, "ru")).forEach(name => {
          const option = document.createElement("option");
          option.value = name;
          el.exerciseList.appendChild(option);
        });
      }

      function renderDraft() {
        el.draftList.replaceChildren();

        if (!state.draft.exercises.length) {
          el.draftList.appendChild(make("div", "empty", "Пока нет подходов"));
          return;
        }

        state.draft.exercises.forEach(ex => {
          const box = make("div", "exercise");
          const volume = ex.sets.reduce((sum, set) => sum + set.weight * set.reps, 0);

          const head = make("div", "exercise-head");
          head.append(
            make("div", "exercise-name", ex.name),
            make("div", "muted", `${ex.sets.length} подходов · ${Math.round(volume)} кг`)
          );

          box.appendChild(head);

          ex.sets.forEach((set, index) => {
            const row = make("div", "set-row");
            row.appendChild(make("div", "set-value", `${index + 1}. ${set.weight} кг × ${set.reps}`));

            const edit = make("button", "btn-card btn-accent icon-square", "✎");
            edit.type = "button";
            edit.title = "Редактировать подход";
            edit.onclick = () => openEditSetModal(ex.id, set.id);

            const del = make("button", "btn-card btn-danger icon-square", "×");
            del.type = "button";
            del.title = "Удалить подход";
            del.onclick = () => animateRemove(row, () => deleteDraftSet(ex.id, set.id));

            row.append(edit, del);
            box.appendChild(row);
          });

          el.draftList.appendChild(box);
        });
      }

      function renderHistory() {
        el.historyList.replaceChildren();

        if (!state.workouts.length) {
          el.historyList.appendChild(make("div", "empty", "Пока нет сохраненных тренировок"));
          return;
        }

        const sorted = [...state.workouts].sort((a, b) => new Date(b.finishedAt) - new Date(a.finishedAt));
        const groups = groupWorkoutsByMonth(sorted);

        groups.forEach(group => {
          const groupNode = make("div", "history-group");
          groupNode.appendChild(make("div", "history-month-title", group.title));

          group.workouts.forEach(workout => {
            const stats = getWorkoutStats(workout);
            const row = make("div", "history-row");

            const openBtn = make("button", "history-item");
            openBtn.type = "button";
            openBtn.onclick = () => openWorkout(workout.id);
            openBtn.append(
              make("div", "history-title", formatDateTitle(workout.finishedAt)),
              make("div", "muted", `${stats.exercises} упражнений · ${stats.sets} подходов · ${Math.round(stats.volume)} кг`)
            );

            const csvBtn = make("button", "btn-card btn-accent icon-square", "CSV");
            csvBtn.type = "button";
            csvBtn.onclick = event => {
              event.stopPropagation();
              exportWorkoutCsv(workout.id);
            };

            const deleteBtn = make("button", "btn-card btn-danger icon-square", "×");
            deleteBtn.type = "button";
            deleteBtn.title = "Удалить тренировку";
            deleteBtn.onclick = event => {
              event.stopPropagation();
              deleteWorkout(workout.id);
            };

            row.append(openBtn, csvBtn, deleteBtn);
            groupNode.appendChild(row);
          });

          el.historyList.appendChild(groupNode);
        });
      }

      function groupWorkoutsByMonth(workouts) {
        const map = new Map();

        workouts.forEach(workout => {
          const date = new Date(workout.finishedAt);
          const key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;

          if (!map.has(key)) {
            map.set(key, {
              title: formatMonthTitle(date),
              workouts: []
            });
          }

          map.get(key).workouts.push(workout);
        });

        return [...map.values()];
      }

      function renderProgress() {
        const selected = el.progressSelect.value;
        const names = [...state.exercises].sort((a, b) => a.localeCompare(b, "ru"));

        el.progressSelect.replaceChildren();

        const emptyOption = document.createElement("option");
        emptyOption.value = "";
        text(emptyOption, "Выбери упражнение");
        el.progressSelect.appendChild(emptyOption);

        if (!names.length) {
          el.progressResult.replaceChildren(make("div", "progress-empty", "Пока нечего показывать"));
          return;
        }

        names.forEach(name => {
          const option = document.createElement("option");
          option.value = name;
          text(option, name);
          el.progressSelect.appendChild(option);
        });

        el.progressSelect.value = selected && names.includes(selected) ? selected : "";
        showProgress();
      }

      function showProgress() {
        const name = el.progressSelect.value;
        const entries = [];

        el.progressResult.replaceChildren();

        if (!name) {
          el.progressResult.appendChild(make("div", "progress-empty", "Выбери упражнение, чтобы увидеть график"));
          return;
        }

        state.workouts
          .slice()
          .sort((a, b) => new Date(a.finishedAt) - new Date(b.finishedAt))
          .forEach(workout => {
            const entry = getProgressEntry(workout, name);

            if (entry) {
              entries.push(entry);
            }
          });

        if (!entries.length) {
          el.progressResult.appendChild(make("div", "progress-empty", "По этому упражнению пока нет данных"));
          return;
        }

        const maxWeight = Math.max(...entries.map(item => item.weight));
        const maxVolume = Math.max(...entries.map(item => item.volume));
        const last = entries[entries.length - 1];

        const grid = make("div", "stats-grid");

        [
          ["Макс вес", `${maxWeight} кг`],
          ["Лучший объем", `${Math.round(maxVolume)} кг`],
          ["Тренировок", entries.length],
          ["Последний", `${last.weight} кг`]
        ].forEach(([label, value]) => {
          const card = make("div", "stat");
          card.append(
            make("div", "stat-num", value),
            make("div", "muted", label)
          );
          grid.appendChild(card);
        });

        el.progressResult.append(
          grid,
          createProgressChart(entries),
          make("div", "chart-label", "График показывает лучший вес по тренировкам")
        );
      }

      function getProgressEntry(workout, name) {
        let bestWeight = null;
        let bestVolume = 0;
        let totalSets = 0;

        workout.exercises.forEach(ex => {
          if (!sameName(ex.name, name)) return;

          ex.sets.forEach(set => {
            bestWeight = bestWeight === null ? set.weight : Math.max(bestWeight, set.weight);
            bestVolume = Math.max(bestVolume, set.weight * set.reps);
            totalSets += 1;
          });
        });

        if (bestWeight === null) {
          return null;
        }

        return {
          date: workout.finishedAt,
          weight: bestWeight,
          volume: bestVolume,
          sets: totalSets
        };
      }

      function createProgressChart(entries) {
        const wrap = make("div", "progress-chart");
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");

        const width = 320;
        const height = 190;
        const padding = 26;
        const chartWidth = width - padding * 2;
        const chartHeight = height - padding * 2;

        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
        svg.setAttribute("preserveAspectRatio", "none");

        const values = entries.map(item => item.weight);
        const min = Math.min(...values);
        const max = Math.max(...values);
        const range = max - min || 1;

        const points = entries.map((item, index) => {
          const x = entries.length === 1
            ? width / 2
            : padding + (index / (entries.length - 1)) * chartWidth;

          const y = max === min
            ? height / 2
            : padding + ((max - item.weight) / range) * chartHeight;

          return { x, y, value: item.weight };
        });

        const gridLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
        gridLine.setAttribute("x1", padding);
        gridLine.setAttribute("y1", height - padding);
        gridLine.setAttribute("x2", width - padding);
        gridLine.setAttribute("y2", height - padding);
        gridLine.setAttribute("stroke", "rgba(255,255,255,.16)");
        gridLine.setAttribute("stroke-width", "1");
        svg.appendChild(gridLine);

        const polyline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        polyline.setAttribute("points", points.map(point => `${point.x},${point.y}`).join(" "));
        polyline.setAttribute("fill", "none");
        polyline.setAttribute("stroke", "#ff6418");
        polyline.setAttribute("stroke-width", "4");
        polyline.setAttribute("stroke-linecap", "round");
        polyline.setAttribute("stroke-linejoin", "round");
        svg.appendChild(polyline);

        points.forEach(point => {
          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circle.setAttribute("cx", point.x);
          circle.setAttribute("cy", point.y);
          circle.setAttribute("r", "5");
          circle.setAttribute("fill", "#ff6418");
          circle.setAttribute("stroke", "#0b0b0b");
          circle.setAttribute("stroke-width", "3");
          svg.appendChild(circle);
        });

        const maxText = document.createElementNS("http://www.w3.org/2000/svg", "text");
        maxText.setAttribute("x", padding);
        maxText.setAttribute("y", 18);
        maxText.setAttribute("fill", "rgba(255,255,255,.62)");
        maxText.setAttribute("font-size", "12");
        maxText.textContent = `${max} кг`;
        svg.appendChild(maxText);

        const minText = document.createElementNS("http://www.w3.org/2000/svg", "text");
        minText.setAttribute("x", padding);
        minText.setAttribute("y", height - 8);
        minText.setAttribute("fill", "rgba(255,255,255,.42)");
        minText.setAttribute("font-size", "12");
        minText.textContent = `${min} кг`;
        svg.appendChild(minText);

        wrap.appendChild(svg);
        return wrap;
      }

      function formatDateTitle(iso) {
        const date = new Date(iso);
        const now = new Date();

        const startToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const startDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diff = Math.round((startToday - startDate) / 86400000);

        if (diff === 0) return "Сегодня";
        if (diff === 1) return "Вчера";

        return date.toLocaleDateString("ru-RU", {
          day: "numeric",
          month: "long"
        });
      }

      function formatMonthTitle(date) {
        return date.toLocaleDateString("ru-RU", {
          month: "long",
          year: "numeric"
        });
      }

      function updateForm() {
        const name = el.exerciseInput.value.trim();
        const parsed = parseSetInput(el.weightInput.value, el.repsInput.value);
        const valid = Boolean(name) && Boolean(parsed);

        el.addSetBtn.disabled = !valid;
        el.repeatSetBtn.disabled = !getLastSet(name);

        text(el.formHint, valid ? "Готово к добавлению" : "Выбери упражнение, вес и повторы");
      }

      function updateMainActions() {
        const hasSets = getWorkoutStats(state.draft).sets > 0;
        const visible = hasSets && state.tab === "today";

        el.fallbackFinishBtn.style.display = visible ? "block" : "none";

        if (!tg || !tg.MainButton) return;

        tg.MainButton.offClick(finishWorkout);

        if (visible) {
          tg.MainButton.setText("Завершить тренировку");
          tg.MainButton.onClick(finishWorkout);
          tg.MainButton.show();
        } else {
          tg.MainButton.hide();
        }
      }

      function getOrCreateDraftExercise(name) {
        let ex = state.draft.exercises.find(item => sameName(item.name, name));

        if (!ex) {
          ex = {
            id: id(),
            name,
            sets: []
          };
          state.draft.exercises.push(ex);
        }

        return ex;
      }

      function addSet() {
        const name = el.exerciseInput.value.trim();
        const parsed = parseSetInput(el.weightInput.value, el.repsInput.value);

        if (!name || !parsed) {
          toast("Проверь вес и повторы");
          return;
        }

        const ex = getOrCreateDraftExercise(name);
        ex.sets.push({
          id: id(),
          ...parsed
        });

        el.weightInput.value = "";
        el.repsInput.value = "";

        hideKeyboard();
        haptic();
        commit();
      }

      function getLastSet(name) {
        if (!name) return null;

        const draftEx = state.draft.exercises.find(item => sameName(item.name, name));
        if (draftEx && draftEx.sets.length) {
          return draftEx.sets[draftEx.sets.length - 1];
        }

        const sortedWorkouts = [...state.workouts].sort((a, b) => {
          return new Date(b.finishedAt) - new Date(a.finishedAt);
        });

        for (const workout of sortedWorkouts) {
          const ex = workout.exercises.find(item => sameName(item.name, name));

          if (ex && ex.sets.length) {
            return ex.sets[ex.sets.length - 1];
          }
        }

        return null;
      }

      function fillLastSet() {
        const last = getLastSet(el.exerciseInput.value.trim());
        if (!last) return;

        el.weightInput.value = last.weight;
        el.repsInput.value = last.reps;
        updateForm();
      }

      function deleteDraftSet(exId, setId) {
        const ex = state.draft.exercises.find(item => item.id === exId);
        if (!ex) return;

        ex.sets = ex.sets.filter(set => set.id !== setId);
        state.draft.exercises = state.draft.exercises.filter(item => item.sets.length);

        haptic("medium");
        commit();
        toast("Подход удален");
      }

      function openEditSetModal(exId, setId) {
        const ex = state.draft.exercises.find(item => item.id === exId);
        if (!ex) return;

        const set = ex.sets.find(item => item.id === setId);
        if (!set) return;

        openSheet();
        el.modalBody.replaceChildren();

        const title = make("div", "title", "Редактировать подход");
        const form = make("div", "modal-form");

        const nameInput = document.createElement("input");
        nameInput.value = ex.name;
        nameInput.placeholder = "Упражнение";
        nameInput.setAttribute("list", "exerciseList");

        const nums = make("div", "form-numbers");

        const weightInput = document.createElement("input");
        weightInput.value = set.weight;
        weightInput.placeholder = "кг";
        weightInput.inputMode = "decimal";

        const repsInput = document.createElement("input");
        repsInput.value = set.reps;
        repsInput.placeholder = "Повторений";
        repsInput.inputMode = "numeric";

        nums.append(weightInput, repsInput);

        const save = make("button", "btn-card btn-accent", "Сохранить");
        save.type = "button";
        save.onclick = () => {
          const newName = nameInput.value.trim();
          const parsed = parseSetInput(weightInput.value, repsInput.value);

          if (!newName || !parsed) {
            toast("Проверь упражнение, вес и повторы");
            return;
          }

          moveOrUpdateSet(state.draft, exId, setId, newName, parsed.weight, parsed.reps);
          closeModal();
        };

        const cancel = make("button", "btn-card btn-muted", "Отмена");
        cancel.type = "button";
        cancel.onclick = closeModal;

        form.append(nameInput, nums, save, cancel);
        el.modalBody.append(title, form);
      }

      function moveOrUpdateSet(workout, exId, setId, newName, newWeight, newReps) {
        const oldEx = workout.exercises.find(item => item.id === exId);
        if (!oldEx) return;

        const setIndex = oldEx.sets.findIndex(item => item.id === setId);
        if (setIndex === -1) return;

        const updatedSet = {
          ...oldEx.sets[setIndex],
          weight: newWeight,
          reps: newReps
        };

        oldEx.sets.splice(setIndex, 1);

        let targetEx = workout.exercises.find(item => sameName(item.name, newName));

        if (!targetEx) {
          targetEx = {
            id: id(),
            name: newName,
            sets: []
          };
          workout.exercises.push(targetEx);
        }

        targetEx.sets.push(updatedSet);
        workout.exercises = workout.exercises.filter(item => item.sets.length);

        haptic();
        commit();
        toast("Подход обновлен");
      }

      async function finishWorkout() {
        if (!getWorkoutStats(state.draft).sets) return;

        const answer = await showPopup("Завершить тренировку?");
        if (answer !== "ok") return;

        state.workouts.push({
          ...state.draft,
          status: "completed",
          finishedAt: new Date().toISOString()
        });

        state.draft = createDraft();

        haptic("heavy");
        commit();
        toast("Тренировка сохранена");
      }

      function openWorkout(workoutId) {
        const workout = state.workouts.find(item => item.id === workoutId);
        if (!workout) return;

        openSheet();
        renderWorkoutModal(workout);
      }

      function renderWorkoutModal(workout) {
        el.modalBody.replaceChildren();

        const title = make("div", "title", formatDateTitle(workout.finishedAt));
        const stats = getWorkoutStats(workout);
        const meta = make("div", "meta", `${stats.exercises} упражнений · ${stats.sets} подходов · ${Math.round(stats.volume)} кг`);

        el.modalBody.append(title, meta);

        workout.exercises.forEach(ex => {
          const box = make("div", "exercise");
          box.appendChild(make("div", "exercise-name", ex.name));

          ex.sets.forEach((set, index) => {
            const row = make("div", "modal-set-row");
            row.append(
              make("div", "", `${index + 1}. ${set.weight} кг × ${set.reps}`),
              make("div", "muted", `${Math.round(set.weight * set.reps)} кг`)
            );
            box.appendChild(row);
          });

          el.modalBody.appendChild(box);
        });

        const actionsWrap = make("div", "sheet-actions");
        const grid = make("div", "grid");

        const edit = make("button", "btn-card btn-accent", "Редактировать");
        edit.type = "button";
        edit.onclick = () => openEditWorkoutModal(workout.id);

        const del = make("button", "btn-card btn-danger", "Удалить");
        del.type = "button";
        del.onclick = () => deleteWorkout(workout.id);

        grid.append(edit, del);
        actionsWrap.appendChild(grid);
        el.modalBody.appendChild(actionsWrap);
      }

      function openEditWorkoutModal(workoutId) {
        const workout = state.workouts.find(item => item.id === workoutId);
        if (!workout) return;

        openSheet();
        el.modalBody.replaceChildren();

        const title = make("div", "title", "Редактировать тренировку");
        const list = make("div", "modal-form");

        workout.exercises.forEach(ex => {
          const group = make("div", "edit-exercise-group");
          group.appendChild(make("div", "edit-group-title", ex.name));

          ex.sets.forEach(set => {
            const card = make("div", "card edit-set-card");
            card.dataset.setId = set.id;

            const head = make("div", "edit-set-head");

            const nameInput = document.createElement("input");
            nameInput.value = ex.name;
            nameInput.placeholder = "Упражнение";
            nameInput.setAttribute("list", "exerciseList");

            const del = make("button", "btn-card btn-danger icon-square", "×");
            del.type = "button";
            del.title = "Удалить подход";
            del.onclick = () => {
              animateRemove(card, () => {
                card.remove();

                if (!group.querySelector(".edit-set-card")) {
                  group.remove();
                }
              });
            };

            head.append(nameInput, del);

            const nums = make("div", "form-numbers");

            const weightInput = document.createElement("input");
            weightInput.value = set.weight;
            weightInput.inputMode = "decimal";
            weightInput.placeholder = "кг";

            const repsInput = document.createElement("input");
            repsInput.value = set.reps;
            repsInput.inputMode = "numeric";
            repsInput.placeholder = "Повторений";

            nums.append(weightInput, repsInput);

            card._name = nameInput;
            card._weight = weightInput;
            card._reps = repsInput;

            card.append(head, nums);
            group.appendChild(card);
          });

          list.appendChild(group);
        });

        const actionsWrap = make("div", "sheet-actions");
        const grid = make("div", "grid");

        const save = make("button", "btn-card btn-accent", "Сохранить");
        save.type = "button";
        save.onclick = () => saveWorkoutEdit(workoutId, list);

        const cancel = make("button", "btn-card btn-muted", "Отмена");
        cancel.type = "button";
        cancel.onclick = () => renderWorkoutModal(workout);

        grid.append(save, cancel);
        actionsWrap.appendChild(grid);

        el.modalBody.append(title, list, actionsWrap);
      }

      function saveWorkoutEdit(workoutId, list) {
        const workout = state.workouts.find(item => item.id === workoutId);
        if (!workout) return;

        const map = new Map();

        [...list.querySelectorAll(".edit-set-card")].forEach(card => {
          const name = card._name.value.trim();
          const parsed = parseSetInput(card._weight.value, card._reps.value);

          if (!name || !parsed) return;

          const key = name.toLowerCase();

          if (!map.has(key)) {
            map.set(key, {
              id: id(),
              name,
              sets: []
            });
          }

          map.get(key).sets.push({
            id: card.dataset.setId || id(),
            ...parsed
          });
        });

        const exercises = [...map.values()].filter(ex => ex.sets.length);

        if (!exercises.length) {
          toast("Нужен хотя бы один подход");
          return;
        }

        workout.exercises = exercises;

        hideKeyboard();
        haptic();
        commit();
        renderWorkoutModal(workout);
        toast("Тренировка обновлена");
      }

      function exportWorkoutCsv(workoutId) {
        const workout = state.workouts.find(item => item.id === workoutId);
        if (!workout) return;

        const row = workout.exercises.map(ex => {
          const lines = [
            ex.name,
            ...ex.sets.map((set, index) => `${index + 1}й подход ${set.weight}кг х ${set.reps}`)
          ];

          return lines.join("\n");
        });

        const csv = row
          .map(cell => `"${String(cell).replace(/"/g, '""')}"`)
          .join(";");

        const blob = new Blob(["\uFEFF" + csv], {
          type: "text/csv;charset=utf-8"
        });

        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const date = new Date(workout.finishedAt).toISOString().slice(0, 10);

        a.href = url;
        a.download = `workout-${date}.csv`;
        document.body.appendChild(a);
        a.click();
        a.remove();

        URL.revokeObjectURL(url);
        toast("CSV-файл создан");
      }

      async function deleteWorkout(workoutId) {
        const answer = await showPopup("Удалить тренировку?");
        if (answer !== "ok") return;

        state.workouts = state.workouts.filter(item => item.id !== workoutId);

        closeModal();
        haptic("medium");
        commit();
        toast("Тренировка удалена");
      }

      function openSheet() {
        el.modal.classList.add("open");

        if (tg && tg.BackButton) {
          tg.BackButton.offClick(closeModal);
          tg.BackButton.onClick(closeModal);
          tg.BackButton.show();
        }
      }

      function closeModal() {
        el.modal.classList.remove("open");
        hideKeyboard();

        if (tg && tg.BackButton) {
          tg.BackButton.offClick(closeModal);
          tg.BackButton.hide();
        }
      }

      function animateRemove(node, done) {
        node.style.opacity = "1";
        node.style.transform = "translateY(0) scale(1)";

        requestAnimationFrame(() => {
          node.classList.add("remove-anim");
        });

        setTimeout(() => {
          if (done) done();
        }, 200);
      }

      function bindEvents() {
        el.tabs.forEach(tab => {
          tab.addEventListener("click", () => {
            state.tab = tab.dataset.tab;
            haptic();
            renderAll();
          });
        });

        [el.exerciseInput, el.weightInput, el.repsInput].forEach(input => {
          input.addEventListener("input", updateForm);
        });

        el.exerciseInput.addEventListener("change", fillLastSet);

        el.exerciseInput.addEventListener("keydown", event => {
          if (event.key === "Enter") {
            event.preventDefault();
            el.weightInput.focus();
          }
        });

        el.weightInput.addEventListener("keydown", event => {
          if (event.key === "Enter") {
            event.preventDefault();
            el.repsInput.focus();
          }
        });

        el.repsInput.addEventListener("keydown", event => {
          if (event.key === "Enter" && !el.addSetBtn.disabled) {
            event.preventDefault();
            addSet();
          }
        });

        el.addSetBtn.addEventListener("click", addSet);
        el.repeatSetBtn.addEventListener("click", fillLastSet);
        el.fallbackFinishBtn.addEventListener("click", finishWorkout);
        el.progressSelect.addEventListener("change", showProgress);

        el.modal.addEventListener("click", event => {
          if (event.target === el.modal) {
            closeModal();
          }
        });
      }

      function initTelegram() {
        if (!tg) return;

        tg.ready();
        tg.expand();
      }

      async function init() {
        initTelegram();
        bindEvents();
        await loadData();
      }

      init();
    })();
  </script>
</body>
</html>
