        el.modalBody.appendChild(actions);
      }

      function removeEditSetCard(card) {
        const group = card.closest(".edit-exercise-group");

        if (!group) {
          animateRemove(card, () => card.remove());
          return;
        }

        const cards = [...group.querySelectorAll(".edit-set-card")];
        if (cards.length <= 1) {
          animateRemove(group, () => group.remove());
          return;
        }

        animateRemove(card, () => card.remove());
      }

      function createEditSetCard(weightValue = "", repsValue = "") {
        const card = make("div", "edit-set-card");
        const nums = make("div", "form-numbers");

        const weight = make("input", "");
        weight.value = weightValue;
        weight.inputMode = "decimal";
        weight.dataset.kind = "weight";

        const reps = make("input", "");
        reps.value = repsValue;
        reps.inputMode = "numeric";
        reps.dataset.kind = "reps";

        nums.append(weight, reps);

        const del = make("button", "btn-card btn-danger icon-square", "×");
        del.type = "button";
        del.onclick = () => removeEditSetCard(card);

        card.append(nums, del);
        return card;
      }

      function createExerciseGroup(nameValue = "") {
        const group = make("div", "edit-exercise-group");
        const exId = id();
        group.dataset.exId = exId;

        const name = make("input", "");
        name.value = nameValue;
        name.dataset.exName = "1";

        group.appendChild(name);
        group.appendChild(createEditSetCard("", ""));
        return group;
      }

      function openEditWorkout(workoutId) {
        const workout = state.workouts.find((item) => item.id === workoutId);
        if (!workout) return;

        openSheet();
        el.modalBody.replaceChildren();

        const header = make("div", "title-row");
        const title = make("div", "title", "Редактировать тренировку");
        const addBtn = make("button", "btn-card btn-accent icon-square", "+");
        addBtn.type = "button";

        header.append(title, addBtn);
        el.modalBody.appendChild(header);

        const form = make("div", "modal-form");

        workout.exercises.forEach((ex) => {
          const group = make("div", "edit-exercise-group");
          group.dataset.exId = ex.id;

          const name = make("input", "");
          name.value = ex.name;
          name.dataset.exName = "1";
          group.appendChild(name);

          ex.sets.forEach((set) => {
            const card = createEditSetCard(String(set.weight), String(set.reps));
            card.dataset.setId = set.id;
            group.appendChild(card);
          });

          form.appendChild(group);
        });

        addBtn.onclick = () => {
          const newGroup = createExerciseGroup("");
          form.appendChild(newGroup);
          haptic();
          newGroup.scrollIntoView({ behavior: "smooth", block: "nearest" });
        };

        const actions = make("div", "sheet-actions");
        const save = make("button", "btn-card btn-accent", "Сохранить");
        save.type = "button";
        save.onclick = () => saveWorkoutEdit(workoutId, form);
        actions.append(save);

        el.modalBody.append(form, actions);
      }

      function saveWorkoutEdit(workoutId, form) {
        const workout = state.workouts.find((item) => item.id === workoutId);
        if (!workout) return;

        const nextExercises = [];
        const groups = [...form.querySelectorAll(".edit-exercise-group")];

        for (const group of groups) {
          const nameInput = group.querySelector('input[data-ex-name="1"]');
          const name = nameInput ? nameInput.value.trim() : "";

          if (!name) {
            const hasCards = group.querySelector(".edit-set-card") !== null;
            if (!hasCards) continue;
            toast("Проверь название упражнения");
            return;
          }

          const cards = [...group.querySelectorAll(".edit-set-card")];
          if (!cards.length) continue;

          const sets = [];

          for (const card of cards) {
            const weightEl = card.querySelector('[data-kind="weight"]');
            const repsEl = card.querySelector('[data-kind="reps"]');
            const parsed = parseSetInput(weightEl.value, repsEl.value);

            if (!parsed) {
              toast("Проверь вес и повторы");
              return;
            }

            sets.push({
              id: card.dataset.setId || id(),
              weight: parsed.weight,
              reps: parsed.reps
            });
          }

          nextExercises.push({
            id: group.dataset.exId || id(),
            name,
            sets
          });
        }

        if (!nextExercises.length) {
          toast("Нельзя сохранить пустую тренировку");
          return;
        }

        workout.exercises = nextExercises;

        haptic();
        commit();
        closeModal();
        toast("Тренировка обновлена");
      }

      function exportWorkoutCsv(workoutId) {
        const workout = state.workouts.find((item) => item.id === workoutId);
        if (!workout) return;

        const csv = workout.exercises
          .map((ex) =>
            `"${[ex.name, ...ex.sets.map((set, index) => `${index + 1}й подход ${set.weight}кг х ${set.reps}`)]
              .join("\n")
              .replace(/"/g, '""')}"`
          )
          .join(";");

        const blob = new Blob(["\uFEFF" + csv], {
          type: "text/csv;charset=utf-8"
        });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = `workout-${new Date(workout.finishedAt).toISOString().slice(0, 10)}.csv`;

        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        toast("CSV-файл создан");
      }

      async function confirmDeleteWorkout(workoutId, node) {
        const answer = await showPopup("Удалить тренировку?");
        if (answer !== "ok") return;

        const row = node || el.historyList.querySelector(`[data-id="${workoutId}"]`);
        if (row) {
          animateRemove(row, () => deleteWorkout(workoutId));
        } else {
          deleteWorkout(workoutId);
        }
      }

      function deleteWorkout(workoutId) {
        state.workouts = state.workouts.filter((workout) => workout.id !== workoutId);
        closeModal();
        haptic("medium");
        commit();
        toast("Тренировка удалена");
      }

      function openSheet() {
        el.modal.classList.add("open");
        scheduleTimerViewportSync();

        if (tg && tg.BackButton) {
          tg.BackButton.offClick(closeModal);
          tg.BackButton.onClick(closeModal);
          tg.BackButton.show();
        }
      }

      function closeModal() {
        el.modal.classList.remove("open");
        hideKeyboard();
        scheduleTimerViewportSync();

        if (tg && tg.BackButton) {
          tg.BackButton.offClick(closeModal);
          tg.BackButton.hide();
        }
      }

      function animateRemove(node, done) {
        node.style.maxHeight = node.scrollHeight + "px";
        node.style.overflow = "hidden";
        requestAnimationFrame(() => node.classList.add("remove-anim"));
        setTimeout(() => {
          if (done) done();
          scheduleTimerViewportSync();
        }, 260);
      }

      function formatStopwatch(ms) {
        const centiseconds = Math.floor(ms / 10) % 100;
        const totalSeconds = Math.floor(ms / 1000);
        const seconds = totalSeconds % 60;
        const minutes = Math.floor(totalSeconds / 60);

        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}.${String(centiseconds).padStart(2, "0")}`;
      }

      function renderTimer(ms = 0) {
        text(el.timerReadout, formatStopwatch(ms));
        el.timerToggleBtn.classList.toggle("running", state.timer.running);
        el.timerToggleBtn.setAttribute(
          "aria-label",
          state.timer.running ? "Остановить и сбросить секундомер" : "Запустить секундомер"
        );
        scheduleTimerViewportSync();
      }

      function timerLoop(now) {
        if (!state.timer.running) return;
        renderTimer(now - state.timer.startedAt);
        state.timer.raf = requestAnimationFrame(timerLoop);
      }

      function startTimer() {
        if (state.timer.running) return;

        state.timer.running = true;
        state.timer.startedAt = performance.now();
        renderTimer(0);
        haptic();
        state.timer.raf = requestAnimationFrame(timerLoop);
      }

      function stopTimer() {
        const wasRunning = state.timer.running;

        if (state.timer.raf) {
          cancelAnimationFrame(state.timer.raf);
        }

        state.timer.running = false;
        state.timer.startedAt = 0;
        state.timer.raf = 0;
        renderTimer(0);

        if (wasRunning) haptic("medium");
      }

      function toggleTimer() {
        if (state.timer.running) {
          stopTimer();
        } else {
          startTimer();
        }
      }

      function syncTimerViewportPosition() {
        const vv = window.visualViewport;
        const scrollX = window.scrollX || window.pageXOffset || 0;
        const scrollY = window.scrollY || window.pageYOffset || 0;

        const left = scrollX + (vv ? vv.offsetLeft : 0);
        const top = scrollY + (vv ? vv.offsetTop : 0);
        const width = vv ? vv.width : document.documentElement.clientWidth;
        const height = vv ? vv.height : window.innerHeight;

        el.timerLayer.style.width = `${Math.round(width)}px`;
        el.timerLayer.style.height = `${Math.round(height)}px`;
        el.timerLayer.style.transform = `translate3d(${Math.round(left)}px, ${Math.round(top)}px, 0)`;
      }

      function scheduleTimerViewportSync() {
        if (timerViewportRaf) return;

        timerViewportRaf = requestAnimationFrame(() => {
          timerViewportRaf = 0;
          syncTimerViewportPosition();
        });
      }

      function bindEvents() {
        el.tabs.forEach((tab) => {
          tab.addEventListener("click", () => {
            state.tab = tab.dataset.tab;
            haptic();
            renderAll();
          });
        });

        [el.exerciseInput, el.weightInput, el.repsInput].forEach((input) => {
          input.addEventListener("input", updateForm);
        });

        el.exerciseInput.addEventListener("change", fillLastSet);
        el.exerciseClearBtn.addEventListener("click", clearExerciseInput);
        el.addSetBtn.addEventListener("click", addSet);
        el.repeatSetBtn.addEventListener("click", fillLastSet);
        el.fallbackFinishBtn.addEventListener("click", finishWorkout);

        el.progressSelect.addEventListener("change", () => {
          state.progressSelection.exercise = el.progressSelect.value;
          state.progressSelection.date = "";
          showProgress();
        });

        el.progressMetricBtns.forEach((btn) => {
          btn.addEventListener("click", () => {
            state.progressMetric = btn.dataset.metric;
            renderProgressMetricButtons();
            updateMeta();
            showProgress();
            haptic();
          });
        });

        el.modal.addEventListener("click", (e) => {
          if (e.target === el.modal) closeModal();
        });

        el.repsInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !el.addSetBtn.disabled) {
            e.preventDefault();
            addSet();
          }
        });

        el.timerToggleBtn.addEventListener("click", toggleTimer);

        window.addEventListener("scroll", scheduleTimerViewportSync, { passive: true });
        window.addEventListener("resize", scheduleTimerViewportSync, { passive: true });
        window.addEventListener("orientationchange", scheduleTimerViewportSync);

        if (window.visualViewport) {
          window.visualViewport.addEventListener("scroll", scheduleTimerViewportSync, { passive: true });
          window.visualViewport.addEventListener("resize", scheduleTimerViewportSync, { passive: true });
        }

        if ("ResizeObserver" in window) {
          timerResizeObserver = new ResizeObserver(() => {
            scheduleTimerViewportSync();
          });
          timerResizeObserver.observe(document.body);
          timerResizeObserver.observe(document.documentElement);
        }
      }

      function initTelegram() {
        if (!tg) return;

        tg.ready();
        tg.expand();

        if (tg.MainButton) {
          tg.MainButton.offClick(finishWorkout);
          tg.MainButton.setParams({ color: "#ff6418", text_color: "#ffffff" });
          tg.MainButton.hide();
        }
      }

      function init() {
        initTelegram();
        bindEvents();
        renderTimer(0);
        updateExerciseClear();
        scheduleTimerViewportSync();
        loadData();
      }

      init();
    })();
  </script>
</body>
</html>
