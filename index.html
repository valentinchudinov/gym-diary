<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Святилище ТРЕНЕРА</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #070707;
      --bg-solid: #090909;
      --surface: rgba(255, 255, 255, 0.055);
      --field: #171717;
      --line: rgba(255, 255, 255, 0.09);
      --text: #fff;
      --muted: rgba(255, 255, 255, 0.58);
      --muted-strong: rgba(255, 255, 255, 0.72);
      --accent: #ff6418;
      --accent-soft: rgba(255, 100, 24, 0.1);
      --accent-line: rgba(255, 100, 24, 0.24);
      --success: #31d67b;
      --success-soft: rgba(49, 214, 123, 0.12);
      --success-line: rgba(49, 214, 123, 0.26);
      --danger: #ff8a8a;
      --danger-soft: rgba(255, 70, 70, 0.12);
      --danger-line: rgba(255, 90, 90, 0.28);
      --info: #87b7ff;
      --info-soft: rgba(135, 183, 255, 0.12);
      --info-line: rgba(135, 183, 255, 0.28);
      --radius: 18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --tab-index: 0;
    }

    html, body {
      min-height: 100%;
      background: var(--bg-solid);
    }

    body {
      position: relative;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      background:
        radial-gradient(circle at 100% 0%, rgba(255, 100, 24, 0.11), transparent 30%),
        radial-gradient(circle at 0% 0%, rgba(255, 100, 24, 0.05), transparent 24%),
        var(--bg-solid);
      color: var(--text);
      padding: max(14px, var(--safe-top)) 14px calc(28px + var(--safe-bottom));
      font-size: 15px;
      overflow-x: hidden;
    }

    button, input, select {
      font: inherit;
      color: inherit;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 760;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition:
        transform 0.14s ease,
        background-color 0.16s ease,
        border-color 0.16s ease,
        box-shadow 0.16s ease,
        opacity 0.16s ease,
        color 0.16s ease;
    }

    button:disabled {
      opacity: 0.42;
      cursor: default;
    }

    input, select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: var(--field);
      color: #fff;
      outline: none;
      transition:
        border-color 0.16s ease,
        box-shadow 0.16s ease,
        transform 0.14s ease,
        opacity 0.16s ease;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.22);
    }

    input:focus, select:focus {
      border-color: rgba(255, 100, 24, 0.75);
      box-shadow: 0 0 0 3px rgba(255, 100, 24, 0.13);
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      padding-right: clamp(138px, 35vw, 176px);
    }

    .top-copy { min-width: 0; }

    .title {
      font-size: 28px;
      line-height: 1.08;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .muted { color: var(--muted); font-size: 13px; }

    .section { margin-bottom: 16px; }

    .section-title {
      font-size: 18px;
      font-weight: 820;
      margin-bottom: 10px;
    }

    .card {
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 13px;
      margin-bottom: 10px;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.14);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .empty {
      padding: 24px 14px;
      text-align: center;
      color: var(--muted);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      align-items: end;
      background: #050505;
      overflow: hidden;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    .splash.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.02);
      filter: saturate(0.98) brightness(0.86) contrast(1.02);
    }

    .splash::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.18) 38%, rgba(0, 0, 0, 0.92));
    }

    .splash-content {
      position: relative;
      z-index: 2;
      padding: 28px 22px calc(34px + var(--safe-bottom));
    }

    .splash-title {
      max-width: 360px;
      font-size: 42px;
      line-height: 1.05;
      font-weight: 850;
    }

    .splash-title span { color: var(--accent); }

    .splash-sub {
      margin-top: 12px;
      max-width: 310px;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.45;
    }

    .loader {
      width: 100%;
      height: 5px;
      margin-top: 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      overflow: hidden;
    }

    .loader i {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      animation: load 1.5s ease-in-out infinite;
    }

    .tabs-shell {
      width: 100%;
      padding: 7px;
      margin-bottom: 16px;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.055)),
        rgba(255, 255, 255, 0.075);
      border: 1px solid rgba(255, 255, 255, 0.13);
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .tabs {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .tabs::before {
      content: "";
      position: absolute;
      z-index: 0;
      top: 0;
      bottom: 0;
      left: 0;
      width: calc((100% - 16px) / 3);
      border-radius: 18px;
      background: rgba(255, 100, 24, 0.14);
      border: 1px solid rgba(255, 100, 24, 0.28);
      box-shadow: 0 8px 16px rgba(255, 100, 24, 0.08);
      transform: translateX(calc(var(--tab-index) * (100% + 8px)));
      transition: transform 0.22s cubic-bezier(.2, .9, .2, 1);
      box-sizing: border-box;
    }

    .tabs[data-active="0"] { --tab-index: 0; }
    .tabs[data-active="1"] { --tab-index: 1; }
    .tabs[data-active="2"] { --tab-index: 2; }

    .tab {
      position: relative;
      z-index: 1;
      min-height: 50px;
      border-radius: 18px;
      background: transparent;
      border: 1px solid transparent;
      color: rgba(255, 255, 255, 0.72);
      box-shadow: none;
      font-size: 14px;
    }

    .tab.active { color: var(--accent); }

    .premium-chooser {
      display: grid;
      gap: 12px;
      margin-top: 4px;
    }

    .premium-type {
      position: relative;
      width: 100%;
      min-height: 90px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)),
        rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      box-shadow:
        0 14px 26px rgba(0, 0, 0, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      text-align: left;
      overflow: hidden;
    }

    .premium-type.active {
      border-color: rgba(255,100,24,0.34);
      background:
        linear-gradient(180deg, rgba(255,100,24,0.12), rgba(255,255,255,0.03)),
        rgba(255,255,255,0.035);
    }

    .premium-icon,
    .training-head-icon,
    .history-category-icon,
    .history-item-icon,
    .workout-modal-icon {
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      flex: none;
    }

    .premium-icon {
      width: 52px;
      height: 52px;
      min-width: 52px;
    }

    .training-head-icon,
    .workout-modal-icon {
      width: 52px;
      height: 52px;
      min-width: 52px;
    }

    .history-category-icon {
      width: 48px;
      height: 48px;
      min-width: 48px;
    }

    .history-item-icon {
      width: 44px;
      height: 44px;
      min-width: 44px;
      border-radius: 14px;
    }

    .premium-icon-img,
    .training-head-icon img,
    .workout-modal-icon img {
      width: 40px;
      height: 40px;
      display: block;
      object-fit: contain;
    }

    .history-category-icon img {
      width: 36px;
      height: 36px;
      display: block;
      object-fit: contain;
    }

    .history-item-icon img {
      width: 32px;
      height: 32px;
      display: block;
      object-fit: contain;
    }

    .premium-copy {
      min-width: 0;
      flex: 1;
      display: block;
    }

    .premium-title {
      display: block;
      font-size: 17px;
      font-weight: 820;
      line-height: 1.1;
    }

    .premium-sub {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-top: 5px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
      max-height: calc(1.35em * 2);
    }

    .premium-check {
      min-width: 26px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: transparent;
      background: rgba(255,255,255,0.04);
      transition: all 0.16s ease;
    }

    .premium-type.active .premium-check {
      color: #fff;
      border-color: rgba(255,100,24,0.44);
      background: rgba(255,100,24,0.78);
    }

    .start-cta { display: none; }

    .training-head {
      width: 100%;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03)),
        rgba(255,255,255,0.02);
      border: 1px solid var(--line);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
      box-shadow: 0 14px 28px rgba(0,0,0,0.14);
    }

    .training-head-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }

    .training-head-title { font-size: 22px; font-weight: 840; line-height: 1.08; }
    .training-head-sub { margin-top: 4px; color: var(--muted); font-size: 12px; }

    .training-head-arrow {
      min-width: 36px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.52);
      background: rgba(255,255,255,0.03);
      flex: none;
    }

    .form-stack, .modal-form { display: grid; gap: 10px; }
    .form-numbers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    .input-wrap, .input-shell { position: relative; width: 100%; }

    .smart-field { position: relative; min-height: 58px; }

    .smart-field input {
      min-height: 58px;
      padding: 26px 14px 11px 14px;
      background: #161616;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.02),
        0 6px 16px rgba(0,0,0,0.08);
    }

    .smart-field input:focus {
      border-color: rgba(255, 100, 24, 0.76);
      box-shadow:
        0 0 0 3px rgba(255, 100, 24, 0.13),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .smart-field-label {
      position: absolute;
      top: 10px;
      left: 14px;
      z-index: 1;
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      font-weight: 800;
      color: rgba(255,255,255,0.46);
      pointer-events: none;
      white-space: nowrap;
    }

    .smart-field-right {
      position: absolute;
      top: 10px;
      right: 14px;
      z-index: 1;
      font-size: 12px;
      line-height: 1;
      font-weight: 800;
      pointer-events: none;
      text-align: right;
      white-space: nowrap;
      color: rgba(255,255,255,0.34);
    }

    .smart-field-right.progress { color: #00f07c; }
    .smart-field-right.regress { color: var(--danger); }
    .smart-field-right.equal { color: rgba(255,255,255,0.52); }
    .smart-field-right.new { color: var(--accent); }
    .smart-field-right.volume { color: var(--info); }
    .smart-field-right.both { color: var(--accent); }
    .smart-field-right.dash { color: rgba(255,255,255,0.55); }

    .smart-field.has-value .smart-field-right,
    .smart-field.focused .smart-field-right { opacity: 0.22; }

    .smart-field.static-box {
      min-height: 62px;
      padding: 25px 12px 11px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      display: flex;
      align-items: center;
    }

    .smart-field.static-box .smart-field-label,
    .smart-field.static-box .smart-field-right { top: 10px; }

    .smart-field.static-box .static-box-main {
      font-size: 13px;
      line-height: 1.15;
      font-weight: 820;
      color: #fff;
      word-break: break-word;
    }

    .smart-field.static-box.previous .static-box-main {
      color: rgba(255,255,255,0.48);
    }

    .smart-field input::placeholder { color: rgba(255,255,255,0.22); }
    .smart-field.exercise-field input { padding-right: 42px; }

    .input-clear {
      position: absolute;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      min-width: 28px;
      min-height: 28px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: transparent;
      box-shadow: none;
      color: rgba(255, 255, 255, 0.54);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
    }

    .input-wrap.has-value .input-clear { opacity: 1; pointer-events: auto; }
    .input-clear svg { width: 14px; height: 14px; display: block; }

    .search-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 30;
      display: none;
      max-height: min(300px, 48vh);
      overflow: auto;
      border-radius: 16px;
      background: #121212;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.32);
      overscroll-behavior: contain;
    }

    .search-dropdown.open { display: block; }

    .search-option {
      width: 100%;
      min-height: 56px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: #fff;
      text-align: left;
      padding: 12px 14px;
      box-shadow: none;
      font-weight: 650;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .search-option:last-child { border-bottom: 0; }

    .search-main {
      font-size: 15px;
      font-weight: 760;
      line-height: 1.2;
      word-break: break-word;
    }

    .search-secondary {
      margin-top: 4px;
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.3;
    }

    .history-highlight {
      background: rgba(255, 100, 24, 0.22);
      color: #fff;
      padding: 0 2px;
      border-radius: 4px;
    }

    .btn-card {
      min-height: 54px;
      padding: 0 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      box-shadow: none;
      font-weight: 750;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      line-height: 1;
    }

    .btn-muted { background: rgba(255, 255, 255, 0.06); }
    .btn-accent { color: var(--accent); background: var(--accent-soft); border-color: var(--accent-line); }
    .btn-danger { color: var(--danger); background: var(--danger-soft); border-color: var(--danger-line); }
    .btn-success { color: var(--success); background: var(--success-soft); border-color: var(--success-line); }
    .btn-info { color: var(--info); background: var(--info-soft); border-color: var(--info-line); }

    .icon-square {
      width: 44px;
      min-width: 44px;
      height: 44px;
      min-height: 44px;
      padding: 0;
      font-size: 14px;
      flex-shrink: 0;
      border-radius: 14px;
    }

    .fallback-finish {
      display: none;
      width: 100%;
      margin-top: 10px;
      background: #ff6418;
      color: #fff;
      border-color: rgba(255, 100, 24, 0.55);
    }

    .exercise {
      padding: 16px 0;
      border-bottom: 1px solid var(--line);
    }

    .exercise:last-child { border-bottom: 0; }

    .exercise-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      align-items: center;
    }

    .exercise-head-left { min-width: 0; flex: 1; }

    .exercise-name {
      font-size: 16px;
      font-weight: 820;
      overflow-wrap: anywhere;
    }

    .exercise-toggle {
      min-height: 38px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.84);
      font-size: 12px;
      font-weight: 760;
      box-shadow: none;
      flex: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .exercise-toggle svg {
      width: 14px;
      height: 14px;
      display: block;
      flex: none;
      opacity: 0.86;
    }

    .compare-text {
      margin-top: 2px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .compare-text.progress { color: #00f07c; }
    .compare-text.regress { color: var(--danger); }
    .compare-text.equal { color: var(--muted-strong); }
    .compare-text.new { color: var(--accent); }
    .compare-text.volume { color: var(--info); }
    .compare-text.both { color: var(--accent); }
    .compare-text.dash { color: rgba(255,255,255,0.55); }

    .current-set-card {
      position: relative;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at 100% 0%, rgba(255,100,24,0.08), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015)),
        rgba(255,255,255,0.02);
      overflow: hidden;
    }

    .current-set-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .current-set-index {
      font-size: 14px;
      color: rgba(255,255,255,0.56);
      font-weight: 760;
      line-height: 1.1;
      padding-top: 2px;
    }

    .current-set-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: none;
    }

    .current-set-values {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .current-set-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
    }

    .current-set-pill {
      min-height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      width: fit-content;
      white-space: nowrap;
      flex: none;
    }

    .current-set-pill.progress {
      color: #00f07c;
      background: rgba(0, 240, 124, 0.12);
      border-color: rgba(0, 240, 124, 0.28);
    }

    .current-set-pill.regress {
      color: var(--danger);
      background: var(--danger-soft);
      border-color: var(--danger-line);
    }

    .current-set-pill.equal {
      color: rgba(255,255,255,0.62);
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.08);
    }

    .current-set-pill.new {
      color: var(--accent);
      background: rgba(255, 100, 24, 0.1);
      border-color: rgba(255, 100, 24, 0.24);
    }

    .current-set-pill.volume {
      color: var(--info);
      background: rgba(135, 183, 255, 0.12);
      border-color: rgba(135, 183, 255, 0.28);
    }

    .current-set-pill.both {
      color: var(--accent);
      background: var(--accent-soft);
      border-color: var(--accent-line);

    .current-set-pill.dash {
      color: rgba(255,255,255,0.62);
      background: rgba(255,255,255,0.04);

    .compact-sets { display: grid; gap: 8px; }

    .compact-set-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: stretch;
    }

    .compact-set-row .smart-field.static-box {
      min-height: 58px;
      height: 58px;
      align-items: center;
    }

    .compact-set-actions {
      display: flex;
      align-items: stretch;
      gap: 6px;
      flex: none;
    }

    .compact-set-actions .icon-square {

      min-width: 44px;
      height: 58px;
      min-height: 58px;
      border-radius: 14px;
    }

    .history-categories { display: grid; gap: 10px; }

    .history-category {
      width: 100%;
      min-height: 92px;
      text-align: left;
      display: block;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.02)),
        rgba(255, 255, 255, 0.025);

    .history-category.custom { margin-top: 8px; border-color: rgba(255,100,24,0.16); }

    .history-category-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .history-category-title {
      font-weight: 820;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .history-category-sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .history-breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .link-btn {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      box-shadow: none;
      color: rgba(255,255,255,0.86);
      font-size: 13px;
      font-weight: 700;

    .history-list { display: grid; gap: 10px; }

    .history-row {

      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: stretch;
    }

    .history-item {
      width: 100%;
      min-height: 92px;
      text-align: left;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background:
        radial-gradient(circle at 100% 0%, rgba(255,100,24,0.06), transparent 30%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.02)),
        rgba(255, 255, 255, 0.025);

      border-radius: 22px;
      border: 1px solid var(--line);

    .history-item-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      min-width: 0;
    }

    .history-title-wrap {
      min-width: 0;
      flex: 1;
    }

    .history-title {

      font-size: 17px;
      margin-bottom: 2px;
      line-height: 1.22;
      word-break: break-word;
    }

    .history-status {
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 0 10px;
      width: fit-content;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.75);
    }

    .history-status.exported {
      color: var(--success);
      background: var(--success-soft);
      border-color: var(--success-line);
    }

    .history-status.pending {
      color: #ffb24a;
      background: rgba(255, 178, 74, 0.12);
      border-color: rgba(255, 178, 74, 0.28);
    }

    .history-status.failed {
      color: var(--danger);
      background: var(--danger-soft);
      border-color: var(--danger-line);
    }

    .history-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: center;
    }

    .history-action-btn {
      width: 52px;
      min-width: 52px;
      height: 42px;
      min-height: 42px;
      border-radius: 14px;
      font-size: 13px;
      padding: 0;
    }

    .progress-controls { display: grid; gap: 10px; }

    .progress-mode {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 5px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .progress-mode-btn {
      min-height: 42px;
      border-radius: 14px;
      background: transparent;
      border: 1px solid transparent;
      color: rgba(255, 255, 255, 0.68);
      font-weight: 760;
    }

    .progress-mode-btn.active {
      color: var(--accent);
      background: rgba(255, 100, 24, 0.12);
      border-color: rgba(255, 100, 24, 0.26);

    .progress-empty-card {

      padding: 24px 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);

      margin-top: 14px;
      display: grid;
      gap: 6px;
    }

    .progress-empty-card-title { font-size: 16px; font-weight: 820; margin-bottom: 2px; }

    .sync-pill {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.7);

      font-weight: 700;
      width: fit-content;
      justify-self: center;
    }

    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);

    .sync-pill.synced .sync-dot { background: var(--success); }
    .sync-pill.syncing .sync-dot { background: #ffb24a; }
    .sync-pill.failed .sync-dot { background: var(--danger); }

    .toast {

      bottom: calc(18px + var(--safe-bottom));

    .sheet {

    .sheet-actions {
      position: sticky;

      padding-top: 12px;
      margin-top: 12px;
      background: linear-gradient(180deg, transparent, rgba(11, 11, 11, 0.95) 44%, #0b0b0b 90%);
      display: grid;
      gap: 8px;
    }

    .sheet-actions > .btn-card { width: 100%; display: block; }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .modal-set-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 40px;
      padding: 8px 0;
    }

    .workout-modal-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
      min-width: 0;
    }

    .workout-modal-title-wrap {
      min-width: 0;
      flex: 1;
    }

    .edit-exercise-group { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line); }
    .edit-exercise-group:first-child { margin-top: 0; padding-top: 0; border-top: 0; }
    .edit-exercise-group > input { margin-bottom: 12px; }

    .edit-set-card {
      display: grid;
      grid-template-columns: 1fr 58px;
      gap: 8px;
      align-items: stretch;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.045);
      overflow: hidden;
    }

    .global-timer-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 60;
      transform: translate3d(0, 0, 0);
    }

    .global-timer {
      position: absolute;
      top: calc(12px + var(--safe-top));
      right: calc(12px + var(--safe-right));
      pointer-events: none;
    }

    .timer-widget {
      min-height: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 17px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(10, 10, 10, 0.28);
      color: rgba(255, 255, 255, 0.92);
      pointer-events: auto;
      touch-action: manipulation;
    }

    .timer-idle, .timer-live {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .timer-idle {
      color: rgba(255, 255, 255, 0.76);
      font-size: 15px;
      font-weight: 780;
    }

    .timer-live { color: rgba(255, 255, 255, 0.96); }

    .timer-icon {
      width: 14px;
      height: 14px;
      display: block;
      flex: none;
      color: var(--accent);
    }

    .timer-readout {
      font-size: 20px;
      line-height: 1;
      font-weight: 820;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }

    .timer-mark {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      opacity: 0.88;
      flex: none;
    }

    .timer-widget.running .timer-idle { display: none; }
    .timer-widget:not(.running) .timer-live { display: none; }

    @keyframes load {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(260%); }
    }

    @media (max-width: 420px) {
      .smart-field-label { font-size: 9px; }
      .current-set-values { grid-template-columns: 1fr 1fr; }
      .current-set-bottom { align-items: center; }
      .history-row { grid-template-columns: minmax(0, 1fr) 52px; }
      .history-actions { gap: 8px; }
      .history-action-btn { width: 52px; min-width: 52px; }
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <img class="splash-img" src="loading.jpg" alt="Загрузка" />
    <div class="splash-content">
      <div class="splash-title">Святилище<br /><span>ТРЕНЕРА</span></div>

    </div>
  </div>

  <div class="app">
    <header class="top">
      <div class="top-copy">

        <div class="meta" id="screenMeta">Загрузка данных</div>
      </div>

    <div class="tabs-shell">
      <nav class="tabs" id="tabsNav" data-active="0">
        <button class="tab active" type="button" data-tab="today">Трена</button>
        <button class="tab" type="button" data-tab="history">История</button>
        <button class="tab" type="button" data-tab="progress">Прогресс</button>
      </nav>
    </div>

    <main>
      <section class="panel active" id="todayPanel">
        <div id="typeChooserBlock">
          <section class="section">
            <div class="premium-chooser" id="typeChooser"></div>
            <button class="start-cta" id="startTrainingBtn" type="button" disabled>Начать тренировку</button>
          </section>
        </div>

        <div id="trainingScreen" style="display:none;">
          <section class="section">
            <button class="training-head" id="trainingHeadBtn" type="button">
              <div class="training-head-main">
                <div class="training-head-icon" id="trainingHeadIcon"></div>
                <div>
                  <div class="training-head-title" id="trainingHeadTitle">Тренировка</div>
                  <div class="training-head-sub">Нажми, чтобы сменить тип тренировки</div>
                </div>
              </div>

            </button>
          </section>

          <section class="section" id="addSetSection">
            <div class="section-title">Добавить подход</div>
            <div class="card" id="addSetCard">
              <div class="form-stack">
                <div class="input-wrap smart-field exercise-field" id="exerciseInputWrap">
                  <span class="smart-field-label" id="exerciseLabelLeft">Упражнение</span>
                  <span class="smart-field-right" id="exerciseLabelRight"></span>

                  <input
                    id="exerciseInput"
                    placeholder="Начни вводить название упражнения"

                    spellcheck="false"
                    aria-label="Упражнение"
                  />

                    id="exerciseClearBtn"
                    class="input-clear"
                    type="button"
                    aria-label="Очистить поле упражнения"
                  >
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                      <path d="M7.76 7.76a1 1 0 0 1 1.41 0L12 10.59l2.83-2.83a1 1 0 1 1 1.41 1.41L13.41 12l2.83 2.83a1 1 0 1 1-1.41 1.41L12 13.41l-2.83 2.83a1 1 0 1 1-1.41-1.41L10.59 12 7.76 9.17a1 1 0 0 1 0-1.41Z"></path>
                    </svg>
                  </button>

                  <div class="search-dropdown" id="exerciseDropdown"></div>
                </div>

                <div class="form-numbers">
                  <div class="input-shell smart-field" id="weightShell">
                    <span class="smart-field-label">Вес килограммы</span>
                    <span class="smart-field-right" id="weightHint"></span>
                    <input id="weightInput" placeholder="Введи вес" inputmode="decimal" aria-label="Вес килограммы" />
                  </div>

                  <div class="input-shell smart-field" id="repsShell">
                    <span class="smart-field-label">Повторения</span>
                    <span class="smart-field-right" id="repsHint"></span>
                    <input id="repsInput" placeholder="Введи количество повторений" inputmode="numeric" aria-label="Повторения" />
                  </div>
                </div>

                <div class="row">
                  <button id="prefillSetBtn" type="button" class="btn-card btn-muted" disabled>Подставить</button>
                  <button id="addSetBtn" type="button" class="btn-card btn-accent" disabled>Добавить</button>
                </div>

                <div class="muted" id="formHint"></div>
              </div>
            </div>
          </section>

          <section class="section">
            <div class="section-title">Текущая тренировка</div>
            <div class="card" id="draftList"></div>
            <button id="fallbackFinishBtn" type="button" class="fallback-finish btn-card">

    </main>

        <span class="timer-idle">
          <svg class="timer-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

        screenMeta: document.getElementById("screenMeta"),

        tabs: [...document.querySelectorAll(".tab")],
        panels: {
          today: document.getElementById("todayPanel"),
          history: document.getElementById("historyPanel"),
          progress: document.getElementById("progressPanel")
        },
        typeChooserBlock: document.getElementById("typeChooserBlock"),
        typeChooser: document.getElementById("typeChooser"),
        startTrainingBtn: document.getElementById("startTrainingBtn"),
        trainingScreen: document.getElementById("trainingScreen"),
        trainingHeadBtn: document.getElementById("trainingHeadBtn"),
        trainingHeadIcon: document.getElementById("trainingHeadIcon"),
        trainingHeadTitle: document.getElementById("trainingHeadTitle"),
        addSetSection: document.getElementById("addSetSection"),
        addSetCard: document.getElementById("addSetCard"),
        exerciseInputWrap: document.getElementById("exerciseInputWrap"),
        exerciseInput: document.getElementById("exerciseInput"),
        exerciseClearBtn: document.getElementById("exerciseClearBtn"),
        exerciseDropdown: document.getElementById("exerciseDropdown"),
        exerciseLabelLeft: document.getElementById("exerciseLabelLeft"),
        exerciseLabelRight: document.getElementById("exerciseLabelRight"),
        weightInput: document.getElementById("weightInput"),
        repsInput: document.getElementById("repsInput"),
        weightShell: document.getElementById("weightShell"),
        repsShell: document.getElementById("repsShell"),
        weightHint: document.getElementById("weightHint"),
        repsHint: document.getElementById("repsHint"),
        prefillSetBtn: document.getElementById("prefillSetBtn"),
        addSetBtn: document.getElementById("addSetBtn"),
        formHint: document.getElementById("formHint"),
        draftList: document.getElementById("draftList"),
        fallbackFinishBtn: document.getElementById("fallbackFinishBtn"),
        historyList: document.getElementById("historyList"),
        progressSelect: document.getElementById("progressSelect"),
        progressResult: document.getElementById("progressResult"),
        progressMetricBtns: [...document.querySelectorAll(".progress-mode-btn")],
        toast: document.getElementById("toast"),
        modal: document.getElementById("modal"),
        modalBody: document.getElementById("modalBody"),
        timerLayer: document.getElementById("timerLayer"),
        timerToggleBtn: document.getElementById("timerToggleBtn"),
        timerReadout: document.getElementById("timerReadout")
      };

      let cloudSaveTimer = 0;
      let cloudPollTimer = 0;
      let cloudResumeTimer = 0;
      let timerViewportRaf = 0;

      function id() {
        return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function createDraft() {
        return {
          id: id(),
          status: "draft",
          trainingType: "",
          createdAt: new Date().toISOString(),
          performedAt: new Date().toISOString(),
          exercises: [],
          isExported: false,
          exportError: "",
          exportedAt: ""
        };
      }

      function text(node, value) {
        if (node) node.textContent = value == null ? "" : String(value);
      }

      function make(tag, cls, content) {
        const node = document.createElement(tag);
        if (cls) node.className = cls;
        if (content !== undefined) text(node, content);
        return node;
      }

      function safeJsonParse(value, fallback = null) {
        try { return value ? JSON.parse(value) : fallback; } catch { return fallback; }
      }

      function safeStorageGet(key) {
        try { return localStorage.getItem(key); } catch { return null; }
      }

      function safeStorageSet(key, value) {
        try {
          localStorage.setItem(key, value);
          return true;
        } catch {
          toast("Не удалось сохранить данные");
          return false;
        }
      }

      function pickRandomWithoutRepeat(type, arr, previous) {
        if (!Array.isArray(arr) || !arr.length) return "";
        if (arr.length === 1) return arr[0];
        let next = arr[Math.floor(Math.random() * arr.length)];
        let tries = 0;
        while (next === previous && tries < 20) {
          next = arr[Math.floor(Math.random() * arr.length)];
          tries++;
        }
        return next;
      }

      function loadPhraseMemory() {
        const raw = safeJsonParse(safeStorageGet(CONFIG.phraseMemoryKey), {});
        state.phraseMemory = raw && typeof raw === "object" ? raw : {};
      }

      function savePhraseMemory() {
        safeStorageSet(CONFIG.phraseMemoryKey, JSON.stringify(state.phraseMemory));
      }

      function initRandomSubs() {
        const subs = {};
        Object.keys(TRAINING_TYPES).forEach((type) => {
          const prev = state.phraseMemory[type] || "";
          const next = pickRandomWithoutRepeat(type, TRAINING_TYPES[type].subVariants || [], prev);
          subs[type] = next;
          state.phraseMemory[type] = next;
        });
        state.randomSubs = subs;
        savePhraseMemory();
      }

      function getTypeSub(type) {
        return state.randomSubs[type] || "";
      }

      function getTypeLabel(type) {
        return TRAINING_TYPES[type]?.label || "Без типа";
      }

      function iconHtmlForType(type, extraClass = "premium-icon-img") {
        const item = TRAINING_TYPES[type];
        if (!item || !item.iconUrl) return "";
        return `<img class="${extraClass}" src="${item.iconUrl}" alt="${item.label || ""}" loading="lazy" decoding="async" onerror="this.style.display='none'">`;
      }

      function setTypeIcon(node, type, extraClass = "premium-icon-img") {
        if (!node) return;
        node.innerHTML = iconHtmlForType(type, extraClass);
      }

      function normalizeName(value) {
        return String(value || "").trim().toLowerCase().replace(/ё/g, "е");
      }

      function exerciseKey(value) { return normalizeName(value); }
      function sameName(a, b) { return normalizeName(a) === normalizeName(b); }

      function normalizeSearchText(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/ё/g, "е")
          .replace(/[^\p{L}\p{N}\s]+/gu, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function tokenize(value) {
        const normalized = normalizeSearchText(value);
        return normalized ? normalized.split(" ") : [];
      }

      function normalizeNumber(value) {
        return Number(String(value).trim().replace(",", "."));
      }

      function trimNumber(value) {
        const rounded = Math.round(Number(value) * 10) / 10;
        if (Number.isInteger(rounded)) return String(rounded);
        return String(rounded).replace(".", ",");
      }

      function parseSetInput(weightValue, repsValue) {
        const weight = normalizeNumber(weightValue);
        const reps = Number(String(repsValue).trim());
        if (!Number.isFinite(weight) || weight < 0) return null;
        if (!Number.isInteger(reps) || reps <= 0) return null;
        return { weight, reps };
      }

      function isComparableType(type) {
        return MAIN_TYPES.includes(type);
      }

      function getWorkoutTimestamp(workout) {
        const raw = workout.finishedAt || workout.performedAt || workout.createdAt || 0;
        const ts = new Date(raw).getTime();
        return Number.isFinite(ts) ? ts : 0;
      }

      function getStats(workout) {
        const exercises = workout.exercises.length;
        const sets = workout.exercises.reduce((sum, ex) => sum + ex.sets.length, 0);
        const volume = workout.exercises.reduce(
          (sum, ex) => sum + ex.sets.reduce((x, set) => x + set.weight * set.reps, 0),
          0
        );
        return { exercises, sets, volume };
      }

      function sanitizeWorkout(workout) {
        return {
          id: workout.id || id(),
          trainingType: workout.trainingType || "",
          status: workout.status || "completed",
          createdAt: workout.createdAt || new Date().toISOString(),
          finishedAt: workout.finishedAt,
          performedAt: workout.performedAt || workout.finishedAt || workout.createdAt || new Date().toISOString(),
          isExported: Boolean(workout.isExported),
          exportError: String(workout.exportError || ""),
          exportedAt: String(workout.exportedAt || ""),
          exercises: (workout.exercises || [])
            .filter((ex) => ex && ex.name && Array.isArray(ex.sets))
            .map((ex) => ({
              id: ex.id || id(),
              name: String(ex.name).trim(),
              sets: ex.sets
                .map((set) => ({
                  id: set.id || id(),
                  weight: Number(set.weight),
                  reps: Number(set.reps)
                }))
                .filter(
                  (set) =>
                    Number.isFinite(set.weight) &&
                    set.weight >= 0 &&
                    Number.isInteger(set.reps) &&
                    set.reps > 0
                )
            }))
            .filter((ex) => ex.name && ex.sets.length)
        };
      }

      function isValidDraft(value) {
        return value && value.status === "draft" && Array.isArray(value.exercises);
      }

      function loadDraftView() {
        const raw = safeJsonParse(safeStorageGet(CONFIG.draftViewKey), {});
        state.draftView = raw && typeof raw === "object" ? raw : {};
      }

      function saveDraftView() {
        safeStorageSet(CONFIG.draftViewKey, JSON.stringify(state.draftView));
      }

      function toast(message) {
        text(el.toast, message);
        el.toast.style.display = "block";
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => {
          el.toast.style.display = "none";
        }, CONFIG.toastDelay);
      }

      function haptic(type = "light") {
        if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred(type);
      }

      function hideKeyboard() {
        if (document.activeElement && document.activeElement.blur) {
          document.activeElement.blur();
        }
      }

      function showPopup(message) {
        if (tg && tg.showPopup) {
          return new Promise((resolve) =>
            tg.showPopup(
              {
                message,
                buttons: [
                  { id: "cancel", type: "cancel", text: "Отмена" },
                  { id: "ok", type: "default", text: "ОК" }
                ]
              },
              resolve
            )
          );
        }
        return Promise.resolve(confirm(message) ? "ok" : "cancel");
      }

      function buildSnapshot() {
        return {
          updatedAt: Date.now(),
          workouts: state.workouts,
          draft: state.draft
        };
      }

      function markSyncStatus(status, errorText = "") {
        state.cloud.status = status;
        state.cloud.lastError = errorText || "";
        updateMeta();
      }

      function persistNowLocal() {
        const snapshot = buildSnapshot();
        safeStorageSet(CONFIG.localDataKey, JSON.stringify(snapshot));
        safeStorageSet(CONFIG.storageKey, JSON.stringify(state.workouts));
        safeStorageSet(CONFIG.draftKey, JSON.stringify(state.draft));
        saveDraftView();
      }

      function cloudGetItem(key) {
        return new Promise((resolve) => {
          if (!state.cloud.enabled || !tg || !tg.CloudStorage) {
            resolve(null);
            return;
          }
          try {
            tg.CloudStorage.getItem(key, (error, value) => {
              if (error) {
                markSyncStatus("failed", typeof error === "string" ? error : "CloudStorage getItem error");
                resolve(null);
                return;
              }
              resolve(value || null);
            });
          } catch (err) {
            markSyncStatus("failed", err && err.message ? err.message : "CloudStorage getItem exception");
            resolve(null);
          }
        });
      }

      function cloudSetItem(key, value) {
        return new Promise((resolve) => {
          if (!state.cloud.enabled || !tg || !tg.CloudStorage) {
            resolve(false);
            return;
          }
          try {
            tg.CloudStorage.setItem(key, value, (error) => {
              if (error) {
                markSyncStatus("failed", typeof error === "string" ? error : "CloudStorage setItem error");
                resolve(false);
                return;
              }
              resolve(true);
            });
          } catch (err) {
            markSyncStatus("failed", err && err.message ? err.message : "CloudStorage setItem exception");
            resolve(false);
          }
        });
      }

      async function persistNowCloud() {
        if (!state.cloud.enabled) return false;
        if (state.cloud.saveInFlight) {
          state.cloud.pendingSave = true;
          return false;
        }

        state.cloud.saveInFlight = true;
        markSyncStatus("syncing");

        const snapshot = buildSnapshot();
        const ok = await cloudSetItem(CONFIG.cloudDataKey, JSON.stringify(snapshot));

        state.cloud.saveInFlight = false;

        if (ok) {
          markSyncStatus("synced");
        } else {
          markSyncStatus("failed", state.cloud.lastError || "Не удалось сохранить в облако");
          toast("CloudStorage: не удалось сохранить в облако");
        }

        if (state.cloud.pendingSave) {
          state.cloud.pendingSave = false;
          persistNowCloud();
        }

        return ok;
      }

      function scheduleCloudPersist(immediate = false) {
        clearTimeout(cloudSaveTimer);
        if (!state.cloud.enabled) return;

        if (immediate) {
          persistNowCloud();
          return;
        }

        markSyncStatus("syncing");
        cloudSaveTimer = setTimeout(() => {
          persistNowCloud();
        }, CONFIG.cloudSaveDebounce);
      }

      function persistCritical() {
        persistNowLocal();
        scheduleCloudPersist(true);
      }

      function rebuildIndexes() {
        state.workoutsById = new Map();
        state.exerciseCatalog.namesByKey = new Map();

        state.workouts.forEach((workout) => {
          state.workoutsById.set(workout.id, workout);
          workout.exercises.forEach((ex) => {
            const key = exerciseKey(ex.name);
            if (!state.exerciseCatalog.namesByKey.has(key)) {
              state.exerciseCatalog.namesByKey.set(key, ex.name);
            }
          });
        });

        state.draft.exercises.forEach((ex) => {
          const key = exerciseKey(ex.name);
          if (!state.exerciseCatalog.namesByKey.has(key)) {
            state.exerciseCatalog.namesByKey.set(key, ex.name);
          }
        });

        state.exerciseCatalog.sorted = [...state.exerciseCatalog.namesByKey.values()].sort((a, b) =>
          a.localeCompare(b, "ru")
        );

        state.exerciseCatalog.searchIndex = state.exerciseCatalog.sorted.map((name) => ({
          name,
          normalized: normalizeSearchText(name),
          tokens: tokenize(name)
        }));
      }

      function applySnapshot(snapshot) {
        state.workouts = (snapshot.workouts || [])
          .map(sanitizeWorkout)
          .filter((workout) => workout.exercises.length);

        state.workouts.sort((a, b) => getWorkoutTimestamp(b) - getWorkoutTimestamp(a));

        state.draft = isValidDraft(snapshot.draft)
          ? sanitizeWorkout(snapshot.draft)
          : createDraft();

        state.draft.status = "draft";
        rebuildIndexes();
      }

      async function syncFromCloud(force = false) {
        if (!state.cloud.enabled || state.cloud.syncInFlight) return false;

        state.cloud.syncInFlight = true;
        const raw = await cloudGetItem(CONFIG.cloudDataKey);
        const snapshot = safeJsonParse(raw, null);
        state.cloud.syncInFlight = false;

        if (!snapshot || !Array.isArray(snapshot.workouts) || !snapshot.draft) return false;

        const cloudUpdatedAt = Number(snapshot.updatedAt) || 0;
        const localSnapshot = safeJsonParse(safeStorageGet(CONFIG.localDataKey), buildSnapshot());
        const localUpdatedAt = Number(localSnapshot.updatedAt) || 0;

        if (force || cloudUpdatedAt > localUpdatedAt) {
          applySnapshot(snapshot);
          persistNowLocal();
          renderAll();
          markSyncStatus("synced");
          return true;
        }

        return false;
      }

      async function loadData() {
        loadDraftView();
        loadPhraseMemory();

        const localSnapshot = safeJsonParse(safeStorageGet(CONFIG.localDataKey), null);
        const localWorkouts = safeJsonParse(safeStorageGet(CONFIG.storageKey), []);
        const localDraft = safeJsonParse(safeStorageGet(CONFIG.draftKey), null);

        let finalSnapshot;
        if (localSnapshot && Array.isArray(localSnapshot.workouts) && localSnapshot.draft) {
          finalSnapshot = localSnapshot;
        } else {
          finalSnapshot = {
            updatedAt: Date.now(),
            workouts: Array.isArray(localWorkouts) ? localWorkouts : [],
            draft: isValidDraft(localDraft) ? localDraft : createDraft()
          };
        }

        if (state.cloud.enabled) {
          markSyncStatus("syncing");
          const cloudRaw = await cloudGetItem(CONFIG.cloudDataKey);
          const cloudSnapshot = safeJsonParse(cloudRaw, null);

          const localUpdatedAt = Number(finalSnapshot.updatedAt) || 0;
          const cloudUpdatedAt = Number(cloudSnapshot && cloudSnapshot.updatedAt) || 0;

          if (cloudSnapshot && Array.isArray(cloudSnapshot.workouts) && cloudSnapshot.draft) {
            if (cloudUpdatedAt >= localUpdatedAt) {
              finalSnapshot = cloudSnapshot;
            } else {
              await persistNowCloud();
            }
            markSyncStatus("synced");
          } else {
            await persistNowCloud();
          }
        }

        applySnapshot(finalSnapshot);
        initRandomSubs();
        persistNowLocal();
        renderAll();
        syncMainButtons();
        startCloudPolling();

        setTimeout(() => {
          el.splash.classList.add("hide");
        }, CONFIG.splashDelay);
      }

      function startCloudPolling() {
        stopCloudPolling();
        if (!state.cloud.enabled) return;

        cloudPollTimer = setInterval(() => {
          if (document.visibilityState !== "visible") return;
          syncFromCloud(false);
        }, CONFIG.cloudPollInterval);
      }

      function stopCloudPolling() {
        clearInterval(cloudPollTimer);
        cloudPollTimer = 0;
      }

      function scheduleCloudResumeSync() {
        clearTimeout(cloudResumeTimer);
        if (!state.cloud.enabled) return;
        cloudResumeTimer = setTimeout(() => {
          syncFromCloud(false);
        }, CONFIG.cloudResumeDebounce);
      }

      function isTrainingStarted() {
        return Boolean(state.draft.trainingType);
      }

      function resetHistorySelection() {
        state.historyUi.activeType = "";
      }

      function renderAll() {
        renderShell();
        renderCurrentPanel();
        scheduleTimerViewportSync();
      }

      function renderShell() {
        updateMeta();
        renderTabs();
        renderTodayMode();
        updateMainActions();
      }

      function renderCurrentPanel() {
        if (state.tab === "today") {
          renderTodayMode();
          renderDraft();
          updateForm();
          renderExerciseSearchResults(true);
          return;
        }

        if (state.tab === "history") {
          renderHistory();
          return;
        }

        renderProgress();
      }

      function updateMeta() {
        text(el.screenTitle, {
          today: "Трена",
          history: "История",
          progress: "Прогресс"
        }[state.tab]);

        if (state.tab === "today") {
          if (!isTrainingStarted()) {
            text(el.screenMeta, "Выбери тип тренировки и начни");
          } else {
            const stats = getStats(state.draft);
            text(
              el.screenMeta,
              `${getTypeLabel(state.draft.trainingType)} · ${stats.exercises} упражнений · ${stats.sets} подходов · ${Math.round(stats.volume)} кг`
            );
          }
        } else if (state.tab === "history") {
          text(el.screenMeta, state.historyUi.activeType ? "" : "Все типы тренировок");
        } else {
          let syncText = "Локально";
          if (state.cloud.enabled) {
            if (state.cloud.status === "syncing") syncText = "Синхронизация...";
            else if (state.cloud.status === "synced") syncText = "Облако синхронизировано";
            else if (state.cloud.status === "failed") syncText = `Ошибка синхронизации${state.cloud.lastError ? `: ${state.cloud.lastError}` : ""}`;
            else syncText = "Облако подключено";
          } else if (tg) {
            syncText = "CloudStorage недоступен";
          }
          text(el.screenMeta, syncText);
        }
      }

      function renderTabs() {
        el.tabsNav.dataset.active = String(tabOrder.indexOf(state.tab));
        el.tabs.forEach((tab) => {
          const active = tab.dataset.tab === state.tab;
          tab.classList.toggle("active", active);
          el.panels[tab.dataset.tab].classList.toggle("active", active);
        });
      }

      function renderTypeChooser() {
        el.typeChooser.replaceChildren();

        HISTORY_TYPE_ORDER.forEach((type) => {
          const item = TRAINING_TYPES[type];
          const btn = make("button", `premium-type${state.selectedStartType === type ? " active" : ""}`);
          btn.type = "button";
          btn.dataset.type = type;
          btn.innerHTML = `
            <span class="premium-icon">${iconHtmlForType(type)}</span>
            <span class="premium-copy">
              <span class="premium-title">${item.label}</span>
              <span class="premium-sub">${getTypeSub(type)}</span>
            </span>
            <span class="premium-check">✓</span>
          `;
          btn.addEventListener("click", () => {
            state.selectedStartType = type;
            renderTodayMode();
            syncMainButtons();
            haptic();
          });
          el.typeChooser.appendChild(btn);
        });

        el.startTrainingBtn.disabled = !state.selectedStartType;
      }

      function renderTodayMode() {
        const started = isTrainingStarted();
        el.typeChooserBlock.style.display = started ? "none" : "block";
        el.trainingScreen.style.display = started ? "block" : "none";

        if (!started) {
          renderTypeChooser();
        } else {
          text(el.trainingHeadTitle, getTypeLabel(state.draft.trainingType));
          setTypeIcon(el.trainingHeadIcon, state.draft.trainingType);
        }
      }

      function updateExerciseClear() {
        const hasValue = Boolean(el.exerciseInput.value.trim());
        el.exerciseInputWrap.classList.toggle("has-value", hasValue);
      }

      function getCurrentExerciseDraftCount(name) {
        const ex = state.draft.exercises.find((item) => sameName(item.name, name));
        return ex ? ex.sets.length : 0;
      }

      function getTemplateReference(exerciseName) {
        const type = state.draft.trainingType;
        if (!exerciseName || !type || !isComparableType(type)) return null;

        const key = exerciseKey(exerciseName);

        for (const workout of state.workouts) {
          if (workout.trainingType !== type) continue;
          const ex = workout.exercises.find((item) => exerciseKey(item.name) === key);
          if (ex) {
            return { workout, exercise: ex };
          }
        }

        return null;
      }

      function getPrefillSetForCurrentExercise(name) {
        if (!name || !isComparableType(state.draft.trainingType)) return null;
        const template = getTemplateReference(name);
        if (!template) return null;

        const currentCount = getCurrentExerciseDraftCount(name);
        return template.exercise.sets[currentCount] || null;
      }

      function updateFieldHints() {
        const name = el.exerciseInput.value.trim();

        el.exerciseLabelLeft.textContent = "Упражнение";
        el.exerciseLabelRight.textContent = "";
        el.weightHint.textContent = "";
        el.repsHint.textContent = "";

        if (!name) return;
        if (!isComparableType(state.draft.trainingType)) return;

        const prefill = getPrefillSetForCurrentExercise(name);
        if (!prefill) return;

        el.weightHint.textContent = trimNumber(prefill.weight);
        el.repsHint.textContent = String(prefill.reps);
      }

      function syncShellStates() {
        [el.exerciseInputWrap, el.weightShell, el.repsShell].forEach((shell) => {
          const input = shell.querySelector("input");
          shell.classList.toggle("has-value", Boolean(input && input.value.trim()));
        });
      }

      function updateForm() {
        const name = el.exerciseInput.value.trim();
        const parsed = parseSetInput(el.weightInput.value, el.repsInput.value);
        const valid = Boolean(name) && Boolean(parsed);

        el.addSetBtn.disabled = !valid;
        el.prefillSetBtn.disabled = !getPrefillSetForCurrentExercise(name);

        updateExerciseClear();
        updateFieldHints();
        syncShellStates();
        text(el.formHint, "");
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function highlightTextByTokens(textValue, queryTokens) {
        const textValueSafe = String(textValue || "");
        if (!queryTokens || !queryTokens.length) return escapeHtml(textValueSafe);

        const normalized = textValueSafe.toLowerCase().replace(/ё/g, "е");
        const ranges = [];

        queryTokens
          .slice()
          .sort((a, b) => b.length - a.length)
          .forEach((token) => {
            let from = 0;
            while (from < normalized.length) {
              const index = normalized.indexOf(token, from);
              if (index < 0) break;
              ranges.push([index, index + token.length]);
              from = index + token.length;
            }
          });

        if (!ranges.length) return escapeHtml(textValueSafe);

        ranges.sort((a, b) => a[0] - b[0]);
        const merged = [];
        for (const range of ranges) {
          const last = merged[merged.length - 1];
          if (!last || range[0] > last[1]) merged.push(range.slice());
          else last[1] = Math.max(last[1], range[1]);
        }

        let result = "";
        let cursor = 0;
        for (const [start, end] of merged) {
          result += escapeHtml(textValueSafe.slice(cursor, start));
          result += `<span class="history-highlight">${escapeHtml(textValueSafe.slice(start, end))}</span>`;
          cursor = end;
        }
        result += escapeHtml(textValueSafe.slice(cursor));
        return result;
      }

      function scoreExerciseRecord(record, queryTokens, normalizedQuery) {
        if (!normalizedQuery) return 0;
        if (record.normalized === normalizedQuery) return 1000;
        if (record.normalized.startsWith(normalizedQuery)) return 850;
        if (record.normalized.includes(` ${normalizedQuery}`)) return 740;
        if (record.normalized.includes(normalizedQuery)) return 620;

        let score = 0;
        for (const token of queryTokens) {
          if (record.normalized.startsWith(token)) score += 120;
          else if (record.normalized.includes(` ${token}`)) score += 90;
          else if (record.normalized.includes(token)) score += 50;
          else return 0;
        }
        return score;
      }

      function renderExerciseSearchResults(force = false) {
        if (!isTrainingStarted()) {
          closeExerciseDropdown();
          return;
        }

        const query = el.exerciseInput.value.trim();
        const normalizedQuery = normalizeSearchText(query);
        const queryTokens = tokenize(query);

        let nextResults;
        if (!normalizedQuery) {
          nextResults = state.exerciseCatalog.searchIndex
            .slice(0, CONFIG.searchMaxResults)
            .map((item) => item.name);
        } else {
          nextResults = state.exerciseCatalog.searchIndex
            .map((record) => ({
              name: record.name,
              score: scoreExerciseRecord(record, queryTokens, normalizedQuery)
            }))
            .filter((item) => item.score > 0)
            .sort((a, b) => {
              if (b.score !== a.score) return b.score - a.score;
              return a.name.localeCompare(b.name, "ru");
            })
            .slice(0, CONFIG.searchMaxResults)
            .map((item) => item.name);
        }

        if (
          !force &&
          state.search.exerciseQuery === query &&
          state.search.results.length === nextResults.length &&
          state.search.results.every((value, index) => value === nextResults[index])
        ) {
          return;
        }

        state.search.exerciseQuery = query;
        state.search.results = nextResults;
        el.exerciseDropdown.replaceChildren();

        if (document.activeElement !== el.exerciseInput) {
          closeExerciseDropdown();
          return;
        }

        if (!nextResults.length) {
          closeExerciseDropdown();
          return;
        }

        const fragment = document.createDocumentFragment();
        nextResults.forEach((name) => {
          const btn = make("button", "search-option");
          btn.type = "button";

          const template = getTemplateReference(name);
          btn.innerHTML = `
            <div class="search-main">${highlightTextByTokens(name, queryTokens)}</div>
            <div class="search-secondary">${
              template
                ? `Есть прошлое выполнение в типе «${getTypeLabel(state.draft.trainingType)}»`
                : "Есть в общей истории упражнений"
            }</div>
          `;
          btn.addEventListener("click", () => selectExerciseSuggestion(name));
          fragment.appendChild(btn);
        });

        el.exerciseDropdown.appendChild(fragment);
        el.exerciseDropdown.classList.add("open");
      }

      function formatDeltaPercent(delta, forceZero = false) {
        if (forceZero) return "0%";
        const rounded = Math.round(delta * 10) / 10;
        if (Math.abs(rounded) < 0.05) return "0%";
        const sign = rounded > 0 ? "+" : "";
        return `${sign}${rounded.toFixed(1)}%`;
      }

      function describeSetDelta(currentSet, previousSet) {
        if (!previousSet) {
          return {
            statusClass: "new",
            label: "Новый",
            compareText: "Подходов не было",
            compactText: "не было"
          };
        }

        const weightPrev = Number(previousSet.weight);
        const repsPrev = Number(previousSet.reps);
        const weightCurr = Number(currentSet.weight);
        const repsCurr = Number(currentSet.reps);

        const minW = Math.min(weightPrev, weightCurr);
        const maxW = Math.max(weightPrev, weightCurr);
        const weightRatio = maxW > 0 ? minW / maxW : 0;
        const repsDiff = Math.abs(repsPrev - repsCurr);

        if (!Number.isFinite(weightRatio) || weightRatio < 0.8 || repsDiff > 12) {
          return {
            statusClass: "dash",
            label: "Отдельно",
            compareText: "Сравнивать некорректно",
            compactText: "отдельно"
          };
        }

        const loadPrev = weightPrev * (1 + repsPrev / 30);
        const loadCurr = weightCurr * (1 + repsCurr / 30);
        const delta = loadPrev > 0 ? ((loadCurr - loadPrev) / loadPrev) * 100 : 0;

        if (delta < -2) {
          const pct = formatDeltaPercent(delta);
          return {
            statusClass: "regress",
            label: "Снижение",
            compareText: `Показатели падают (${pct})`,
            compactText: pct
          };
        }

        if (delta >= -2 && delta <= 2) {
          const pct = formatDeltaPercent(delta, true);
          return {
            statusClass: "equal",
            label: "Такой же",
            compareText: `Уровень держится (${pct})`,
            compactText: pct
          };
        }

        if (weightCurr > weightPrev && repsCurr > repsPrev) {
          const pct = formatDeltaPercent(delta);
          return {
            statusClass: "both",
            label: "Сила + Объем",
            compareText: `Дикая мощь (${pct})`,
            compactText: pct
          };
        }

        if (weightCurr > weightPrev && repsCurr <= repsPrev) {
          const pct = formatDeltaPercent(delta);
          return {
            statusClass: "progress",
            label: "Сила",
            compareText: `Вес растет (${pct})`,
            compactText: pct
          };
        }

        if (repsCurr > repsPrev && weightCurr <= weightPrev) {
          const pct = formatDeltaPercent(delta);
          return {
            statusClass: "volume",
            label: "Объем",
            compareText: `Больше повторений (${pct})`,
            compactText: pct
          };
        }

        const pct = formatDeltaPercent(delta, true);
        return {
          statusClass: "equal",
          label: "Такой же",
          compareText: `Уровень держится (${pct})`,
          compactText: pct
        };
      }

      function isExerciseCollapsed(exId) {
        return Boolean(state.draftView[exId]);
      }

      function toggleExerciseCollapsed(exId) {
        state.draftView[exId] = !state.draftView[exId];
