      function createStaticSetBox(label, value, rightValue, variant = "", rightClass = "") {
        const box = make("div", `smart-field static-box ${variant}`.trim());
        const left = make("span", "smart-field-label", label);
        const right = make("span", `smart-field-right ${rightClass}`.trim(), rightValue || "");
        const main = make("div", "static-box-main", value);
        box.append(left, right, main);
        return box;
      }

      function renderDraft() {
        el.draftList.replaceChildren();

        if (!isTrainingStarted()) {
          el.draftList.appendChild(make("div", "empty", "Сначала начни тренировку"));
          return;
        }

        if (!state.draft.exercises.length) {
          el.draftList.appendChild(make("div", "empty", "Пока нет подходов"));
          return;
        }

        const fragment = document.createDocumentFragment();

        state.draft.exercises.forEach((ex) => {
          const box = make("div", "exercise");
          const collapsed = isExerciseCollapsed(ex.id);

          const head = make("div", "exercise-head");
          const headLeft = make("div", "exercise-head-left");
          headLeft.appendChild(make("div", "exercise-name", ex.name));

          const toggleBtn = make("button", "exercise-toggle");
          toggleBtn.type = "button";
          toggleBtn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              ${collapsed
                ? '<path d="M6 15l6-6 6 6"></path>'
                : '<path d="M6 9l6 6 6-6"></path>'}
            </svg>
            <span>${collapsed ? "Развернуть" : "Свернуть"}</span>
          `;
          toggleBtn.onclick = () => {
            toggleExerciseCollapsed(ex.id);
            haptic();
          };

          head.append(headLeft, toggleBtn);
          box.appendChild(head);

          const template = getTemplateReference(ex.name);

          if (!collapsed) {
            ex.sets.forEach((set, index) => {
              const templateSet = template ? template.exercise.sets[index] : null;
              const delta = describeSetDelta(set, templateSet);

              const card = make("div", "current-set-card");

              const top = make("div", "current-set-top");
              const setIndex = make("div", "current-set-index", `${index + 1}-й подход`);

              const actions = make("div", "current-set-actions");

              const edit = make("button", "btn-card btn-accent icon-square", "✎");
              edit.type = "button";
              edit.onclick = () => openEditSetModal(ex.id, set.id);

              const del = make("button", "btn-card btn-danger icon-square", "×");
              del.type = "button";
              del.onclick = () => confirmDeleteDraftSet(ex.id, set.id, ex.name, index + 1);

              actions.append(edit, del);
              top.append(setIndex, actions);

              const values = make("div", "current-set-values");
              const currentValue = `${trimNumber(set.weight)} кг x ${set.reps}`;
              let previousValue = "";
              if (!templateSet) previousValue = "не было";
              else if (delta.statusClass === "dash") previousValue = "отдельно";
              else previousValue = `${trimNumber(templateSet.weight)} кг x ${templateSet.reps}`;

              values.append(
                createStaticSetBox("Сейчас", currentValue, "", "current"),
                createStaticSetBox("Прошлый раз", previousValue, "", "previous")
              );

              const bottom = make("div", "current-set-bottom");
              const compareText = make("div", `compare-text ${delta.statusClass}`, delta.compareText);
              const pill = make("div", `current-set-pill ${delta.statusClass}`, delta.label);

              bottom.append(compareText, pill);
              card.append(top, values, bottom);
              box.appendChild(card);
            });
          } else {
            const compact = make("div", "compact-sets");

            ex.sets.forEach((set, index) => {
              const templateSet = template ? template.exercise.sets[index] : null;
              const delta = describeSetDelta(set, templateSet);

              const row = make("div", "compact-set-row");
              const lineText = `${trimNumber(set.weight)} кг x ${set.reps}`;

              const valueBox = createStaticSetBox(
                `${index + 1}-й подход`,
                lineText,
                delta.compactText,
                "",
                delta.statusClass
              );

              const actions = make("div", "compact-set-actions");

              const edit = make("button", "btn-card btn-accent icon-square", "✎");
              edit.type = "button";
              edit.onclick = () => openEditSetModal(ex.id, set.id);

              const del = make("button", "btn-card btn-danger icon-square", "×");
              del.type = "button";
              del.onclick = () => confirmDeleteDraftSet(ex.id, set.id, ex.name, index + 1);

              actions.append(edit, del);
              row.append(valueBox, actions);
              compact.appendChild(row);
            });

            box.appendChild(compact);
          }

          fragment.appendChild(box);
        });

        el.draftList.appendChild(fragment);
      }

      async function confirmDeleteDraftSet(exId, setId, exerciseName, setIndex) {
        const answer = await showPopup(`Удалить ${setIndex}-й подход в упражнении «${exerciseName}»?\nЭто действие нельзя отменить.`);
        if (answer !== "ok") return;
        deleteDraftSet(exId, setId);
      }

      function deleteDraftSet(exId, setId) {
        const ex = state.draft.exercises.find((item) => item.id === exId);
        if (!ex) return;

        ex.sets = ex.sets.filter((set) => set.id !== setId);
        if (!ex.sets.length) {
          state.draft.exercises = state.draft.exercises.filter((item) => item.id !== exId);
          delete state.draftView[exId];
        }

        rebuildIndexes();
        haptic("medium");
        persistCritical();
        renderDraft();
        updateForm();
        updateMainActions();
        syncMainButtons();
        toast("Подход удален");
      }

      function openEditSetModal(exId, setId) {
        const ex = state.draft.exercises.find((item) => item.id === exId);
        const set = ex && ex.sets.find((item) => item.id === setId);
        if (!set) return;

        openSheet();
        el.modalBody.replaceChildren();

        const title = make("div", "title", "Редактировать подход");
        const form = make("div", "modal-form");

        const name = document.createElement("input");
        name.value = ex.name;
        name.placeholder = "Упражнение";

        const nums = make("div", "form-numbers");

        const weight = document.createElement("input");
        weight.value = String(set.weight);
        weight.inputMode = "decimal";
        weight.placeholder = "Вес";

        const reps = document.createElement("input");
        reps.value = String(set.reps);
        reps.inputMode = "numeric";
        reps.placeholder = "Повторения";

        nums.append(weight, reps);

        const save = make("button", "btn-card btn-accent", "Сохранить");
        save.type = "button";
        save.onclick = () => {
          const parsed = parseSetInput(weight.value, reps.value);
          if (!name.value.trim() || !parsed) {
            toast("Проверь упражнение, вес и повторы");
            return;
          }

          moveOrUpdateSet(state.draft, ex.id, set.id, name.value.trim(), parsed.weight, parsed.reps);
          closeModal();
        };

        const cancel = make("button", "btn-card btn-muted", "Отмена");
        cancel.type = "button";
        cancel.onclick = closeModal;

        form.append(name, nums, save, cancel);
        el.modalBody.append(title, form);
      }

      function moveOrUpdateSet(workout, exId, setId, newName, weight, reps) {
        const oldExercise = workout.exercises.find((ex) => ex.id === exId);
        if (!oldExercise) return;
        const index = oldExercise.sets.findIndex((set) => set.id === setId);
        if (index < 0) return;

        const sameExercise = sameName(oldExercise.name, newName);

        if (sameExercise) {
          oldExercise.sets[index].weight = weight;
          oldExercise.sets[index].reps = reps;
        } else {
          const updated = { ...oldExercise.sets[index], weight, reps };
          oldExercise.sets.splice(index, 1);
          let target = workout.exercises.find((ex) => sameName(ex.name, newName));
          if (!target) { target = { id: id(), name: newName, sets: [] }; workout.exercises.push(target); }
          target.sets.push(updated);
          if (!oldExercise.sets.length) {
            workout.exercises = workout.exercises.filter((ex) => ex.id !== oldExercise.id);
            delete state.draftView[oldExercise.id];
          }
        }

        rebuildIndexes();
        haptic();
        persistCritical();
        renderDraft();
        updateForm();
        updateMainActions();
        syncMainButtons();
        toast("Подход обновлен");
      }

      function updateMainActions() {
        const hasSets = getStats(state.draft).sets > 0;
        const shouldShowFallback = hasSets && state.tab === "today" && isTrainingStarted();
        el.fallbackFinishBtn.style.display = shouldShowFallback && !(tg && tg.MainButton) ? "block" : "none";
      }

      function syncMainButtons() {
        const mainButton = tg && tg.MainButton ? tg.MainButton : null;
        if (!mainButton) return;
        mainButton.offClick(startTrainingFlow);
        mainButton.offClick(finishWorkoutFlow);
        const hasStarted = isTrainingStarted();
        const hasSelectedType = Boolean(state.selectedStartType);
        const hasSets = getStats(state.draft).sets > 0;
        if (state.tab !== "today") { mainButton.hide(); return; }
        if (!hasStarted) {
          if (!hasSelectedType) { mainButton.hide(); return; }
          mainButton.setText("Начать тренировку");
          mainButton.setParams({ color: "#ff6418", text_color: "#ffffff", is_active: true, is_visible: true });
          mainButton.onClick(startTrainingFlow);
          mainButton.show();
          return;
        }
        if (hasSets) {
          mainButton.setText("Завершить тренировку");
          mainButton.setParams({ color: "#ff6418", text_color: "#ffffff", is_active: true, is_visible: true });
          mainButton.onClick(finishWorkoutFlow);
          mainButton.show();
          return;
        }
        mainButton.hide();
      }

      function getTelegramUserId() {
        const fromInit = tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id
          ? String(tg.initDataUnsafe.user.id)
          : "";
        if (fromInit) return fromInit;
        const fallback = safeStorageGet("tg_fallback_user_id");
        if (fallback) return fallback;

      }

      function formatDateDDMMYYYY(iso) {
        const d = new Date(iso);
        const dd = String(d.getDate()).padStart(2, "0");
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const yyyy = d.getFullYear();
        return `${dd}.${mm}.${yyyy}`;
      }

      function formatDateTimeDDMMYYYYHHMM(iso) {
        const d = new Date(iso);
        const dd = String(d.getDate()).padStart(2, "0");
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const yyyy = d.getFullYear();
        const hh = String(d.getHours()).padStart(2, "0");
        const min = String(d.getMinutes()).padStart(2, "0");
        return `${dd}.${mm}.${yyyy} ${hh}:${min}`;
      }

      function buildExportPayload(workout) {
        const performedAt = workout.performedAt || workout.finishedAt || workout.createdAt || new Date().toISOString();

        return {
          userId: getTelegramUserId() || "unknown_user",
          training: {
            id: workout.id,
            date: formatDateDDMMYYYY(performedAt),
            dateTime: formatDateTimeDDMMYYYYHHMM(performedAt),
            type: getTypeLabel(workout.trainingType),
            typeKey: workout.trainingType,
            columnLabel: TRAINING_TYPES[workout.trainingType]?.exportColumnLabel || getTypeLabel(workout.trainingType),
            exercisesDetailed: workout.exercises.map((ex) => ({
              name: ex.name,
              sets: ex.sets.map((set, index) => ({
                index: index + 1,
                text: `${index + 1}й подход: ${trimNumber(set.weight)}кг x ${set.reps}`,
                weight: set.weight,
                reps: set.reps
              }))
            }))
          }
        };
      }

      async function sendWorkoutToGoogleSheets(workout) {
        if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEBAPP_URL_HERE")) {
          throw new Error("Не указан URL Google Apps Script");
        }

        const payload = buildExportPayload(workout);

        let response;
        try {
          response = await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            headers: {
              "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify(payload)
          });
        } catch (networkError) {
          throw new Error("Сеть / CORS / недоступен Web App");
        }

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        let data = {};
        try {
          data = await response.json();
        } catch (parseError) {
          throw new Error("Apps Script вернул не JSON");
        }

        if (!data || data.ok !== true) {
          throw new Error(data && data.error ? data.error : "Ошибка выгрузки");
        }

        return data;
      }

      function setWorkoutExportState(workoutId, exported, errorText = "") {
        const workout = state.workouts.find((item) => item.id === workoutId);
        if (!workout) return;
        workout.isExported = Boolean(exported);
        workout.exportError = errorText || "";
        workout.exportedAt = exported ? new Date().toISOString() : "";
        rebuildIndexes();
        persistCritical();
        renderAll();
      }

      async function exportWorkoutById(workoutId, { silentSuccess = false } = {}) {
        const workout = state.workoutsById.get(workoutId);
        if (!workout) {
          toast("Тренировка не найдена");
          return false;
        }

        if (workout.isExported) {
          toast("Тренировка уже выгружена");
          return true;
        }

        if (state.export.inFlightIds.has(workoutId)) {
          toast("Выгрузка уже выполняется");
          return false;
        }

        try {
          state.export.inFlightIds.add(workoutId);
          renderAll();

          const responseData = await sendWorkoutToGoogleSheets(workout);

          setWorkoutExportState(workoutId, true, "");

          if (!silentSuccess) {
            if (responseData && responseData.duplicate === true) {
              toast("Тренировка уже была в таблице и помечена как выгруженная");
            } else {
              toast("Тренировка выгружена в таблицу");
            }
          }

          return true;
        } catch (error) {
          const message = error && error.message ? error.message : "Не удалось выгрузить тренировку";
          setWorkoutExportState(workoutId, false, message);
          toast(`Ошибка выгрузки: ${message}`);
          return false;
        } finally {
          state.export.inFlightIds.delete(workoutId);
          renderAll();
        }
      }

      async function finishWorkoutFlow() {
        if (!state.draft.trainingType) {
          toast("Сначала начни тренировку");
          return;
        }
        if (!getStats(state.draft).sets) return;

        const answer = await showPopup(`Завершить тренировку "${getTypeLabel(state.draft.trainingType)}"?`);
        if (answer !== "ok") return;

        const completedWorkout = sanitizeWorkout({
          ...state.draft,
          status: "completed",
          finishedAt: new Date().toISOString(),
          performedAt: state.draft.performedAt || new Date().toISOString(),
          isExported: false,
          exportError: "",
          exportedAt: ""
        });

        state.workouts.unshift(completedWorkout);
        state.selectedStartType = "";
        state.draft = createDraft();
        state.draftView = {};
        rebuildIndexes();
        haptic("heavy");
        persistCritical();
        renderAll();
        syncMainButtons();
        closeExerciseDropdown();
        hideKeyboard();
        scrollPageToDefaultTop();

        const exportOk = await exportWorkoutById(completedWorkout.id, { silentSuccess: true });
        if (exportOk) {
          const exportedWorkout = state.workoutsById.get(completedWorkout.id);
          if (exportedWorkout && exportedWorkout.isExported) {
            toast("Тренировка сохранена и выгружена");
          } else {
            toast("Тренировка сохранена");
          }
        } else {
          toast("Тренировка сохранена, но выгрузка не удалась");
        }
      }

      function getExportStatusData(workout) {
        if (state.export.inFlightIds.has(workout.id)) {
          return { cls: "pending", text: "Выгружается..." };
        }
        if (workout.isExported) {
          return { cls: "exported", text: "Выгружена" };
        }
        if (workout.exportError) {
          return { cls: "failed", text: "Не выгружена" };
        }
        return { cls: "", text: "Не выгружена" };
      }

      function formatDateTitle(iso) {
        const date = new Date(iso);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const day = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diff = Math.round((today - day) / 86400000);
        if (diff === 0) return "Сегодня";
        if (diff === 1) return "Вчера";
        return date.toLocaleDateString("ru-RU", { day: "2-digit", month: "2-digit", year: "numeric" });
      }

      function getRelativeDayLabel(iso) {
        const date = new Date(iso);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const day = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diff = Math.round((today - day) / 86400000);
        if (diff === 0) return "Сегодня";
        if (diff === 1) return "Вчера";
        return date.toLocaleDateString("ru-RU", { day: "2-digit", month: "2-digit", year: "numeric" });
      }

      function getWeekdayLabel(iso) {
        const date = new Date(iso);
        return date.toLocaleDateString("ru-RU", { weekday: "long" });
      }

      function formatHistoryCardTitle(workout) {
        const iso = workout.performedAt || workout.finishedAt || workout.createdAt;
        return `${getTypeLabel(workout.trainingType)} • ${getRelativeDayLabel(iso)}`;
      }

      function formatDateWithWeekday(iso) {
        const date = new Date(iso);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const day = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diff = Math.round((today - day) / 86400000);
        const weekday = date.toLocaleDateString("ru-RU", { weekday: "long" });
        if (diff === 0) return `сегодня, ${weekday}`;
        return `${weekday}, ${date.toLocaleDateString("ru-RU")}`;
      }

      function formatDateInputValue(iso) {
        const d = new Date(iso);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
      }

      function getWorkoutsByType(type) {
        return state.workouts.filter((w) => w.trainingType === type).sort((a, b) => getWorkoutTimestamp(b) - getWorkoutTimestamp(a));
      }

      function getLastWorkoutByType(type) {
        return getWorkoutsByType(type)[0] || null;
      }

      function renderHistory() {
        el.historyList.replaceChildren();

        if (!state.historyUi.activeType) {
          const wrap = make("div", "history-categories");
          HISTORY_TYPE_ORDER.forEach((type) => {
            const lastWorkout = getLastWorkoutByType(type);
            const btn = make("button", `history-category${type === "custom" ? " custom" : ""}`);
            btn.type = "button";
            btn.onclick = () => {
              state.historyUi.activeType = type;
              renderAll();
            };

            const row = make("div", "history-category-row");
            const icon = make("div", "history-category-icon");
            setTypeIcon(icon, type);
            const copy = make("div", "");
            copy.append(
              make("div", "history-category-title", getTypeLabel(type)),
              make("div", "history-category-sub", lastWorkout ? formatDateWithWeekday(lastWorkout.performedAt || lastWorkout.finishedAt || lastWorkout.createdAt) : "Пока нет тренировок")
            );
            row.append(icon, copy);
            btn.appendChild(row);
            wrap.appendChild(btn);
          });
          el.historyList.appendChild(wrap);
          return;
        }

        const type = state.historyUi.activeType;
        const workouts = getWorkoutsByType(type);

        const breadcrumb = make("div", "history-breadcrumb");
        const back = make("button", "link-btn", "← Назад");
        back.type = "button";
        back.onclick = () => {
          state.historyUi.activeType = "";
          renderAll();
        };
        breadcrumb.append(back);
        el.historyList.appendChild(breadcrumb);

        if (!workouts.length) {
          el.historyList.appendChild(make("div", "empty", "Пока нет тренировок"));
          return;
        }

        const list = make("div", "history-list");
        workouts.forEach((workout) => {
          const stats = getStats(workout);
          const exportStatus = getExportStatusData(workout);
          const row = make("div", "history-row");

          const open = make("button", "history-item");
          open.type = "button";
          open.onclick = () => openWorkout(workout.id);

          const top = make("div", "history-item-top");
          const icon = make("div", "history-item-icon");
          setTypeIcon(icon, workout.trainingType);
          const titleWrap = make("div", "history-title-wrap");
          titleWrap.append(
            make("div", "history-title", formatHistoryCardTitle(workout)),
            make("div", "muted", `${new Date(workout.performedAt || workout.finishedAt || workout.createdAt).toLocaleDateString("ru-RU")} • ${getWeekdayLabel(workout.performedAt || workout.finishedAt || workout.createdAt)}`)
          );
          top.append(icon, titleWrap);

          const statusNode = make("div", `history-status ${exportStatus.cls}`, exportStatus.text);

          open.append(
            top,
            make("div", "muted", `${stats.exercises} упражнений · ${stats.sets} подходов · ${Math.round(stats.volume)} кг`),
            statusNode
          );

          const actions = make("div", "history-actions");

          const exportBtn = make(
            "button",
            `btn-card history-action-btn ${workout.isExported ? "btn-success" : "btn-info"}`,
            workout.isExported ? "✓" : "↑"
          );
          exportBtn.type = "button";
          exportBtn.disabled = workout.isExported || state.export.inFlightIds.has(workout.id);
          exportBtn.title = workout.isExported ? "Уже выгружено" : "Выгрузить в таблицу";
          exportBtn.onclick = async (e) => {
            e.stopPropagation();
            await exportWorkoutById(workout.id);
          };

          const del = make("button", "btn-card btn-danger history-action-btn", "×");
          del.type = "button";
          del.onclick = (e) => { e.stopPropagation(); confirmDeleteWorkout(workout.id); };

          actions.append(exportBtn, del);
          row.append(open, actions);
          list.appendChild(row);
        });

        el.historyList.appendChild(list);
      }

      function openWorkout(workoutId) {
        const workout = state.workoutsById.get(workoutId);
        if (!workout) return;

        openSheet();
        el.modalBody.replaceChildren();

        const head = make("div", "workout-modal-head");
        const icon = make("div", "workout-modal-icon");
        setTypeIcon(icon, workout.trainingType);
        const titleWrap = make("div", "workout-modal-title-wrap");
        titleWrap.append(
          make("div", "title", getTypeLabel(workout.trainingType)),
          make("div", "meta", `${formatDateWithWeekday(workout.performedAt || workout.finishedAt || workout.createdAt)}`)
        );
        head.append(icon, titleWrap);

        const stats = getStats(workout);
        const exportStatus = getExportStatusData(workout);

        el.modalBody.append(
          head,
          make("div", "meta", `${stats.exercises} упражнений · ${stats.sets} подходов · ${Math.round(stats.volume)} кг`),
          make("div", `history-status ${exportStatus.cls}`, exportStatus.text)
        );

        workout.exercises.forEach((ex) => {
          const box = make("div", "exercise");
          box.appendChild(make("div", "exercise-name", ex.name));
          ex.sets.forEach((set, index) => {
            const row = make("div", "modal-set-row");
            row.append(
              make("div", "", `${index + 1}. ${trimNumber(set.weight)} кг × ${set.reps}`),
              make("div", "muted", `${Math.round(set.weight * set.reps)} кг`)
            );
            box.appendChild(row);
          });
          el.modalBody.appendChild(box);
        });

        const actions = make("div", "sheet-actions");

        if (!workout.isExported) {
          const exportBtn = make("button", "btn-card btn-info", state.export.inFlightIds.has(workout.id) ? "Выгружается..." : "Выгрузить в таблицу");
          exportBtn.type = "button";
          exportBtn.disabled = state.export.inFlightIds.has(workout.id);
          exportBtn.onclick = async () => {
            const ok = await exportWorkoutById(workout.id);
            if (ok) openWorkout(workout.id);
          };
          actions.append(exportBtn);
        }

        const edit = make("button", "btn-card btn-accent", "Редактировать");
        edit.type = "button";
        edit.onclick = () => openEditWorkout(workout.id);
        actions.append(edit);

        el.modalBody.appendChild(actions);
      }

      function createEditSetCard(weightValue = "", repsValue = "") {
        const card = make("div", "edit-set-card");
        const nums = make("div", "form-numbers");
        const weight = make("input", "");
        weight.value = weightValue;
        weight.inputMode = "decimal";
        weight.placeholder = "Вес";
        weight.dataset.kind = "weight";

        const reps = make("input", "");
        reps.value = repsValue;
        reps.inputMode = "numeric";
        reps.placeholder = "Повторения";
        reps.dataset.kind = "reps";

        nums.append(weight, reps);

        const del = make("button", "btn-card btn-danger icon-square", "×");
        del.type = "button";
        del.onclick = () => {
          const group = card.closest(".edit-exercise-group");
          const cards = [...group.querySelectorAll(".edit-set-card")];
          if (cards.length <= 1) group.remove();
          else card.remove();
        };

        card.append(nums, del);
        return card;
      }

      function createExerciseGroup(nameValue = "") {
        const group = make("div", "edit-exercise-group");
        group.dataset.exId = id();

        const name = make("input", "");
        name.value = nameValue;
        name.placeholder = "Упражнение";
        name.dataset.exName = "1";

        group.appendChild(name);
        group.appendChild(createEditSetCard("", ""));
        return group;
      }

      function openEditWorkout(workoutId) {
        const workout = state.workoutsById.get(workoutId);
        if (!workout) return;

        openSheet();
        el.modalBody.replaceChildren();

        const header = make("div", "title-row");
        const title = make("div", "title", "Редактировать тренировку");
        const addBtn = make("button", "btn-card btn-accent icon-square", "+");
        addBtn.type = "button";
        header.append(title, addBtn);
        el.modalBody.appendChild(header);

        const dateInput = document.createElement("input");
        dateInput.type = "date";
        dateInput.value = formatDateInputValue(workout.performedAt || workout.finishedAt || workout.createdAt);

        const form = make("div", "modal-form");
        form.append(dateInput);

        workout.exercises.forEach((ex) => {
          const group = make("div", "edit-exercise-group");
          group.dataset.exId = ex.id;
          const name = make("input", "");
          name.value = ex.name;
          name.dataset.exName = "1";
          group.appendChild(name);
          ex.sets.forEach((set) => {
            const card = createEditSetCard(String(set.weight), String(set.reps));
            card.dataset.setId = set.id;
            group.appendChild(card);
          });
          form.appendChild(group);
        });

        addBtn.onclick = () => { form.appendChild(createExerciseGroup("")); };

        const actions = make("div", "sheet-actions");
        const addExerciseBtn = make("button", "btn-card btn-muted", "Добавить упражнение");
        addExerciseBtn.type = "button";
        addExerciseBtn.onclick = () => { form.appendChild(createExerciseGroup("")); };

        const save = make("button", "btn-card btn-accent", "Сохранить");
        save.type = "button";
        save.onclick = () => saveWorkoutEdit(workoutId, form, dateInput);

        actions.append(addExerciseBtn, save);
        el.modalBody.append(form, actions);
      }

      function saveWorkoutEdit(workoutId, form, dateInput) {
        const oldWorkout = state.workoutsById.get(workoutId);
        if (!oldWorkout) return;

        const nextExercises = [];
        const groups = [...form.querySelectorAll(".edit-exercise-group")];

        for (const group of groups) {
          const nameInput = group.querySelector('input[data-ex-name="1"]');
          const name = nameInput ? nameInput.value.trim() : "";
          if (!name) {
            toast("Проверь название упражнения");
            return;
          }

          const cards = [...group.querySelectorAll(".edit-set-card")];
          if (!cards.length) continue;

          const sets = [];
          for (const card of cards) {
            const weightEl = card.querySelector('[data-kind="weight"]');
            const repsEl = card.querySelector('[data-kind="reps"]');
            const parsed = parseSetInput(weightEl.value, repsEl.value);
            if (!parsed) {
              toast("Проверь вес и повторы");
              return;
            }
            sets.push({ id: card.dataset.setId || id(), weight: parsed.weight, reps: parsed.reps });
          }

          nextExercises.push({ id: group.dataset.exId || id(), name, sets });
        }

        if (!nextExercises.length) {
          toast("Нельзя сохранить пустую тренировку");
          return;
        }

        const selectedDate = dateInput.value
          ? new Date(`${dateInput.value}T12:00:00`).toISOString()
          : oldWorkout.performedAt || oldWorkout.finishedAt || oldWorkout.createdAt;

        const newWorkout = sanitizeWorkout({
          ...oldWorkout,
          performedAt: selectedDate,
          exercises: nextExercises,
          isExported: false,
          exportError: "",
          exportedAt: ""
        });

        const workoutIndex = state.workouts.findIndex((item) => item.id === workoutId);
        if (workoutIndex < 0) return;

        state.workouts[workoutIndex] = newWorkout;
        state.workouts.sort((a, b) => getWorkoutTimestamp(b) - getWorkoutTimestamp(a));
        rebuildIndexes();
        persistCritical();
        renderAll();
        closeModal();
        toast("Тренировка обновлена");
      }

      async function confirmDeleteWorkout(workoutId) {
        const answer = await showPopup("Удалить тренировку?");
        if (answer !== "ok") return;
        deleteWorkout(workoutId);
      }

      function deleteWorkout(workoutId) {
        state.workouts = state.workouts.filter((item) => item.id !== workoutId);
        rebuildIndexes();
        closeModal();
        persistCritical();
        renderAll();
        toast("Тренировка удалена");
      }

      function getAllProgressEntriesByExercise() {
        const map = new Map();
        state.workouts.forEach((workout) => {
          workout.exercises.forEach((ex) => {
            const key = exerciseKey(ex.name);
            if (!map.has(key)) map.set(key, []);
            let bestWeight = 0;
            let volume = 0;
            let reps = 0;
            ex.sets.forEach((set) => {
              if (set.weight > bestWeight) bestWeight = set.weight;
              volume += set.weight * set.reps;
              reps += set.reps;
            });
            map.get(key).push({
              key,
              name: ex.name,
              date: workout.performedAt || workout.finishedAt || workout.createdAt,
              weight: bestWeight,
              volume,
              reps
            });
          });
        });
        for (const arr of map.values()) arr.sort((a, b) => new Date(a.date) - new Date(b.date));
        return map;
      }

      function formatMetricValue(value, metric) {
        if (metric === "volume") return `${Math.round(value)} кг`;
        if (metric === "reps") return `${Math.round(value)} повт.`;
        return `${trimNumber(value)} кг`;
      }

      function buildProgressEmpty(title, subtitle) {
        const box = make("div", "progress-empty-card");
        box.append(make("div", "progress-empty-card-title", title), make("div", "muted", subtitle));
        return box;
      }

      function buildSyncPill() {
        const map = {
          idle: { text: "Локальные данные", cls: "" },
          syncing: { text: "Синхронизация...", cls: "syncing" },
          synced: { text: "Облако синхронизировано", cls: "synced" },
          failed: { text: `Ошибка синхронизации${state.cloud.lastError ? `: ${state.cloud.lastError}` : ""}`, cls: "failed" }
        };
        const data = map[state.cloud.status] || map.idle;
        const pill = make("div", `sync-pill ${data.cls}`);
        pill.innerHTML = `<span class="sync-dot"></span><span>${data.text}</span>`;
        return pill;
      }

      function renderProgress() {
        const progressMap = getAllProgressEntriesByExercise();
        const currentValue = el.progressSelect.value;

        const fragment = document.createDocumentFragment();
        const empty = document.createElement("option");
        empty.value = "";
        empty.textContent = "Выбери упражнение";
        fragment.appendChild(empty);

        [...progressMap.values()].map((items) => items[0].name).sort((a, b) => a.localeCompare(b, "ru")).forEach((name) => {
          const option = document.createElement("option");
          option.value = name;
          option.textContent = name;
          fragment.appendChild(option);
        });

        el.progressSelect.replaceChildren(fragment);
        el.progressSelect.value = currentValue && [...progressMap.values()].some((items) => items[0].name === currentValue) ? currentValue : "";

        el.progressMetricBtns.forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.metric === state.progressMetric);
        });

        el.progressResult.replaceChildren();
        if (!el.progressSelect.value) {
          const box = buildProgressEmpty("Выбери упражнение", "");
          box.appendChild(buildSyncPill());
          el.progressResult.appendChild(box);
          return;
        }

        const entries = progressMap.get(exerciseKey(el.progressSelect.value)) || [];
        if (!entries.length) {
          const box = buildProgressEmpty("Пока нет данных", "");
          box.appendChild(buildSyncPill());
          el.progressResult.appendChild(box);
          return;
        }

        const metric = state.progressMetric;
        const first = entries[0];
        const last = entries[entries.length - 1];
        const best = entries.reduce((max, item) => item[metric] >= max[metric] ? item : max, entries[0]);

        const box = make("div", "progress-empty-card");
        box.append(
          make("div", "progress-empty-card-title", el.progressSelect.value),
          make("div", "muted", `Старт: ${formatMetricValue(first[metric], metric)}`),
          make("div", "muted", `Последнее: ${formatMetricValue(last[metric], metric)}`),
          make("div", "muted", `Лучшее: ${formatMetricValue(best[metric], metric)} · ${formatDateTitle(best.date)}`),
          buildSyncPill()
        );
        el.progressResult.appendChild(box);
      }

      function openSheet() {
        el.modal.classList.add("open");
      }

      function closeModal() {
        el.modal.classList.remove("open");
        hideKeyboard();
      }

      function formatStopwatch(ms) {
        const centiseconds = Math.floor(ms / 10) % 100;
        const totalSeconds = Math.floor(ms / 1000);
        const seconds = totalSeconds % 60;
        const minutes = Math.floor(totalSeconds / 60);
        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}.${String(centiseconds).padStart(2, "0")}`;
      }

      function renderTimer(ms = 0) {
        text(el.timerReadout, formatStopwatch(ms));
        el.timerToggleBtn.classList.toggle("running", state.timer.running);
      }

      function timerLoop(now) {
        if (!state.timer.running) return;
        if (!state.timer.lastPaintAt || now - state.timer.lastPaintAt >= 50) {
          state.timer.lastPaintAt = now;
          renderTimer(now - state.timer.startedAt);
        }
        state.timer.raf = requestAnimationFrame(timerLoop);
      }

      function toggleTimer() {
        if (state.timer.running) {
          cancelAnimationFrame(state.timer.raf);
          state.timer.running = false;
          state.timer.startedAt = 0;
          state.timer.raf = 0;
          state.timer.lastPaintAt = 0;
          renderTimer(0);
          return;
        }
        state.timer.running = true;
        state.timer.startedAt = performance.now();
        state.timer.lastPaintAt = 0;
        renderTimer(0);
        state.timer.raf = requestAnimationFrame(timerLoop);
      }

      function syncTimerViewportPosition() {
        const vv = window.visualViewport;
        const scrollX = window.scrollX || window.pageXOffset || 0;
        const scrollY = window.scrollY || window.pageYOffset || 0;
        const left = scrollX + (vv ? vv.offsetLeft : 0);
        const top = scrollY + (vv ? vv.offsetTop : 0);
        const width = vv ? vv.width : document.documentElement.clientWidth;
        const height = vv ? vv.height : window.innerHeight;
        el.timerLayer.style.width = `${Math.round(width)}px`;
        el.timerLayer.style.height = `${Math.round(height)}px`;
        el.timerLayer.style.transform = `translate3d(${Math.round(left)}px, ${Math.round(top)}px, 0)`;
      }

      function scheduleTimerViewportSync() {
        if (timerViewportRaf) return;
        timerViewportRaf = requestAnimationFrame(() => {
          timerViewportRaf = 0;
          syncTimerViewportPosition();
        });
      }

      function scrollPageToDefaultTop() {
        try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch (_) { window.scrollTo(0, 0); }
        try { document.documentElement.scrollTo({ top: 0, behavior: "smooth" }); } catch (_) { document.documentElement.scrollTop = 0; }
      }

      let activeScrollContext = null;

      function getElementTopInPage(node) {
        const rect = node.getBoundingClientRect();
        return (window.scrollY || window.pageYOffset || 0) + rect.top;
      }

      function getScrollableContextForField(field) {
        const sheet = field.closest(".sheet");
        const block =
          field.closest(".card") ||
          field.closest(".edit-exercise-group") ||
          field.closest(".current-set-card") ||
          field.closest(".exercise") ||
          field.closest(".sheet") ||
          field;
        return { container: sheet || window, block };
      }

      function getTargetTopInContainer(block, container) {
        if (container === window) return Math.max(0, getElementTopInPage(block));
        const blockRect = block.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();
        return Math.max(0, container.scrollTop + (blockRect.top - containerRect.top));
      }

      function getCurrentScrollTop(container) {
        return container === window ? (window.scrollY || window.pageYOffset || 0) : container.scrollTop;
      }

      function setScrollTop(container, top, behavior) {
        if (container === window) {
          try { window.scrollTo({ top, behavior }); } catch { window.scrollTo(0, top); }
          try { document.documentElement.scrollTo({ top, behavior }); } catch { document.documentElement.scrollTop = top; }
          return;
        }
        try { container.scrollTo({ top, behavior }); } catch { container.scrollTop = top; }
      }

      function alignFieldBlockToTop(context, preferSmooth = true) {
        if (!context || !context.block || !context.container) return;
        const targetTop = getTargetTopInContainer(context.block, context.container);
        const currentTop = getCurrentScrollTop(context.container);
        const delta = Math.abs(currentTop - targetTop);
        if (delta < 4) return;
        const behavior = preferSmooth && delta > 24 ? "smooth" : "auto";
        setScrollTop(context.container, targetTop, behavior);
        setTimeout(() => {
          const retryTop = getTargetTopInContainer(context.block, context.container);
          const retryCurrent = getCurrentScrollTop(context.container);
          if (Math.abs(retryCurrent - retryTop) > 8) setScrollTop(context.container, retryTop, "auto");
        }, 120);
        setTimeout(() => {
          const retryTop = getTargetTopInContainer(context.block, context.container);
          const retryCurrent = getCurrentScrollTop(context.container);
          if (Math.abs(retryCurrent - retryTop) > 8) setScrollTop(context.container, retryTop, "auto");
        }, 300);
      }

      function bindEvents() {
        el.tabs.forEach((tab) => {
          tab.addEventListener("click", () => {
            const nextTab = tab.dataset.tab;
            if (state.tab === nextTab) return;
            if (state.tab === "history" && nextTab !== "history") resetHistorySelection();
            if (nextTab === "history") resetHistorySelection();
            state.tab = nextTab;
            haptic();
            renderAll();
            syncMainButtons();
            scrollPageToDefaultTop();
          });
        });

        el.startTrainingBtn.addEventListener("click", startTrainingFlow);
        el.trainingHeadBtn.addEventListener("click", requestChangeTrainingType);

        el.exerciseInput.addEventListener("input", () => {
          updateForm();
          scheduleExerciseSearchRender();
        });
        el.exerciseInput.addEventListener("focus", () => {
          renderExerciseSearchResults(true);
        });
        el.exerciseInput.addEventListener("blur", () => {
          setTimeout(() => {
            if (document.activeElement && el.exerciseDropdown.contains(document.activeElement)) return;
            closeExerciseDropdown();
          }, 120);
        });

        el.weightInput.addEventListener("input", updateForm);
        el.repsInput.addEventListener("input", updateForm);

        el.exerciseClearBtn.addEventListener("click", clearExerciseInput);
        el.prefillSetBtn.addEventListener("click", fillSetPrefillForCurrentExercise);
        el.addSetBtn.addEventListener("click", addSet);
        el.fallbackFinishBtn.addEventListener("click", finishWorkoutFlow);

        el.exerciseInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            if (state.search.results.length) {
              e.preventDefault();
              selectExerciseSuggestion(state.search.results[0]);
              return;
            }
            if (!el.addSetBtn.disabled) {
              e.preventDefault();
              addSet();
            }
          }
        });

        el.repsInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !el.addSetBtn.disabled) {
            e.preventDefault();
            addSet();
          }
        });

        el.progressSelect.addEventListener("change", renderProgress);
        el.progressMetricBtns.forEach((btn) => {
          btn.addEventListener("click", () => {
            state.progressMetric = btn.dataset.metric;
            renderProgress();
          });
        });

        el.modal.addEventListener("click", (e) => {
          if (e.target === el.modal) closeModal();
        });

        document.addEventListener("click", (event) => {
          if (!el.exerciseInputWrap.contains(event.target)) closeExerciseDropdown();
        });

        el.timerToggleBtn.addEventListener("click", toggleTimer);

        document.addEventListener("pointerdown", (e) => {
          const field = e.target && e.target.closest && e.target.closest("input, select, textarea");
          if (!field) return;
          activeScrollContext = getScrollableContextForField(field);
          alignFieldBlockToTop(activeScrollContext, true);
        }, { passive: true });

        document.addEventListener("focusin", (e) => {
          const field = e.target && e.target.closest && e.target.closest("input, select, textarea");
          if (!field) return;
          activeScrollContext = getScrollableContextForField(field);
          alignFieldBlockToTop(activeScrollContext, true);
        }, true);

        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", () => {
            const activeField =
              document.activeElement &&
              document.activeElement.closest &&
              document.activeElement.closest("input, select, textarea");
            if (!activeField) return;
            activeScrollContext = getScrollableContextForField(activeField);
            alignFieldBlockToTop(activeScrollContext, false);
          }, { passive: true });
        }

        window.addEventListener("scroll", scheduleTimerViewportSync, { passive: true });
        window.addEventListener("resize", scheduleTimerViewportSync, { passive: true });
        window.addEventListener("focus", () => { scheduleCloudResumeSync(); });

        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "hidden") {
            persistNowLocal();
            persistNowCloud();
          } else {
            scheduleCloudResumeSync();
          }
        });

        window.addEventListener("pagehide", () => {
          persistNowLocal();
          persistNowCloud();
        });

        window.addEventListener("beforeunload", () => {
          persistNowLocal();
          persistNowCloud();
        });
      }

      function initTelegram() {
        if (!tg) return;
        tg.ready();
        tg.expand();
        if (tg.MainButton) {
          tg.MainButton.offClick(startTrainingFlow);
          tg.MainButton.offClick(finishWorkoutFlow);
          tg.MainButton.hide();
        }
      }

      async function init() {
        initTelegram();
        bindEvents();
        renderTimer(0);
        scheduleTimerViewportSync();
        await loadData();
      }

      init();
    })();
  </script>
</body>
</html>
