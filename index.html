      function saveWorkoutEdit(workoutId, form, dateInput) {
        const oldWorkout = state.workoutsById.get(workoutId);
        if (!oldWorkout) return;

        const nextExercises = [];
        const groups = [...form.querySelectorAll(".edit-exercise-group")];

        for (const group of groups) {
          const nameInput = group.querySelector('input[data-ex-name="1"]');
          const name = nameInput ? nameInput.value.trim() : "";

          if (!name) {
            const hasCards = group.querySelector(".edit-set-card") !== null;
            if (!hasCards) continue;
            toast("Проверь название упражнения");
            return;
          }

          const cards = [...group.querySelectorAll(".edit-set-card")];
          if (!cards.length) continue;

          const sets = [];

          for (const card of cards) {
            const weightEl = card.querySelector('[data-kind="weight"]');
            const repsEl = card.querySelector('[data-kind="reps"]');
            const parsed = parseSetInput(weightEl.value, repsEl.value);

            if (!parsed) {
              toast("Проверь вес и повторы");
              return;
            }

            sets.push({
              id: card.dataset.setId || id(),
              weight: parsed.weight,
              reps: parsed.reps
            });
          }

          nextExercises.push({
            id: group.dataset.exId || id(),
            name,
            sets
          });
        }

        if (!nextExercises.length) {
          toast("Нельзя сохранить пустую тренировку");
          return;
        }

        const selectedDate = dateInput.value
          ? new Date(`${dateInput.value}T12:00:00`).toISOString()
          : oldWorkout.performedAt || oldWorkout.finishedAt || oldWorkout.createdAt;

        const newWorkout = sanitizeWorkout({
          ...oldWorkout,
          performedAt: selectedDate,
          exercises: nextExercises,
          syncStatus: "pending"
        });

        const workoutIndex = state.workouts.findIndex((item) => item.id === workoutId);
        if (workoutIndex < 0) return;

        state.workouts[workoutIndex] = newWorkout;
        state.workouts.sort((a, b) => getWorkoutTimestamp(b) - getWorkoutTimestamp(a));
        fullRebuildIndexes();

        haptic();
        renderAll();
        schedulePersist(true);
        closeModal();
        toast("Значения тренировки уже были отправлены в таблицу");
      }

      function exportWorkoutCsv(workoutId) {
        const workout = state.workoutsById.get(workoutId);
        if (!workout) return;

        const rows = [["Дата", "Тип", "Упражнение", "Подход", "Вес", "Повторы", "Объём"]];

        workout.exercises.forEach((ex) => {
          ex.sets.forEach((set, index) => {
            rows.push([
              formatDateTitle(workout.performedAt || workout.finishedAt || workout.createdAt),
              getTypeLabel(workout.trainingType),
              ex.name,
              String(index + 1),
              String(set.weight),
              String(set.reps),
              String(Math.round(set.weight * set.reps))
            ]);
          });
        });

        const csv = rows
          .map((row) => row.map((cell) => `"${String(cell).replace(/"/g, '""')}"`).join(";"))
          .join("\n");

        const blob = new Blob(["\uFEFF" + csv], {
          type: "text/csv;charset=utf-8"
        });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = `${new Date(workout.performedAt || workout.finishedAt || workout.createdAt).toISOString().slice(0, 10)}_${getTypeLabel(workout.trainingType).replace(/\s+/g, "-")}.csv`;

        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        toast("CSV-файл создан");
      }

      async function confirmDeleteWorkout(workoutId) {
        const answer = await showPopup("Удалить тренировку?");
        if (answer !== "ok") return;
        deleteWorkout(workoutId);

      function deleteWorkout(workoutId) {
        const workout = state.workoutsById.get(workoutId);
        if (!workout) return;

        state.workouts = state.workouts.filter((item) => item.id !== workoutId);
        fullRebuildIndexes();

        closeModal();
        haptic("medium");
        renderAll();
        schedulePersist(true);
        toast("Тренировка удалена");
      }

      function getAllProgressEntriesByExercise() {
        const map = new Map();

        state.workouts.forEach((workout) => {
          workout.exercises.forEach((ex) => {
            const key = exerciseKey(ex.name);
            if (!map.has(key)) {
              map.set(key, []);
            }

            const sets = ex.sets.slice();
            let bestWeight = 0;
            let volume = 0;
            let reps = 0;

            sets.forEach((set) => {
              if (set.weight > bestWeight) bestWeight = set.weight;
              volume += set.weight * set.reps;
              reps += set.reps;
            });

            map.get(key).push({
              key,
              name: ex.name,
              date: workout.performedAt || workout.finishedAt || workout.createdAt,
              weight: bestWeight,
              volume,
              reps,
              workoutId: workout.id
            });
          });
        });

        for (const arr of map.values()) {
          arr.sort((a, b) => new Date(a.date) - new Date(b.date));
        }

        return map;
      }

      function renderProgress() {
        const selected = el.progressSelect.value;
        const fragment = document.createDocumentFragment();

        const all = getAllProgressEntriesByExercise();

        const empty = document.createElement("option");
        empty.value = "";
        text(empty, "Выбери упражнение");
        fragment.appendChild(empty);

        [...all.values()]
          .map((items) => items[0].name)
          .sort((a, b) => a.localeCompare(b, "ru"))
          .forEach((name) => {
            const option = document.createElement("option");
            option.value = name;
            text(option, name);
            fragment.appendChild(option);
          });

        el.progressSelect.replaceChildren(fragment);
        el.progressSelect.value = selected ? selected : "";

        renderProgressMetricButtons();
        showProgress(all);
      }

      function showProgress(progressMap) {
        const name = el.progressSelect.value;
        el.progressResult.replaceChildren();

        if (!name) {
          el.progressResult.appendChild(
            buildProgressEmpty(
              "Выбери упражнение",

          );

        const entries = progressMap.get(exerciseKey(name)) || [];

          );

        }

        const metric = state.progressMetric;
        const first = entries[0];
        const last = entries[entries.length - 1];
        const best = entries.reduce((max, item) => item[metric] >= max[metric] ? item : max, entries[0]);

        const box = make("div", "progress-empty-card");
        box.append(
          make("div", "progress-empty-card-title", name),
          make("div", "muted", `Последнее: ${trimNumber(last[metric])}${metric === "reps" ? " повт." : " кг"}`),
          make("div", "muted", `Лучшее: ${trimNumber(best[metric])}${metric === "reps" ? " повт." : " кг"} · ${formatDateTitle(best.date)}`),
          make("div", "muted", `Старт: ${trimNumber(first[metric])}${metric === "reps" ? " повт." : " кг"}`)
        );

        el.progressResult.appendChild(box);
      }

      function buildProgressEmpty(title, subtitle) {
        const box = make("div", "progress-empty-card");

      }

      function openSheet() {
        el.modal.classList.add("open");
        scheduleTimerViewportSync();

        if (tg && tg.BackButton) {
          tg.BackButton.offClick(closeModal);
          tg.BackButton.onClick(closeModal);
          tg.BackButton.show();
        }
      }

      function closeModal() {
        el.modal.classList.remove("open");
        hideKeyboard();
        scheduleTimerViewportSync();

        if (tg && tg.BackButton) {
          tg.BackButton.offClick(closeModal);
          tg.BackButton.hide();

      function animateRemove(node, done) {
        node.style.maxHeight = node.scrollHeight + "px";
        node.style.overflow = "hidden";
        requestAnimationFrame(() => node.classList.add("remove-anim"));
        setTimeout(() => {
          if (done) done();
          scheduleTimerViewportSync();
        }, 220);
      }

      function formatStopwatch(ms) {
        const centiseconds = Math.floor(ms / 10) % 100;
        const totalSeconds = Math.floor(ms / 1000);
        const seconds = totalSeconds % 60;
        const minutes = Math.floor(totalSeconds / 60);

        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}.${String(centiseconds).padStart(2, "0")}`;
      }

      function renderTimer(ms = 0) {
        const value = formatStopwatch(ms);

        if (el.timerReadout.textContent !== value) {
          text(el.timerReadout, value);
        }

        el.timerToggleBtn.classList.toggle("running", state.timer.running);
        el.timerToggleBtn.setAttribute(
          "aria-label",
          state.timer.running ? "Остановить и сбросить секундомер" : "Запустить секундомер"
        );
      }

      function timerLoop(now) {
        if (!state.timer.running) return;

        if (!state.timer.lastPaintAt || now - state.timer.lastPaintAt >= 50) {
          state.timer.lastPaintAt = now;
          renderTimer(now - state.timer.startedAt);
        }

        state.timer.raf = requestAnimationFrame(timerLoop);
      }

      function startTimer() {
        if (state.timer.running) return;

        state.timer.running = true;
        state.timer.startedAt = performance.now();
        state.timer.lastPaintAt = 0;
        renderTimer(0);
        haptic();
        state.timer.raf = requestAnimationFrame(timerLoop);
      }

      function stopTimer() {
        const wasRunning = state.timer.running;

        if (state.timer.raf) {
          cancelAnimationFrame(state.timer.raf);
        }

        state.timer.running = false;
        state.timer.startedAt = 0;
        state.timer.raf = 0;
        state.timer.lastPaintAt = 0;
        renderTimer(0);

        if (wasRunning) haptic("medium");
      }

      function toggleTimer() {
        if (state.timer.running) {
          stopTimer();
        } else {
          startTimer();
        }
      }

      function syncTimerViewportPosition() {
        const vv = window.visualViewport;
        const scrollX = window.scrollX || window.pageXOffset || 0;
        const scrollY = window.scrollY || window.pageYOffset || 0;

        const left = scrollX + (vv ? vv.offsetLeft : 0);
        const top = scrollY + (vv ? vv.offsetTop : 0);
        const width = vv ? vv.width : document.documentElement.clientWidth;
        const height = vv ? vv.height : window.innerHeight;

        el.timerLayer.style.width = `${Math.round(width)}px`;
        el.timerLayer.style.height = `${Math.round(height)}px`;
        el.timerLayer.style.transform = `translate3d(${Math.round(left)}px, ${Math.round(top)}px, 0)`;
      }

      function scheduleTimerViewportSync() {
        if (timerViewportRaf) return;

        timerViewportRaf = requestAnimationFrame(() => {
          timerViewportRaf = 0;
          syncTimerViewportPosition();
        });
      }

      function bindEvents() {
        el.tabs.forEach((tab) => {
          tab.addEventListener("click", () => {
            if (state.tab === tab.dataset.tab) return;
            state.tab = tab.dataset.tab;
            haptic();
            renderAll();
          });
        });

        el.typeButtons.forEach((btn) => {
          btn.addEventListener("click", () => {
            selectTrainingType(btn.dataset.type);
          });
        });

        el.changeTypeBtn.addEventListener("click", changeTrainingType);

        el.exerciseInput.addEventListener("input", () => {
          updateForm();
          scheduleExerciseSearchRender();
        });

        el.exerciseInput.addEventListener("focus", () => {
          renderExerciseSearchResults(true);
        });

        el.exerciseInput.addEventListener("blur", () => {
          setTimeout(() => {
            if (document.activeElement && el.exerciseDropdown.contains(document.activeElement)) return;
            closeExerciseDropdown();
          }, 120);
        });

        el.weightInput.addEventListener("input", updateForm);
        el.repsInput.addEventListener("input", updateForm);

        el.exerciseInput.addEventListener("change", fillLastSet);
        el.exerciseClearBtn.addEventListener("click", clearExerciseInput);
        el.addSetBtn.addEventListener("click", addSet);
        el.repeatSetBtn.addEventListener("click", fillLastSet);
        el.fallbackFinishBtn.addEventListener("click", finishWorkout);

        el.exerciseInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            if (state.search.results.length) {
              e.preventDefault();
              selectExerciseSuggestion(state.search.results[0]);
              return;
            }

            if (!el.addSetBtn.disabled) {
              e.preventDefault();
              addSet();
            }
          }
        });

        el.repsInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !el.addSetBtn.disabled) {
            e.preventDefault();
            addSet();
          }
        });

        el.progressSelect.addEventListener("change", () => {
          state.progressSelection.exercise = el.progressSelect.value;
          state.progressSelection.date = "";
          renderProgress();
        });

        el.progressMetricBtns.forEach((btn) => {
          btn.addEventListener("click", () => {
            if (state.progressMetric === btn.dataset.metric) return;
            state.progressMetric = btn.dataset.metric;
            renderProgressMetricButtons();
            renderProgress();
            haptic();
          });
        });

        el.modal.addEventListener("click", (e) => {
          if (e.target === el.modal) closeModal();
        });

        document.addEventListener("click", (event) => {
          if (!el.exerciseInputWrap.contains(event.target)) {
            closeExerciseDropdown();
          }
        });

        el.timerToggleBtn.addEventListener("click", toggleTimer);

        window.addEventListener("scroll", scheduleTimerViewportSync, { passive: true });
        window.addEventListener("resize", scheduleTimerViewportSync, { passive: true });
        window.addEventListener("orientationchange", scheduleTimerViewportSync);

        window.addEventListener("focus", () => {
          scheduleCloudResumeSync();
        });

        if (window.visualViewport) {
          window.visualViewport.addEventListener("scroll", scheduleTimerViewportSync, { passive: true });
          window.visualViewport.addEventListener("resize", scheduleTimerViewportSync, { passive: true });
        }

        window.addEventListener("pagehide", () => {
          clearTimeout(persistTimer);
          clearTimeout(cloudSaveTimer);
          persistNowLocal();
          persistNowCloud();
        });

        window.addEventListener("beforeunload", () => {
          clearTimeout(persistTimer);
          clearTimeout(cloudSaveTimer);
          persistNowLocal();
          persistNowCloud();
        });

        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "hidden") {
            clearTimeout(persistTimer);
            clearTimeout(cloudSaveTimer);
            persistNowLocal();
            persistNowCloud();
          } else if (document.visibilityState === "visible") {
            scheduleCloudResumeSync();
          }
        });
      }

      function initTelegram() {
        if (!tg) return;

        tg.ready();
        tg.expand();

        if (tg.MainButton) {
          tg.MainButton.offClick(finishWorkout);
          tg.MainButton.setParams({ color: "#ff6418", text_color: "#ffffff" });
          tg.MainButton.hide();
        }
      }

      async function init() {
        initTelegram();
        bindEvents();
        renderTimer(0);
        updateExerciseClear();
        scheduleTimerViewportSync();
        await loadData();
      }

      init();
    })();
  </script>
</body>
</html>
