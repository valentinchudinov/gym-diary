<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Святилище ТРЕНЕРА</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #070707;
      --surface: rgba(255, 255, 255, 0.055);
      --field: #171717;
      --line: rgba(255, 255, 255, 0.09);
      --text: #fff;
      --muted: rgba(255, 255, 255, 0.58);
      --accent: #ff6418;
      --accent-soft: rgba(255, 100, 24, 0.1);
      --accent-line: rgba(255, 100, 24, 0.24);
      --danger-soft: rgba(255, 70, 70, 0.12);
      --danger-line: rgba(255, 90, 90, 0.28);
      --danger-text: #ff8a8a;
      --radius: 18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --tab-index: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      position: relative;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      background:
        radial-gradient(circle at 80% 0%, rgba(255, 100, 24, 0.18), transparent 36%),
        linear-gradient(180deg, #12100f 0%, var(--bg) 46%);
      color: var(--text);
      padding: max(14px, var(--safe-top)) 14px calc(28px + var(--safe-bottom));
      font-size: 15px;
      overflow-x: hidden;
    }

    button,
    input,
    select {
      font: inherit;
      color: inherit;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 750;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition:
        transform 0.14s ease,
        background-color 0.16s ease,
        border-color 0.16s ease,
        box-shadow 0.16s ease,
        opacity 0.16s ease,
        color 0.16s ease;
    }

    button:disabled {
      opacity: 0.42;
      cursor: default;
    }

    input,
    select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: var(--field);
      color: #fff;
      outline: none;
      transition:
        border-color 0.16s ease,
        box-shadow 0.16s ease,
        transform 0.14s ease,
        opacity 0.16s ease;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.38);
    }

    input:focus,
    select:focus {
      border-color: rgba(255, 100, 24, 0.75);
      box-shadow: 0 0 0 3px rgba(255, 100, 24, 0.13);
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      padding-right: 148px;
      animation: softIn 0.24s ease both;
    }

    .top-copy {
      min-width: 0;
    }

    .title {
      font-size: 28px;
      line-height: 1.08;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .sheet .title {
      margin-bottom: 0;
    }

    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .section {
      margin-bottom: 16px;
      animation: softIn 0.24s ease both;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .card {
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 13px;
      margin-bottom: 10px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
      animation: softIn 0.24s ease both;
    }

    .empty,
    .progress-empty {
      padding: 22px 12px;
      text-align: center;
      color: var(--muted);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
      animation: panelSlide 0.22s cubic-bezier(.2, .8, .2, 1) both;
    }

    .splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      align-items: end;
      background: #050505;
      overflow: hidden;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    .splash.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.02);
      filter: saturate(0.98) brightness(0.86) contrast(1.02);
    }

    .splash::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.08),
        rgba(0, 0, 0, 0.18) 38%,
        rgba(0, 0, 0, 0.92)
      );
    }

    .splash-content {
      position: relative;
      z-index: 2;
      padding: 28px 22px calc(34px + var(--safe-bottom));
    }

    .splash-title {
      max-width: 360px;
      font-size: 42px;
      line-height: 1.05;
      font-weight: 850;
    }

    .splash-title span {
      color: var(--accent);
    }

    .splash-sub {
      margin-top: 12px;
      max-width: 310px;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.45;
    }

    .loader {
      width: 100%;
      height: 5px;
      margin-top: 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      overflow: hidden;
    }

    .loader i {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      animation: load 1.5s ease-in-out infinite;
    }

    .tabs-shell {
      width: 100%;
      padding: 7px;
      margin-bottom: 16px;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.055)),
        rgba(255, 255, 255, 0.075);
      border: 1px solid rgba(255, 255, 255, 0.13);
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      animation: softIn 0.24s ease both;
    }

    .tabs {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .tabs::before {
      content: "";
      position: absolute;
      z-index: 0;
      top: 0;
      bottom: 0;
      left: 0;
      width: calc((100% - 16px) / 3);
      border-radius: 18px;
      background: rgba(255, 100, 24, 0.14);
      border: 1px solid rgba(255, 100, 24, 0.32);
      box-shadow: 0 10px 22px rgba(255, 100, 24, 0.12);
      transform: translateX(calc(var(--tab-index) * (100% + 8px)));
      transition: transform 0.28s cubic-bezier(.2, .9, .2, 1);
      box-sizing: border-box;
    }

    .tabs[data-active="0"] {
      --tab-index: 0;
    }

    .tabs[data-active="1"] {
      --tab-index: 1;
    }

    .tabs[data-active="2"] {
      --tab-index: 2;
    }

    .tab {
      position: relative;
      z-index: 1;
      min-height: 50px;
      border-radius: 18px;
      background: transparent;
      border: 1px solid transparent;
      color: rgba(255, 255, 255, 0.72);
      box-shadow: none;
      font-size: 14px;
      transition: color 0.2s ease, transform 0.16s ease;
    }

    .tab.active {
      color: var(--accent);
    }

    .form-stack,
    .modal-form {
      display: grid;
      gap: 9px;
    }

    .form-numbers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row > * {
      flex: 1;
    }

    #formHint {
      text-align: center;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      padding-right: 38px;
    }

    .input-clear {
      position: absolute;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      min-width: 28px;
      min-height: 28px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: transparent;
      box-shadow: none;
      color: rgba(255, 255, 255, 0.54);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.16s ease,
        transform 0.16s ease,
        color 0.16s ease;
    }

    .input-wrap.has-value .input-clear {
      opacity: 1;
      pointer-events: auto;
    }

    .input-clear svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .input-clear:hover {
      color: rgba(255, 255, 255, 0.84);
    }

    .input-clear:active {
      transform: translateY(-50%) scale(0.9);
    }

    .btn-card {
      min-height: 54px;
      padding: 0 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: none;
      font-weight: 750;
    }

    .btn-muted {
      background: rgba(255, 255, 255, 0.06);
    }

    .btn-accent {
      color: var(--accent);
      background: var(--accent-soft);
      border-color: var(--accent-line);
    }

    .btn-danger {
      color: var(--danger-text);
      background: var(--danger-soft);
      border-color: var(--danger-line);
    }

    .icon-square {
      width: 54px;
      min-width: 54px;
      padding: 0;
      font-size: 18px;
    }

    #repeatSetBtn,
    #addSetBtn {
      min-height: 54px;
      border-radius: var(--radius);
      box-shadow: none;
    }

    #repeatSetBtn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
    }

    #addSetBtn {
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid var(--accent-line);
    }

    .fallback-finish {
      display: none;
      width: 100%;
      margin-top: 10px;
      background: #ff6418;
      color: #fff;
      border-color: rgba(255, 100, 24, 0.55);
    }

    .exercise {
      padding: 16px 0;
      border-bottom: 1px solid var(--line);
      animation: itemIn 0.2s cubic-bezier(.2, .8, .2, 1) both;
    }

    .exercise:last-child {
      border-bottom: 0;
    }

    .exercise-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }

    .exercise-name {
      font-size: 16px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .set-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      min-height: 46px;
      animation: itemIn 0.2s cubic-bezier(.2, .8, .2, 1) both;
      overflow: hidden;
    }

    .set-value {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 54px;
      padding: 14px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      font-weight: 700;
    }

    #draftList .set-row {
      grid-template-columns: 1fr 54px 54px;
      align-items: stretch;
      min-height: 54px;
      margin-bottom: 9px;
    }

    .history-month-title {
      margin: 18px 2px 10px;
      font-size: 15px;
      font-weight: 850;
      color: rgba(255, 255, 255, 0.78);
      animation: itemIn 0.2s cubic-bezier(.2, .8, .2, 1) both;
    }

    .history-row {
      display: grid;
      grid-template-columns: 1fr 54px 54px;
      gap: 8px;
      align-items: stretch;
      margin-bottom: 9px;
      overflow: hidden;
      animation: itemIn 0.2s cubic-bezier(.2, .8, .2, 1) both;
    }

    .history-item {
      width: 100%;
      min-height: 54px;
      text-align: left;
      display: block;
      background: var(--surface);
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .history-title {
      font-weight: 820;
      font-size: 17px;
      margin-bottom: 4px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 10px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 13px;
    }

    .stat-num {
      font-size: 23px;
      font-weight: 850;
      color: var(--accent);
      overflow-wrap: anywhere;
    }

    .chart-label {
      margin-top: 8px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* PROGRESS */
    .progress-controls {
      display: grid;
      gap: 10px;
    }

    .progress-mode {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 5px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .progress-mode-btn {
      min-height: 42px;
      border-radius: 14px;
      background: transparent;
      border: 1px solid transparent;
      color: rgba(255, 255, 255, 0.68);
      font-weight: 760;
      box-shadow: none;
    }

    .progress-mode-btn.active {
      color: var(--accent);
      background: rgba(255, 100, 24, 0.12);
      border-color: rgba(255, 100, 24, 0.26);
    }

    #progressResult {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .progress-hero {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      padding: 18px 16px 16px;
      min-height: 470px;
      background:
        radial-gradient(circle at 95% 100%, rgba(255, 84, 0, 0.26), transparent 30%),
        radial-gradient(circle at 30% -10%, rgba(255, 84, 0, 0.08), transparent 40%),
        linear-gradient(180deg, rgba(22, 22, 22, 0.96), rgba(10, 10, 10, 0.98));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .progress-hero::after {
      content: "";
      position: absolute;
      inset: auto -10% -20% 30%;
      height: 180px;
      background: radial-gradient(circle, rgba(255, 96, 0, 0.22), transparent 65%);
      pointer-events: none;
      filter: blur(18px);
    }

    .progress-kicker {
      position: relative;
      z-index: 1;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.88);
      font-weight: 820;
    }

    .progress-big {
      position: relative;
      z-index: 1;
      margin-top: 12px;
      font-size: clamp(42px, 12vw, 64px);
      line-height: 0.95;
      letter-spacing: -0.045em;
      font-weight: 860;
      color: #fff;
      text-wrap: balance;
    }

    .progress-focus {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .progress-focus-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 14px rgba(255, 100, 24, 0.75);
      flex: none;
    }

    .progress-focus-text {
      font-size: 12px;
      font-weight: 760;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.01em;
    }

    .progress-sub {
      position: relative;
      z-index: 1;
      margin-top: 10px;
      color: rgba(255, 255, 255, 0.62);
      font-size: 13px;
      line-height: 1.35;
    }

    .progress-hint {
      position: relative;
      z-index: 1;
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.44);
      font-size: 12px;
      line-height: 1.35;
    }

    .progress-chart {
      position: relative;
      z-index: 1;
      margin-top: 12px;
      margin-bottom: 8px;
      padding-bottom: 22px;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .progress-chart svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: hidden;
    }

    .progress-mini-stats {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 18px;
    }

    .progress-mini-stat {
      min-width: 0;
      padding: 10px 10px 11px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
    }

    .progress-mini-value {
      font-size: 16px;
      font-weight: 820;
      color: #fff;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .progress-mini-label {
      margin-top: 5px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.52);
    }

    .progress-empty-card {
      border-radius: 22px;
      padding: 24px 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at 90% 100%, rgba(255, 84, 0, 0.16), transparent 28%),
        linear-gradient(180deg, rgba(22, 22, 22, 0.96), rgba(10, 10, 10, 0.98));
      text-align: center;
    }

    .progress-empty-card-title {
      font-size: 16px;
      font-weight: 820;
      margin-bottom: 6px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + var(--safe-bottom));
      transform: translateX(-50%);
      max-width: calc(100vw - 28px);
      padding: 11px 15px;
      border-radius: 999px;
      background: rgba(20, 20, 20, 0.92);
      border: 1px solid var(--line);
      z-index: 95;
      display: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.64);
      display: none;
      align-items: flex-end;
      z-index: 80;
      backdrop-filter: blur(8px);
    }

    .modal.open {
      display: flex;
      animation: fadeIn 0.16s ease both;
    }

    .sheet {
      width: 100%;
      max-width: 560px;
      max-height: 88vh;
      margin: 0 auto;
      overflow: auto;
      background: #0b0b0b;
      border: 1px solid var(--line);
      border-radius: 24px 24px 0 0;
      padding: 18px 14px calc(28px + var(--safe-bottom));
      animation: sheetIn 0.24s cubic-bezier(.2, .9, .2, 1) both;
    }

    .handle {
      width: 42px;
      height: 4px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.22);
      margin: 0 auto 16px;
    }

    .sheet-actions {
      position: sticky;
      bottom: -14px;
      padding-top: 12px;
      margin-top: 12px;
      background: linear-gradient(
        180deg,
        transparent,
        rgba(11, 11, 11, 0.95) 44%,
        #0b0b0b 90%
      );
    }

    .sheet-actions > .btn-card {
      width: 100%;
      display: block;
    }

    .modal-set-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 40px;
      padding: 8px 0;
    }

    .edit-exercise-group {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .edit-exercise-group:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .edit-exercise-group > input {
      margin-bottom: 12px;
    }

    .edit-set-card {
      display: grid;
      grid-template-columns: 1fr 54px;
      gap: 8px;
      align-items: stretch;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.045);
      box-shadow: none;
      overflow: hidden;
    }

    .edit-set-card .form-numbers {
      min-width: 0;
    }

    .remove-anim {
      opacity: 0 !important;
      transform: translateX(18px) scale(0.96) !important;
      max-height: 0 !important;
      margin-top: 0 !important;
      margin-bottom: 0 !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      transition:
        opacity 0.22s ease,
        transform 0.22s ease,
        max-height 0.24s ease,
        margin 0.24s ease,
        padding 0.24s ease;
    }

    .flash {
      animation: flash 0.42s ease both;
    }

    .global-timer-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 60;
      transform: translate3d(0, 0, 0);
      will-change: transform, width, height;
    }

    .global-timer {
      position: absolute;
      top: calc(12px + var(--safe-top));
      right: calc(12px + var(--safe-right));
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .timer-widget {
      min-height: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 11px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(10, 10, 10, 0.34);
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(14px) saturate(120%);
      -webkit-backdrop-filter: blur(14px) saturate(120%);
      color: rgba(255, 255, 255, 0.92);
      pointer-events: auto;
      touch-action: manipulation;
      transition:
        transform 0.14s ease,
        border-color 0.18s ease,
        background-color 0.18s ease,
        color 0.18s ease,
        opacity 0.18s ease;
    }

    .timer-widget:active {
      transform: scale(0.97);
    }

    .timer-idle,
    .timer-live {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .timer-idle {
      color: rgba(255, 255, 255, 0.76);
      font-size: 14px;
      font-weight: 760;
      letter-spacing: 0.01em;
    }

    .timer-live {
      color: rgba(255, 255, 255, 0.96);
    }

    .timer-icon {
      width: 13px;
      height: 13px;
      display: block;
      flex: none;
      color: var(--accent);
    }

    .timer-readout {
      font-size: 17px;
      line-height: 1;
      font-weight: 820;
      letter-spacing: 0.045em;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.22);
    }

    .timer-mark {
      width: 14px;
      height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      opacity: 0.88;
      flex: none;
    }

    .timer-mark svg {
      width: 8px;
      height: 8px;
      display: block;
    }

    .timer-widget.running {
      border-color: rgba(255, 100, 24, 0.18);
      background: rgba(12, 12, 12, 0.42);
    }

    .timer-widget.running .timer-idle {
      display: none;
    }

    .timer-widget:not(.running) .timer-live {
      display: none;
    }

    button:active,
    .history-item:active {
      transform: scale(0.975);
    }

    .toast.show {
      animation: toastIn 0.18s ease both;
    }

    @keyframes load {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(260%); }
    }

    @keyframes softIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes panelSlide {
      from {
        opacity: 0;
        transform: translateX(14px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes itemIn {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translate(-50%, 8px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes sheetIn {
      from {
        opacity: 0;
        transform: translateY(26px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes flash {
      0% {
        box-shadow: 0 0 0 rgba(255, 100, 24, 0);
      }
      35% {
        box-shadow:
          0 0 0 3px rgba(255, 100, 24, 0.18),
          0 18px 44px rgba(255, 100, 24, 0.12);
      }
      100% {
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
      }
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <img class="splash-img" src="loading.jpg" alt="Загрузка" />
    <div class="splash-content">
      <div class="splash-title">Святилище<br /><span>ТРЕНЕРА</span></div>
      <div class="splash-sub">всем привет сегодня трена</div>
      <div class="loader"><i></i></div>
    </div>
  </div>

  <div class="app">
    <header class="top">
      <div class="top-copy">
        <div class="title" id="screenTitle">Трена</div>
        <div class="meta" id="screenMeta">Загрузка данных</div>
      </div>
    </header>

    <div class="tabs-shell">
      <nav class="tabs" id="tabsNav" data-active="0">
        <button class="tab active" type="button" data-tab="today">Трена</button>
        <button class="tab" type="button" data-tab="history">История</button>
        <button class="tab" type="button" data-tab="progress">Прогресс</button>
      </nav>
    </div>

    <main>
      <section class="panel active" id="todayPanel">
        <section class="section">
          <div class="section-title">Добавить подход</div>
          <div class="card">
            <div class="form-stack">
              <div class="input-wrap" id="exerciseInputWrap">
                <input
                  id="exerciseInput"
                  placeholder="Упражнение"
                  list="exerciseList"
                  autocomplete="off"
                />
                <button
                  id="exerciseClearBtn"
                  class="input-clear"
                  type="button"
                  aria-label="Очистить поле упражнения"
                >
                  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M7.76 7.76a1 1 0 0 1 1.41 0L12 10.59l2.83-2.83a1 1 0 1 1 1.41 1.41L13.41 12l2.83 2.83a1 1 0 1 1-1.41 1.41L12 13.41l-2.83 2.83a1 1 0 1 1-1.41-1.41L10.59 12 7.76 9.17a1 1 0 0 1 0-1.41Z"></path>
                  </svg>
                </button>
              </div>

              <div class="form-numbers">
                <input id="weightInput" placeholder="кг" inputmode="decimal" />
                <input id="repsInput" placeholder="Повторений" inputmode="numeric" />
              </div>

              <datalist id="exerciseList"></datalist>

              <div class="row">
                <button id="repeatSetBtn" type="button" disabled>Такой же</button>
                <button id="addSetBtn" type="button" disabled>Добавить</button>
              </div>

              <div class="muted" id="formHint">Выбери упражнение, вес и повторы</div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-title">Текущая тренировка</div>
          <div class="card" id="draftList"></div>
          <button id="fallbackFinishBtn" type="button" class="fallback-finish btn-card">
            Завершить тренировку
          </button>
        </section>
      </section>

      <section class="panel" id="historyPanel">
        <div id="historyList"></div>
      </section>

      <section class="panel" id="progressPanel">
        <div class="card">
          <div class="progress-controls">
            <select id="progressSelect"></select>

            <div class="progress-mode" id="progressMode">
              <button class="progress-mode-btn active" type="button" data-metric="weight">
                Вес
              </button>
              <button class="progress-mode-btn" type="button" data-metric="volume">
                Объём
              </button>
              <button class="progress-mode-btn" type="button" data-metric="reps">
                Повторы
              </button>
            </div>
          </div>

          <div id="progressResult"></div>
        </div>
      </section>
    </main>
  </div>

  <div class="global-timer-layer" id="timerLayer" aria-hidden="false">
    <div class="global-timer">
      <button
        class="timer-widget"
        id="timerToggleBtn"
        type="button"
        aria-label="Запустить секундомер"
      >
        <span class="timer-idle">
          <svg class="timer-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M8 6.5c0-.82.93-1.29 1.59-.81l8.15 5.95a1 1 0 0 1 0 1.62L9.59 19.2A1 1 0 0 1 8 18.39V6.5Z"></path>
          </svg>
          <span>Старт</span>
        </span>

        <span class="timer-live">
          <span class="timer-readout" id="timerReadout">00:00.00</span>
          <span class="timer-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <rect x="7" y="7" width="10" height="10" rx="2"></rect>
            </svg>
          </span>
        </span>
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal" id="modal">
    <div class="sheet">
      <div class="handle"></div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const CONFIG = {
        storageKey: "workouts_v4",
        draftKey: "draft_workout_v4",
        localDataKey: "trainer_data_v1",
        splashDelay: 4000,
        toastDelay: 2200
      };

      const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

      const state = {
        tab: "today",
        workouts: [],
        draft: createDraft(),
        exercises: new Set(),
        progressMetric: "weight",
        progressSelection: {
          exercise: "",
          date: ""
        },
        timer: {
          running: false,
          startedAt: 0,
          raf: 0
        }
      };

      const tabOrder = ["today", "history", "progress"];

      const el = {
        splash: document.getElementById("splash"),
        screenTitle: document.getElementById("screenTitle"),
        screenMeta: document.getElementById("screenMeta"),
        tabsNav: document.getElementById("tabsNav"),
        tabs: [...document.querySelectorAll(".tab")],
        panels: {
          today: document.getElementById("todayPanel"),
          history: document.getElementById("historyPanel"),
          progress: document.getElementById("progressPanel")
        },
        exerciseInputWrap: document.getElementById("exerciseInputWrap"),
        exerciseInput: document.getElementById("exerciseInput"),
        exerciseClearBtn: document.getElementById("exerciseClearBtn"),
        weightInput: document.getElementById("weightInput"),
        repsInput: document.getElementById("repsInput"),
        exerciseList: document.getElementById("exerciseList"),
        addSetBtn: document.getElementById("addSetBtn"),
        repeatSetBtn: document.getElementById("repeatSetBtn"),
        formHint: document.getElementById("formHint"),
        draftList: document.getElementById("draftList"),
        fallbackFinishBtn: document.getElementById("fallbackFinishBtn"),
        historyList: document.getElementById("historyList"),
        progressSelect: document.getElementById("progressSelect"),
        progressResult: document.getElementById("progressResult"),
        progressMetricBtns: [...document.querySelectorAll(".progress-mode-btn")],
        toast: document.getElementById("toast"),
        modal: document.getElementById("modal"),
        modalBody: document.getElementById("modalBody"),
        timerLayer: document.getElementById("timerLayer"),
        timerToggleBtn: document.getElementById("timerToggleBtn"),
        timerReadout: document.getElementById("timerReadout")
      };

      let timerViewportRaf = 0;
      let timerResizeObserver = null;

      function id() {
        return crypto.randomUUID
          ? crypto.randomUUID()
          : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function createDraft() {
        return {
          id: id(),
          status: "draft",
          createdAt: new Date().toISOString(),
          exercises: []
        };
      }

      function text(node, value) {
        if (node) node.textContent = value == null ? "" : String(value);
      }

      function make(tag, cls, content) {
        const node = document.createElement(tag);
        if (cls) node.className = cls;
        if (content !== undefined) text(node, content);
        return node;
      }

      function sameName(a, b) {
        return String(a || "").trim().toLowerCase() === String(b || "").trim().toLowerCase();
      }

      function normalizeNumber(value) {
        return Number(String(value).trim().replace(",", "."));
      }

      function trimNumber(value) {
        const rounded = Math.round(Number(value) * 10) / 10;
        if (Number.isInteger(rounded)) return String(rounded);
        return String(rounded).replace(".", ",");
      }

      function formatMetricValue(value, metric) {
        if (metric === "volume") return `${Math.round(value)} кг`;
        if (metric === "reps") return `${Math.round(value)} повт.`;
        return `${trimNumber(value)} кг`;
      }

      function formatDeltaValue(value, metric) {
        if (Math.abs(value) < 0.0001) return "0";
        const sign = value > 0 ? "+" : "−";
        return `${sign}${formatMetricValue(Math.abs(value), metric)}`;
      }

      function escapeSvgText(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function parseSetInput(weightValue, repsValue) {
        const weight = normalizeNumber(weightValue);
        const reps = Number(String(repsValue).trim());

        if (!Number.isFinite(weight) || weight < 0) return null;
        if (!Number.isInteger(reps) || reps <= 0) return null;

        return { weight, reps };
      }

      function safeJsonParse(value, fallback = null) {
        try {
          return value ? JSON.parse(value) : fallback;
        } catch {
          return fallback;
        }
      }

      function safeStorageGet(key) {
        try {
          return localStorage.getItem(key);
        } catch {
          return null;
        }
      }

      function safeStorageSet(key, value) {
        try {
          localStorage.setItem(key, value);
          return true;
        } catch {
          toast("Не удалось сохранить данные");
          return false;
        }
      }

      function getStats(workout) {
        const exercises = workout.exercises.length;
        const sets = workout.exercises.reduce((sum, ex) => sum + ex.sets.length, 0);
        const volume = workout.exercises.reduce(
          (sum, ex) => sum + ex.sets.reduce((x, set) => x + set.weight * set.reps, 0),
          0
        );
        return { exercises, sets, volume };
      }

      function isValidDraft(value) {
        return value && value.status === "draft" && Array.isArray(value.exercises);
      }

      function capitalize(value) {
        return String(value || "").replace(/^./, (ch) => ch.toUpperCase());
      }

      function sanitizeWorkout(workout) {
        return {
          id: workout.id || id(),
          status: workout.status || "completed",
          createdAt: workout.createdAt || new Date().toISOString(),
          finishedAt: workout.finishedAt,
          exercises: (workout.exercises || [])
            .filter((ex) => ex && ex.name && Array.isArray(ex.sets))
            .map((ex) => ({
              id: ex.id || id(),
              name: String(ex.name).trim(),
              sets: ex.sets
                .map((set) => ({
                  id: set.id || id(),
                  weight: Number(set.weight),
                  reps: Number(set.reps)
                }))
                .filter(
                  (set) =>
                    Number.isFinite(set.weight) &&
                    set.weight >= 0 &&
                    Number.isInteger(set.reps) &&
                    set.reps > 0
                )
            }))
            .filter((ex) => ex.name && ex.sets.length)
        };
      }

      function rebuildCatalog() {
        state.exercises = new Set();
        state.workouts.forEach((workout) => {
          workout.exercises.forEach((ex) => state.exercises.add(ex.name));
        });
        state.draft.exercises.forEach((ex) => state.exercises.add(ex.name));
      }

      function toast(message) {
        text(el.toast, message);
        el.toast.style.display = "block";
        el.toast.classList.remove("show");
        requestAnimationFrame(() => el.toast.classList.add("show"));
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => {
          el.toast.style.display = "none";
          el.toast.classList.remove("show");
        }, CONFIG.toastDelay);
      }

      function haptic(type = "light") {
        if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred(type);
      }

      function hideKeyboard() {
        if (document.activeElement && document.activeElement.blur) {
          document.activeElement.blur();
        }
      }

      function showPopup(message) {
        if (tg && tg.showPopup) {
          return new Promise((resolve) =>
            tg.showPopup(
              {
                message,
                buttons: [
                  { id: "cancel", type: "cancel", text: "Отмена" },
                  { id: "ok", type: "default", text: "ОК" }
                ]
              },
              resolve
            )
          );
        }

        return Promise.resolve(confirm(message) ? "ok" : "cancel");
      }

      function loadData() {
        const snapshot = safeJsonParse(safeStorageGet(CONFIG.localDataKey), null);

        if (snapshot && Array.isArray(snapshot.workouts) && snapshot.draft) {
          state.workouts = snapshot.workouts
            .map(sanitizeWorkout)
            .filter((workout) => workout.exercises.length);

          state.draft = isValidDraft(snapshot.draft)
            ? sanitizeWorkout(snapshot.draft)
            : createDraft();

          state.draft.status = "draft";
        } else {
          state.workouts = safeJsonParse(safeStorageGet(CONFIG.storageKey), [])
            .map(sanitizeWorkout)
            .filter((workout) => workout.exercises.length);

          const draft = safeJsonParse(safeStorageGet(CONFIG.draftKey), null);
          state.draft = isValidDraft(draft) ? sanitizeWorkout(draft) : createDraft();
          state.draft.status = "draft";
        }

        rebuildCatalog();
        renderAll();
        commit(false);
        setTimeout(() => el.splash.classList.add("hide"), CONFIG.splashDelay);
      }

      function commit(render = true) {
        rebuildCatalog();

        const snapshot = {
          updatedAt: Date.now(),
          workouts: state.workouts,
          draft: state.draft
        };

        safeStorageSet(CONFIG.localDataKey, JSON.stringify(snapshot));
        safeStorageSet(CONFIG.storageKey, JSON.stringify(state.workouts));
        safeStorageSet(CONFIG.draftKey, JSON.stringify(state.draft));

        if (render) renderAll();
      }

      function renderAll() {
        updateMeta();
        renderTabs();
        renderExerciseList();
        renderDraft();
        renderHistory();
        renderProgress();
        updateForm();
        updateMainActions();
        scheduleTimerViewportSync();
      }

      function updateMeta() {
        const stats = getStats(state.draft);

        text(
          el.screenTitle,
          {
            today: "Трена",
            history: "История",
            progress: "Прогресс"
          }[state.tab]
        );

        if (state.tab === "today") {
          text(
            el.screenMeta,
            `${stats.exercises} упражнений · ${stats.sets} подходов · ${Math.round(stats.volume)} кг`
          );
        } else if (state.tab === "history") {
          text(el.screenMeta, `${state.workouts.length} тренировок сохранено`);
        } else {
          const metricMeta = {
            weight: "Лучший вес по тренировкам",
            volume: "Объем упражнения по тренировкам",
            reps: "Повторы упражнения по тренировкам"
          };
          text(el.screenMeta, metricMeta[state.progressMetric]);
        }
      }

      function renderTabs() {
        el.tabsNav.dataset.active = String(tabOrder.indexOf(state.tab));

        el.tabs.forEach((tab) => {
          const active = tab.dataset.tab === state.tab;
          tab.classList.toggle("active", active);
          el.panels[tab.dataset.tab].classList.toggle("active", active);
        });
      }

      function renderExerciseList() {
        el.exerciseList.replaceChildren();

        [...state.exercises]
          .sort((a, b) => a.localeCompare(b, "ru"))
          .forEach((name) => {
            const option = document.createElement("option");
            option.value = name;
            el.exerciseList.appendChild(option);
          });
      }

      function updateExerciseClear() {
        const hasValue = Boolean(el.exerciseInput.value.trim());
        el.exerciseInputWrap.classList.toggle("has-value", hasValue);
      }

      function updateMainActions() {
        const hasSets = getStats(state.draft).sets > 0;
        const shouldShow = hasSets && state.tab === "today";
        const mainButton = tg && tg.MainButton ? tg.MainButton : null;

        el.fallbackFinishBtn.style.display = shouldShow && !mainButton ? "block" : "none";

        if (!mainButton) return;

        mainButton.offClick(finishWorkout);

        if (!shouldShow) {
          mainButton.hide();
          return;
        }

        mainButton.setText("Завершить тренировку");
        mainButton.setParams({ color: "#ff6418", text_color: "#ffffff" });
        mainButton.onClick(finishWorkout);
        mainButton.show();
      }

      function updateForm() {
        const name = el.exerciseInput.value.trim();
        const parsed = parseSetInput(el.weightInput.value, el.repsInput.value);
        const valid = Boolean(name) && Boolean(parsed);

        el.addSetBtn.disabled = !valid;
        el.repeatSetBtn.disabled = !getLastSet(name);
        updateExerciseClear();

        text(
          el.formHint,
          valid ? "Готово к добавлению" : "Выбери упражнение, вес и повторы"
        );
      }

      function clearExerciseInput() {
        el.exerciseInput.value = "";
        updateForm();
        el.exerciseInput.focus();
      }

      function getOrCreateDraftExercise(name) {
        let ex = state.draft.exercises.find((item) => sameName(item.name, name));

        if (!ex) {
          ex = { id: id(), name, sets: [] };
          state.draft.exercises.push(ex);
        }

        return ex;
      }

      function addSet() {
        const name = el.exerciseInput.value.trim();
        const parsed = parseSetInput(el.weightInput.value, el.repsInput.value);

        if (!name || !parsed) {
          toast("Проверь вес и повторы");
          return;
        }

        getOrCreateDraftExercise(name).sets.push({ id: id(), ...parsed });

        el.weightInput.value = "";
        el.repsInput.value = "";
        hideKeyboard();
        haptic();
        commit();

        el.draftList.classList.remove("flash");
        requestAnimationFrame(() => el.draftList.classList.add("flash"));
      }

      function getLastSet(name) {
        if (!name) return null;

        const draftExercise = state.draft.exercises.find((ex) => sameName(ex.name, name));
        if (draftExercise && draftExercise.sets.length) {
          return draftExercise.sets[draftExercise.sets.length - 1];
        }

        const sorted = [...state.workouts].sort(
          (a, b) => new Date(b.finishedAt) - new Date(a.finishedAt)
        );

        for (const workout of sorted) {
          const ex = workout.exercises.find((item) => sameName(item.name, name));
          if (ex && ex.sets.length) return ex.sets[ex.sets.length - 1];
        }

        return null;
      }

      function fillLastSet() {
        const last = getLastSet(el.exerciseInput.value.trim());
        if (!last) return;

        el.weightInput.value = last.weight;
        el.repsInput.value = last.reps;
        updateForm();
      }

      function renderDraft() {
        el.draftList.replaceChildren();

        if (!state.draft.exercises.length) {
          el.draftList.appendChild(make("div", "empty", "Пока нет подходов"));
          return;
        }

        state.draft.exercises.forEach((ex) => {
          const box = make("div", "exercise");
          const volume = ex.sets.reduce((sum, set) => sum + set.weight * set.reps, 0);

          const head = make("div", "exercise-head");
          head.append(
            make("div", "exercise-name", ex.name),
            make("div", "muted", `${ex.sets.length} подходов · ${Math.round(volume)} кг`)
          );

          box.appendChild(head);

          ex.sets.forEach((set, index) => {
            const row = make("div", "set-row");
            row.appendChild(
              make("div", "set-value", `${index + 1}. ${set.weight} кг × ${set.reps}`)
            );

            const edit = make("button", "btn-card btn-accent icon-square", "✎");
            edit.type = "button";
            edit.onclick = () => openEditSetModal(ex.id, set.id);

            const del = make("button", "btn-card btn-danger icon-square", "×");
            del.type = "button";
            del.onclick = () => animateRemove(row, () => deleteDraftSet(ex.id, set.id));

            row.append(edit, del);
            box.appendChild(row);
          });

          el.draftList.appendChild(box);
        });
      }

      function deleteDraftSet(exId, setId) {
        const ex = state.draft.exercises.find((item) => item.id === exId);
        if (!ex) return;

        ex.sets = ex.sets.filter((set) => set.id !== setId);
        state.draft.exercises = state.draft.exercises.filter((item) => item.sets.length);

        haptic("medium");
        commit();
        toast("Подход удален");
      }

      function openEditSetModal(exId, setId) {
        const ex = state.draft.exercises.find((item) => item.id === exId);
        const set = ex && ex.sets.find((item) => item.id === setId);
        if (!set) return;

        openSheet();
        el.modalBody.replaceChildren();

        const title = make("div", "title", "Редактировать подход");
        const form = make("div", "modal-form");

        const name = document.createElement("input");
        name.value = ex.name;

        const nums = make("div", "form-numbers");

        const weight = document.createElement("input");
        weight.value = set.weight;
        weight.inputMode = "decimal";

        const reps = document.createElement("input");
        reps.value = set.reps;
        reps.inputMode = "numeric";

        nums.append(weight, reps);

        const save = make("button", "btn-card btn-accent", "Сохранить");
        save.type = "button";
        save.onclick = () => {
          const parsed = parseSetInput(weight.value, reps.value);
          if (!name.value.trim() || !parsed) {
            toast("Проверь упражнение, вес и повторы");
            return;
          }

          moveOrUpdateSet(state.draft, exId, setId, name.value.trim(), parsed.weight, parsed.reps);
          closeModal();
        };

        const cancel = make("button", "btn-card btn-muted", "Отмена");
        cancel.type = "button";
        cancel.onclick = closeModal;

        form.append(name, nums, save, cancel);
        el.modalBody.append(title, form);
      }

      function moveOrUpdateSet(workout, exId, setId, newName, weight, reps) {
        const oldExercise = workout.exercises.find((ex) => ex.id === exId);
        if (!oldExercise) return;

        const index = oldExercise.sets.findIndex((set) => set.id === setId);
        if (index < 0) return;

        const updated = { ...oldExercise.sets[index], weight, reps };
        oldExercise.sets.splice(index, 1);

        let target = workout.exercises.find((ex) => sameName(ex.name, newName));
        if (!target) {
          target = { id: id(), name: newName, sets: [] };
          workout.exercises.push(target);
        }

        target.sets.push(updated);
        workout.exercises = workout.exercises.filter((ex) => ex.sets.length);

        haptic();
        commit();
        toast("Подход обновлен");
      }

      async function finishWorkout() {
        if (!getStats(state.draft).sets) return;

        const answer = await showPopup("Завершить тренировку?");
        if (answer !== "ok") return;

        state.workouts.push({
          ...state.draft,
          status: "completed",
          finishedAt: new Date().toISOString()
        });

        state.draft = createDraft();

        haptic("heavy");
        commit();
        toast("Тренировка сохранена");
      }

      function renderProgress() {
        const selected = el.progressSelect.value;
        const names = [...state.exercises].sort((a, b) => a.localeCompare(b, "ru"));

        el.progressSelect.replaceChildren();

      function renderProgressMetricButtons() {
        el.progressMetricBtns.forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.metric === state.progressMetric);
        });
      }

      function getExerciseProgressEntries(name) {
        const entries = [];

        state.workouts
          .slice()
          .sort((a, b) => new Date(a.finishedAt) - new Date(b.finishedAt))
          .forEach((workout) => {
            const matchedSets = [];

            workout.exercises.forEach((ex) => {
              if (!sameName(ex.name, name)) return;
              ex.sets.forEach((set) => matchedSets.push(set));
            });

            if (!matchedSets.length) return;

            const bestWeight = Math.max(...matchedSets.map((set) => set.weight));
            const volume = matchedSets.reduce((sum, set) => sum + set.weight * set.reps, 0);
            const reps = matchedSets.reduce((sum, set) => sum + set.reps, 0);

            entries.push({
              date: workout.finishedAt,
              weight: bestWeight,
              volume,
              reps,
              sets: matchedSets.length
            });
          });

        return entries;
      }

      function formatProgressAxisLabel(iso) {
        const date = new Date(iso);
        return date.toLocaleDateString("ru-RU", {
          day: "2-digit",
          month: "2-digit"
        });
      }

      function formatProgressMetaDate(iso) {
        const date = new Date(iso);
        return date.toLocaleDateString("ru-RU", {
          day: "numeric",
          month: "short"
        }).replace(".", "");
      }

      function formatExactDate(iso) {
        return new Date(iso).toLocaleDateString("ru-RU", {
          day: "numeric",
          month: "long",
          year: "numeric"
        });
      }

      function buildSmoothPath(points) {
        if (points.length < 2) return "";

        const tension = 0.18;
        let path = `M ${points[0].x.toFixed(2)} ${points[0].y.toFixed(2)}`;

        for (let i = 0; i < points.length - 1; i++) {
          const p0 = points[i - 1] || points[i];
          const p1 = points[i];
          const p2 = points[i + 1];
          const p3 = points[i + 2] || p2;

          const cp1x = p1.x + (p2.x - p0.x) * tension;
          const cp1y = p1.y + (p2.y - p0.y) * tension;
          const cp2x = p2.x - (p3.x - p1.x) * tension;
          const cp2y = p2.y - (p3.y - p1.y) * tension;

          path += ` C ${cp1x.toFixed(2)} ${cp1y.toFixed(2)}, ${cp2x.toFixed(2)} ${cp2y.toFixed(2)}, ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
        }

        return path;
      }

      function buildProgressSvg(entries, metric, selectedIndex) {
        const width = 360;
        const height = 308;
        const left = 16;
        const right = 12;
        const top = 24;
        const bottom = 88;
        const baseY = height - bottom;
        const chartHeight = baseY - top;

        const values = entries.map((entry) => entry[metric]);
        let minValue = Math.min(...values);
        let maxValue = Math.max(...values);

        if (minValue === maxValue) {
          minValue = Math.max(0, minValue - 1);
          maxValue = maxValue + 1;
        } else {
          const span = maxValue - minValue;
          minValue = Math.max(0, minValue - span * 0.18);
          maxValue = maxValue + span * 0.12;
        }

        const innerWidth = width - left - right;
        const stepX = entries.length > 1 ? innerWidth / (entries.length - 1) : 0;

        const points = entries.map((entry, index) => {
          const ratio = (entry[metric] - minValue) / (maxValue - minValue || 1);
          return {
            x: entries.length > 1 ? left + stepX * index : left + innerWidth / 2,
            y: baseY - ratio * chartHeight,
            value: entry[metric],
            label: formatProgressAxisLabel(entry.date)
          };
        });

        const safeSelectedIndex = Math.min(
          Math.max(Number(selectedIndex) || 0, 0),
          Math.max(points.length - 1, 0)
        );
        const selected = points[safeSelectedIndex];

        const smoothPath = buildSmoothPath(points);
        const areaPath = smoothPath
          ? `${smoothPath} L ${points[points.length - 1].x.toFixed(2)} ${baseY} L ${points[0].x.toFixed(2)} ${baseY} Z`
          : "";

        const selectedLabel = escapeSvgText(formatMetricValue(selected.value, metric));
        const labelAnchor = selected.x > width - 90 ? "end" : "start";
        const labelX = selected.x > width - 90 ? selected.x - 12 : selected.x + 12;
        const labelY = Math.max(18, selected.y - 14);

        const horizontalGrid = Array.from({ length: 4 }, (_, index) => {
          const y = top + (chartHeight / 3) * index;
          return `
            <line
              x1="${left}"
              y1="${y.toFixed(2)}"
              x2="${width - right}"
              y2="${y.toFixed(2)}"
              stroke="white"
              stroke-opacity="${index === 3 ? "0.08" : "0.05"}"
              stroke-width="1"
            />
          `;
        }).join("");

        const labelStep = points.length > 8 ? 2 : 1;

        const labels = points
          .map((point, index) => {
            const showLabel =
              index === 0 ||
              index === points.length - 1 ||
              index === safeSelectedIndex ||
              index % labelStep === 0;

            if (!showLabel) return "";

            const bottomLabelY = height - 14;

            return `
              <text
                x="${point.x.toFixed(2)}"
                y="${bottomLabelY}"
                transform="rotate(-90 ${point.x.toFixed(2)} ${bottomLabelY})"
                text-anchor="end"
                font-size="11"
                font-weight="${index === safeSelectedIndex ? "800" : "600"}"
                fill="${index === safeSelectedIndex ? "rgba(255,255,255,0.82)" : "rgba(255,255,255,0.46)"}"
              >${escapeSvgText(point.label)}</text>
            `;
          })
          .join("");

        const pointsMarkup = points
          .map((point, index) => {
            const isSelected = index === safeSelectedIndex;
            return `
              <g data-point-index="${index}">
                <circle
                  cx="${point.x.toFixed(2)}"
                  cy="${point.y.toFixed(2)}"
                  r="18"
                  fill="transparent"
                  style="pointer-events:all;cursor:pointer"
                  data-point-index="${index}"
                ></circle>

                ${isSelected ? `
                  <circle
                    cx="${point.x.toFixed(2)}"
                    cy="${point.y.toFixed(2)}"
                    r="12"
                    fill="#ff6418"
                    fill-opacity="0.16"
                  ></circle>
                ` : ""}

                <circle
                  cx="${point.x.toFixed(2)}"
                  cy="${point.y.toFixed(2)}"
                  r="${isSelected ? "5.6" : "3.2"}"
                  fill="${isSelected ? "#ffffff" : "rgba(255,130,80,0.92)"}"
                  stroke="${isSelected ? "#ff6418" : "none"}"
                  stroke-width="${isSelected ? "3" : "0"}"
                  data-point-index="${index}"
                  style="pointer-events:all;cursor:pointer"
                ></circle>
              </g>
            `;
          })
          .join("");

        const singlePointLine = points.length === 1
          ? `
            <line
              x1="${(selected.x - 34).toFixed(2)}"
              y1="${selected.y.toFixed(2)}"
              x2="${(selected.x + 34).toFixed(2)}"
              y2="${selected.y.toFixed(2)}"
              stroke="url(#progressLineGradient)"
              stroke-width="4"
              stroke-linecap="round"
            />
          `
          : "";

        return `
          <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
            <defs>
              <linearGradient id="progressAreaGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#ff6418" stop-opacity="0.42"></stop>
                <stop offset="72%" stop-color="#ff6418" stop-opacity="0.10"></stop>
                <stop offset="100%" stop-color="#ff6418" stop-opacity="0"></stop>
              </linearGradient>

              <linearGradient id="progressLineGradient" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#ff8a40"></stop>
                <stop offset="100%" stop-color="#ff5a00"></stop>
              </linearGradient>

              <filter id="progressGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="5" result="blur"></feGaussianBlur>
                <feMerge>
                  <feMergeNode in="blur"></feMergeNode>
                  <feMergeNode in="SourceGraphic"></feMergeNode>
                </feMerge>
              </filter>
            </defs>

            <rect
              x="0.5"
              y="0.5"
              width="${width - 1}"
              height="${height - 1}"
              rx="24"
              fill="transparent"
              stroke="rgba(255,255,255,0.04)"
            ></rect>

            ${horizontalGrid}

            <line
              x1="${selected.x.toFixed(2)}"
              y1="${selected.y.toFixed(2)}"
              x2="${selected.x.toFixed(2)}"
              y2="${baseY}"
              stroke="#ff6418"
              stroke-opacity="0.34"
              stroke-width="2.2"
            />

            ${areaPath ? `<path d="${areaPath}" fill="url(#progressAreaGradient)"></path>` : ""}
            ${smoothPath ? `
              <path
                d="${smoothPath}"
                fill="none"
                stroke="url(#progressLineGradient)"
                stroke-width="4.2"
                stroke-linecap="round"
                stroke-linejoin="round"
                filter="url(#progressGlow)"
              ></path>
            ` : ""}
            ${singlePointLine}

            <text
              x="${labelX.toFixed(2)}"
              y="${labelY.toFixed(2)}"
              text-anchor="${labelAnchor}"
              font-size="12"
              font-weight="800"
              fill="rgba(255,255,255,0.9)"
            >${selectedLabel}</text>

            ${pointsMarkup}
            ${labels}
          </svg>
        `;
      }

      function buildProgressEmpty(title, subtitle) {
        const box = make("div", "progress-empty-card");
        box.append(
          make("div", "progress-empty-card-title", title),
          make("div", "muted", subtitle)
        );
        return box;
      }

      function findPointIndex(target, root) {
        let node = target;

        while (node && node !== root) {
          if (node.dataset && node.dataset.pointIndex !== undefined) {
            const index = Number(node.dataset.pointIndex);
            return Number.isInteger(index) ? index : -1;
          }
          node = node.parentNode;
        }

        return -1;
      }

      function showProgress() {
        const name = el.progressSelect.value;
        el.progressResult.replaceChildren();

        if (!name) {
          el.progressResult.appendChild(
            buildProgressEmpty(
              "Выбери упражнение",
              "Покажу прогресс по весу, объёму или повторениям"
            )
          );
          return;
        }

        const allEntries = getExerciseProgressEntries(name);

        if (!allEntries.length) {
          el.progressResult.appendChild(
            buildProgressEmpty(
              "Пока нет данных",
              "Добавь и сохрани хотя бы одну тренировку с этим упражнением"
            )
          );
          return;
        }

        const metric = state.progressMetric;
        const visibleEntries = allEntries.slice(-12);

        const savedDate =
          state.progressSelection.exercise === name ? state.progressSelection.date : "";

        let selectedEntry =
          visibleEntries.find((entry) => entry.date === savedDate) ||
          visibleEntries[visibleEntries.length - 1];

        state.progressSelection.exercise = name;
        state.progressSelection.date = selectedEntry.date;

        const selectedIndex = visibleEntries.findIndex(
          (entry) => entry.date === selectedEntry.date
        );

        const bestEntry = allEntries.reduce((best, current) => {
          return current[metric] >= best[metric] ? current : best;
        }, allEntries[0]);

        const lastEntry = allEntries[allEntries.length - 1];
        const firstEntry = allEntries[0];
        const delta = lastEntry[metric] - firstEntry[metric];

        const titleMap = {
          weight: "Прогресс веса",
          volume: "Объём упражнения",
          reps: "Прогресс повторов"
        };

        const subtitleMap = {
          weight: `Лучший вес в подходе · ${name}`,
          volume: `Суммарный объём за тренировку · ${name}`,
          reps: `Сумма повторений за тренировку · ${name}`
        };

        const rangeLabel =
          visibleEntries.length === 1
            ? "1 тренировка"
            : `${visibleEntries.length} последних тренировок`;

        const hero = make("div", "progress-hero");
        hero.append(
          make("div", "progress-kicker", titleMap[metric]),
          make("div", "progress-big", formatMetricValue(selectedEntry[metric], metric))
        );

        const focus = make("div", "progress-focus");
        const focusDot = make("span", "progress-focus-dot");
        const focusText = make("div", "progress-focus-text", formatExactDate(selectedEntry.date));
        focus.append(focusDot, focusText);
        hero.appendChild(focus);

        hero.append(
          make("div", "progress-sub", `${subtitleMap[metric]} · ${rangeLabel}`)
        );

        if (visibleEntries.length > 1) {
          hero.append(
            make("div", "progress-hint", "Тапни по точке графика, чтобы посмотреть конкретную тренировку")
          );
        }

        const chart = make("div", "progress-chart");
        chart.innerHTML = buildProgressSvg(visibleEntries, metric, selectedIndex);

        chart.addEventListener("click", (event) => {
          const pointIndex = findPointIndex(event.target, chart);
          if (pointIndex < 0 || !visibleEntries[pointIndex]) return;

          state.progressSelection.exercise = name;
          state.progressSelection.date = visibleEntries[pointIndex].date;
          haptic();
          showProgress();
        });

        hero.appendChild(chart);

        const miniStats = make("div", "progress-mini-stats");

        const stat1 = make("div", "progress-mini-stat");
        stat1.append(
          make("div", "progress-mini-value", formatMetricValue(bestEntry[metric], metric)),
          make("div", "progress-mini-label", `PR · ${formatProgressMetaDate(bestEntry.date)}`)
        );

        const stat2 = make("div", "progress-mini-stat");
        stat2.append(
          make("div", "progress-mini-value", formatMetricValue(lastEntry[metric], metric)),
          make("div", "progress-mini-label", `Последняя · ${formatProgressMetaDate(lastEntry.date)}`)
        );

        const stat3 = make("div", "progress-mini-stat");
        stat3.append(
          make("div", "progress-mini-value", formatDeltaValue(delta, metric)),
          make("div", "progress-mini-label", "Дельта")
        );

        miniStats.append(stat1, stat2, stat3);
        hero.appendChild(miniStats);

        el.progressResult.appendChild(hero);
      }

      function formatDateTitle(iso) {
        const date = new Date(iso);
        const now = new Date();

        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const day = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diff = Math.round((today - day) / 86400000);

        if (diff === 0) return "Сегодня";
        if (diff === 1) return "Вчера";

        return date.toLocaleDateString("ru-RU", {
          day: "numeric",
          month: "long"
        });
      }

      function openWorkout(workoutId) {
        const workout = state.workouts.find((item) => item.id === workoutId);
        if (!workout) return;

        openSheet();
        el.modalBody.replaceChildren();

        const stats = getStats(workout);

        el.modalBody.append(
          make("div", "title", formatDateTitle(workout.finishedAt)),
          make(
            "div",
            "meta",
            `${stats.exercises} упражнений · ${stats.sets} подходов · ${Math.round(stats.volume)} кг`
          )
        );

        workout.exercises.forEach((ex) => {
          const box = make("div", "exercise");
          box.appendChild(make("div", "exercise-name", ex.name));

          ex.sets.forEach((set, index) => {

            row.append(
              make("div", "", `${index + 1}. ${set.weight} кг × ${set.reps}`),
              make("div", "muted", `${Math.round(set.weight * set.reps)} кг`)
            );
            box.appendChild(row);
          });

          el.modalBody.appendChild(box);
        });

        const actions = make("div", "sheet-actions");
        const edit = make("button", "btn-card btn-accent", "Редактировать");

        edit.onclick = () => openEditWorkout(workoutId);
