<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Святилище ТРЕНЕРА</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #070707;
      --bg-solid: #090909;
      --surface: rgba(255, 255, 255, 0.055);
      --field: #171717;
      --line: rgba(255, 255, 255, 0.09);
      --text: #fff;
      --muted: rgba(255, 255, 255, 0.58);
      --accent: #ff6418;
      --accent-soft: rgba(255, 100, 24, 0.1);
      --accent-line: rgba(255, 100, 24, 0.24);
      --success: #3ddc84;
      --success-soft: rgba(61, 220, 132, 0.12);
      --success-line: rgba(61, 220, 132, 0.28);
      --danger-soft: rgba(255, 70, 70, 0.12);
      --danger-line: rgba(255, 90, 90, 0.28);
      --danger-text: #ff8a8a;
      --radius: 18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --tab-index: 0;
    }

    html,
    body {
      min-height: 100%;
      background: var(--bg-solid);
    }

    body {
      position: relative;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(255, 100, 24, 0.12), transparent 28%),
        radial-gradient(circle at top left, rgba(255, 100, 24, 0.05), transparent 22%),
        var(--bg-solid);
      color: var(--text);
      padding: max(14px, var(--safe-top)) 14px calc(28px + var(--safe-bottom));
      font-size: 15px;
      overflow-x: hidden;
    }

    button,
    input,
    select {
      font: inherit;
      color: inherit;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 750;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition:
        transform 0.14s ease,
        background-color 0.16s ease,
        border-color 0.16s ease,
        box-shadow 0.16s ease,
        opacity 0.16s ease,
        color 0.16s ease;
    }

    button:disabled {
      opacity: 0.42;
      cursor: default;
    }

    input,
    select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: var(--field);
      color: #fff;
      outline: none;
      transition:
        border-color 0.16s ease,
        box-shadow 0.16s ease,
        transform 0.14s ease,
        opacity 0.16s ease;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.38);
    }

    input:focus,
    select:focus {
      border-color: rgba(255, 100, 24, 0.75);
      box-shadow: 0 0 0 3px rgba(255, 100, 24, 0.13);
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
      background: transparent;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      padding-right: clamp(138px, 35vw, 176px);
      animation: softIn 0.18s ease both;
    }

    .top-copy {
      min-width: 0;
    }

    .title {
      font-size: 28px;
      line-height: 1.08;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .sheet .title {
      margin-bottom: 0;
    }

    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .section {
      margin-bottom: 16px;
      animation: softIn 0.18s ease both;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .card {
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 13px;
      margin-bottom: 10px;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.14);
      animation: softIn 0.18s ease both;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .empty,
    .progress-empty {
      padding: 22px 12px;
      text-align: center;
      color: var(--muted);
    }

    .panel {
      display: none;
      background: transparent;
    }

    .panel.active {
      display: block;
      animation: panelSlide 0.18s cubic-bezier(.2, .8, .2, 1) both;
    }

    .splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      align-items: end;
      background: #050505;
      overflow: hidden;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    .splash.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.02);
      filter: saturate(0.98) brightness(0.86) contrast(1.02);
    }

    .splash::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.08),
        rgba(0, 0, 0, 0.18) 38%,
        rgba(0, 0, 0, 0.92)
      );
    }

    .splash-content {
      position: relative;
      z-index: 2;
      padding: 28px 22px calc(34px + var(--safe-bottom));
    }

    .splash-title {
      max-width: 360px;
      font-size: 42px;
      line-height: 1.05;
      font-weight: 850;
    }

    .splash-title span {
      color: var(--accent);
    }

    .splash-sub {
      margin-top: 12px;
      max-width: 310px;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.45;
    }

    .loader {
      width: 100%;
      height: 5px;
      margin-top: 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      overflow: hidden;
    }

    .loader i {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      animation: load 1.5s ease-in-out infinite;
    }

    .tabs-shell {
      width: 100%;
      padding: 7px;
      margin-bottom: 16px;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.055)),
        rgba(255, 255, 255, 0.075);
      border: 1px solid rgba(255, 255, 255, 0.13);
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      animation: softIn 0.18s ease both;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .tabs {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .tabs::before {
      content: "";
      position: absolute;
      z-index: 0;
      top: 0;
      bottom: 0;
      left: 0;
      width: calc((100% - 16px) / 3);
      border-radius: 18px;
      background: rgba(255, 100, 24, 0.14);
      border: 1px solid rgba(255, 100, 24, 0.28);
      box-shadow: 0 8px 16px rgba(255, 100, 24, 0.08);
      transform: translateX(calc(var(--tab-index) * (100% + 8px)));
      transition: transform 0.22s cubic-bezier(.2, .9, .2, 1);
      box-sizing: border-box;
    }

    .tabs[data-active="0"] { --tab-index: 0; }
    .tabs[data-active="1"] { --tab-index: 1; }
    .tabs[data-active="2"] { --tab-index: 2; }

    .tab {
      position: relative;
      z-index: 1;
      min-height: 50px;
      border-radius: 18px;
      background: transparent;
      border: 1px solid transparent;
      color: rgba(255, 255, 255, 0.72);
      box-shadow: none;
      font-size: 14px;
      transition: color 0.18s ease, transform 0.14s ease;
    }

    .tab.active {
      color: var(--accent);
    }

    .form-stack,
    .modal-form {
      display: grid;
      gap: 9px;
    }

    .form-numbers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row > * {
      flex: 1;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      padding-right: 38px;
    }

    .input-clear {
      position: absolute;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      min-width: 28px;
      min-height: 28px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: transparent;
      box-shadow: none;
      color: rgba(255, 255, 255, 0.54);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.16s ease,
        transform 0.16s ease,
        color 0.16s ease;
    }

    .input-wrap.has-value .input-clear {
      opacity: 1;
      pointer-events: auto;
    }

    .input-clear svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .search-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 30;
      display: none;
      max-height: min(280px, 46vh);
      overflow: auto;
      border-radius: 16px;
      background: #121212;
      border: 1px solid var(--line);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.32);
      overscroll-behavior: contain;
    }

    .search-dropdown.open {
      display: block;
      animation: softIn 0.12s ease both;
    }

    .search-option {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: #fff;
      text-align: left;
      padding: 12px 14px;
      box-shadow: none;
      font-weight: 650;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .search-option:last-child {
      border-bottom: 0;
    }

    .search-option mark,
    .history-highlight {
      background: rgba(255, 100, 24, 0.22);
      color: #fff;
      padding: 0 2px;
      border-radius: 4px;
    }

    .btn-card {
      min-height: 54px;
      padding: 0 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: none;
      font-weight: 750;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      overflow: visible;
      text-overflow: clip;
      line-height: 1;
    }

    .btn-muted {
      background: rgba(255, 255, 255, 0.06);
    }

    .btn-accent {
      color: var(--accent);
      background: var(--accent-soft);
      border-color: var(--accent-line);
    }

    .btn-success {
      color: var(--success);
      background: var(--success-soft);
      border-color: var(--success-line);
    }

    .btn-danger {
      color: var(--danger-text);
      background: var(--danger-soft);
      border-color: var(--danger-line);
    }

    .icon-square {
      width: 58px;
      min-width: 58px;
      min-height: 58px;
      padding: 0;
      font-size: 18px;
      flex-shrink: 0;
    }

    .type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .type-btn {
      min-height: 72px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      color: #fff;
      justify-content: flex-start;
      align-items: center;
      padding: 0 16px;
      text-align: left;
      box-shadow: none;
    }

    .type-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent-line);
      color: var(--accent);
    }

    .type-btn.custom {
      grid-column: 1 / -1;
    }

    .pill-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255, 100, 24, 0.12);
      border: 1px solid rgba(255, 100, 24, 0.22);
      color: var(--accent);
      font-size: 13px;
      font-weight: 760;
    }

    .link-btn {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      box-shadow: none;
      color: rgba(255,255,255,0.86);
      font-size: 13px;
      font-weight: 700;
    }

    .template-box {
      display: none;
      gap: 8px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      margin-top: 2px;
    }

    .template-box.show {
      display: grid;
      animation: softIn 0.16s ease both;
    }

    .template-title {
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-weight: 760;
    }

    .template-sub {
      color: rgba(255,255,255,0.35);
      font-size: 11px;
    }

    .template-lines {
      display: grid;
      gap: 4px;
    }

    .template-line {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      font-weight: 700;
    }

    #repeatSetBtn,
    #addSetBtn {
      min-height: 54px;
      border-radius: var(--radius);
      box-shadow: none;
    }

    #repeatSetBtn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
    }

    #addSetBtn {
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid var(--accent-line);
    }

    .fallback-finish {
      display: none;
      width: 100%;
      margin-top: 10px;
      background: #ff6418;
      color: #fff;
      border-color: rgba(255, 100, 24, 0.55);
    }

    .exercise {
      padding: 16px 0;
      border-bottom: 1px solid var(--line);
      animation: itemIn 0.16s cubic-bezier(.2, .8, .2, 1) both;
    }

    .exercise:last-child {
      border-bottom: 0;
    }

    .exercise-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      align-items: flex-start;
    }

    .exercise-name {
      font-size: 16px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .exercise-sub {
      margin-top: 4px;
      color: rgba(255,255,255,0.42);
      font-size: 12px;
    }

    .exercise-template-inline {
      display: grid;
      gap: 4px;
      padding: 10px 12px;
      border-radius: 14px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .exercise-template-inline .template-line {
      font-size: 13px;
    }

    .set-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      min-height: 46px;
      animation: itemIn 0.16s cubic-bezier(.2, .8, .2, 1) both;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .set-content {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .set-value {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 54px;
      padding: 14px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      font-weight: 700;
    }

    .progress-chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      width: fit-content;
      max-width: 100%;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--success-soft);
      border: 1px solid var(--success-line);
      color: var(--success);
      font-size: 12px;
      font-weight: 760;
    }

    .progress-chip.muted {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.55);
    }

    .history-categories {
      display: grid;
      gap: 10px;
    }

    .history-category {
      width: 100%;
      min-height: 92px;
      text-align: left;
      display: block;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.02)),
        rgba(255, 255, 255, 0.025);
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: none;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .history-category.custom {
      margin-top: 8px;
      border-color: rgba(255,100,24,0.16);
    }

    .history-category-title {
      font-weight: 820;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .history-category-sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .history-breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .history-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 62px 62px;
      gap: 8px;
      align-items: stretch;
      min-height: 92px;
      margin-bottom: 8px;
      overflow: visible;
      animation: itemIn 0.16s cubic-bezier(.2, .8, .2, 1) both;
      background: transparent !important;
    }

    .history-item {
      width: 100%;
      min-height: 92px;
      text-align: left;
      display: block;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.02)),
        rgba(255, 255, 255, 0.025);
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: none;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .history-title {
      font-weight: 820;
      font-size: 16px;
      margin-bottom: 4px;
      line-height: 1.1;
    }

    .history-item .muted {
      white-space: normal;
      line-height: 1.25;
      overflow-wrap: anywhere;
      font-size: 12px;
    }

    .progress-controls {
      display: grid;
      gap: 10px;
    }

    .progress-mode {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 5px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .progress-mode-btn {
      min-height: 42px;
      border-radius: 14px;
      background: transparent;
      border: 1px solid transparent;
      color: rgba(255, 255, 255, 0.68);
      font-weight: 760;
      box-shadow: none;
    }

    .progress-mode-btn.active {
      color: var(--accent);
      background: rgba(255, 100, 24, 0.12);
      border-color: rgba(255, 100, 24, 0.26);
    }

    #progressResult {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .progress-empty-card {
      border-radius: 22px;
      padding: 24px 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at 90% 100%, rgba(255, 84, 0, 0.12), transparent 28%),
        linear-gradient(180deg, rgba(22, 22, 22, 0.96), rgba(10, 10, 10, 0.98));
      text-align: center;
    }

    .progress-empty-card-title {
      font-size: 16px;
      font-weight: 820;
      margin-bottom: 6px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + var(--safe-bottom));
      transform: translateX(-50%);
      max-width: calc(100vw - 28px);
      padding: 11px 15px;
      border-radius: 999px;
      background: rgba(20, 20, 20, 0.92);
      border: 1px solid var(--line);
      z-index: 95;
      display: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.64);
      display: none;
      align-items: flex-end;
      z-index: 80;
    }

    .modal.open {
      display: flex;
      animation: fadeIn 0.14s ease both;
    }

    .sheet {
      width: 100%;
      max-width: 560px;
      max-height: 88vh;
      margin: 0 auto;
      overflow: auto;
      background: #0b0b0b;
      border: 1px solid var(--line);
      border-radius: 24px 24px 0 0;
      padding: 18px 14px calc(28px + var(--safe-bottom));
      animation: sheetIn 0.2s cubic-bezier(.2, .9, .2, 1) both;
    }

    .handle {
      width: 42px;
      height: 4px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.22);
      margin: 0 auto 16px;
    }

    .sheet-actions {
      position: sticky;
      bottom: -14px;
      padding-top: 12px;
      margin-top: 12px;
      background: linear-gradient(
        180deg,
        transparent,
        rgba(11, 11, 11, 0.95) 44%,
        #0b0b0b 90%
      );
      display: grid;
      gap: 8px;
    }

    .sheet-actions > .btn-card {
      width: 100%;
      display: block;
    }

    .modal-set-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 40px;
      padding: 8px 0;
    }

    .edit-exercise-group {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .edit-exercise-group:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .edit-exercise-group > input {
      margin-bottom: 12px;
    }

    .edit-set-card {
      display: grid;
      grid-template-columns: 1fr 58px;
      gap: 8px;
      align-items: stretch;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.045);
      box-shadow: none;
      overflow: hidden;
    }

    .edit-set-card .form-numbers {
      min-width: 0;
    }

    .remove-anim {
      opacity: 0 !important;
      transform: translateX(18px) scale(0.96) !important;
      max-height: 0 !important;
      margin-top: 0 !important;
      margin-bottom: 0 !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      transition:
        opacity 0.18s ease,
        transform 0.18s ease,
        max-height 0.2s ease,
        margin 0.2s ease,
        padding 0.2s ease;
    }

    .flash {
      animation: flash 0.32s ease both;
    }

    .global-timer-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 60;
      transform: translate3d(0, 0, 0);
      will-change: transform, width, height;
    }

    .global-timer {
      position: absolute;
      top: calc(12px + var(--safe-top));
      right: calc(12px + var(--safe-right));
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .timer-widget {
      min-height: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 17px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(10, 10, 10, 0.28);
      box-shadow:
        0 10px 20px rgba(0, 0, 0, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.92);
      pointer-events: auto;
      touch-action: manipulation;
      transition:
        transform 0.14s ease,
        border-color 0.18s ease,
        background-color 0.18s ease,
        color 0.18s ease,
        opacity 0.18s ease;
    }

    .timer-idle,
    .timer-live {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .timer-idle {
      color: rgba(255, 255, 255, 0.76);
      font-size: 15px;
      font-weight: 780;
      letter-spacing: 0.01em;
    }

    .timer-live {
      color: rgba(255, 255, 255, 0.96);
    }

    .timer-icon {
      width: 14px;
      height: 14px;
      display: block;
      flex: none;
      color: var(--accent);
    }

    .timer-readout {
      font-size: 20px;
      line-height: 1;
      font-weight: 820;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
    }

    .timer-mark {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      opacity: 0.88;
      flex: none;
    }

    .timer-mark svg {
      width: 9px;
      height: 9px;
      display: block;
    }

    .timer-widget.running {
      border-color: rgba(255, 100, 24, 0.18);
      background: rgba(12, 12, 12, 0.36);
    }

    .timer-widget.running .timer-idle {
      display: none;
    }

    .timer-widget:not(.running) .timer-live {
      display: none;
    }

    button:active,
    .history-item:active,
    .history-category:active {
      transform: scale(0.975);
    }

    .toast.show {
      animation: toastIn 0.16s ease both;
    }

    .lite .card,
    .lite .timer-widget,
    .lite .tabs-shell {
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
    }

    .lite * {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.12s !important;
      scroll-behavior: auto !important;
    }

    @keyframes load {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(260%); }
    }

    @keyframes softIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes panelSlide {
      from {
        opacity: 0;
        transform: translateX(10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes itemIn {
      from {
        opacity: 0;
        transform: translateY(6px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translate(-50%, 8px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes sheetIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes flash {
      0% {
        box-shadow: 0 0 0 rgba(255, 100, 24, 0);
      }
      35% {
        box-shadow:
          0 0 0 2px rgba(255, 100, 24, 0.14),
          0 12px 20px rgba(255, 100, 24, 0.08);
      }
      100% {
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.14);
      }
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <img class="splash-img" src="loading.jpg" alt="Загрузка" />
    <div class="splash-content">
      <div class="splash-title">Святилище<br /><span>ТРЕНЕРА</span></div>
      <div class="splash-sub">всем привет сегодня трена</div>
      <div class="loader"><i></i></div>
    </div>
  </div>

  <div class="app">
    <header class="top">
      <div class="top-copy">
        <div class="title" id="screenTitle">Трена</div>
        <div class="meta" id="screenMeta">Загрузка данных</div>
      </div>
    </header>

    <div class="tabs-shell">
      <nav class="tabs" id="tabsNav" data-active="0">
        <button class="tab active" type="button" data-tab="today">Трена</button>
        <button class="tab" type="button" data-tab="history">История</button>
        <button class="tab" type="button" data-tab="progress">Прогресс</button>
      </nav>
    </div>

    <main>
      <section class="panel active" id="todayPanel">
        <section class="section">
          <div class="section-title">Тип тренировки</div>
          <div class="card">
            <div class="type-grid" id="typeGrid">
              <button class="type-btn" type="button" data-type="chest">Грудь</button>
              <button class="type-btn" type="button" data-type="back">Спина</button>
              <button class="type-btn" type="button" data-type="legs">Ноги</button>
              <button class="type-btn custom" type="button" data-type="custom">Своя тренировка</button>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="pill-row">
            <div class="pill" id="currentTypePill">Тип не выбран</div>
            <button class="link-btn" id="changeTypeBtn" type="button" disabled>Сменить тип</button>
          </div>
        </section>

        <section class="section">
          <div class="section-title">Добавить подход</div>
          <div class="card">
            <div class="form-stack">
              <div class="input-wrap" id="exerciseInputWrap">
                <input
                  id="exerciseInput"
                  placeholder="Упражнение"
                  autocomplete="off"
                  spellcheck="false"
                  disabled
                />
                <button
                  id="exerciseClearBtn"
                  class="input-clear"
                  type="button"
                  aria-label="Очистить поле упражнения"
                >
                  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M7.76 7.76a1 1 0 0 1 1.41 0L12 10.59l2.83-2.83a1 1 0 1 1 1.41 1.41L13.41 12l2.83 2.83a1 1 0 1 1-1.41 1.41L12 13.41l-2.83 2.83a1 1 0 1 1-1.41-1.41L10.59 12 7.76 9.17a1 1 0 0 1 0-1.41Z"></path>
                  </svg>
                </button>
                <div class="search-dropdown" id="exerciseDropdown"></div>
              </div>

              <div class="template-box" id="templateBox">
                <div class="template-title">Прошлый раз</div>
                <div class="template-sub" id="templateSub"></div>
                <div class="template-lines" id="templateLines"></div>
              </div>

              <div class="form-numbers">
                <input id="weightInput" placeholder="кг" inputmode="decimal" disabled />
                <input id="repsInput" placeholder="раз" inputmode="numeric" disabled />
              </div>

              <div class="row">
                <button id="repeatSetBtn" type="button" disabled>Такой же</button>
                <button id="addSetBtn" type="button" disabled>Добавить</button>
              </div>

              <div class="muted" id="formHint">Сначала выбери тип тренировки</div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-title">Текущая тренировка</div>
          <div class="card" id="draftList"></div>
          <button id="fallbackFinishBtn" type="button" class="fallback-finish btn-card">
            Завершить тренировку
          </button>
        </section>
      </section>

      <section class="panel" id="historyPanel">
        <div id="historyList"></div>
      </section>

      <section class="panel" id="progressPanel">
        <div class="card">
          <div class="progress-controls">
            <select id="progressSelect"></select>

            <div class="progress-mode" id="progressMode">
              <button class="progress-mode-btn active" type="button" data-metric="weight">
                Вес
              </button>
              <button class="progress-mode-btn" type="button" data-metric="volume">
                Объём
              </button>
              <button class="progress-mode-btn" type="button" data-metric="reps">
                Повторы
              </button>
            </div>
          </div>

          <div id="progressResult"></div>
        </div>
      </section>
    </main>
  </div>

  <div class="global-timer-layer" id="timerLayer" aria-hidden="false">
    <div class="global-timer">
      <button
        class="timer-widget"
        id="timerToggleBtn"
        type="button"
        aria-label="Запустить секундомер"
      >
        <span class="timer-idle">
          <svg class="timer-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M8 6.5c0-.82.93-1.29 1.59-.81l8.15 5.95a1 1 0 0 1 0 1.62L9.59 19.2A1 1 0 0 1 8 18.39V6.5Z"></path>
          </svg>
          <span>Старт</span>
        </span>

        <span class="timer-live">
          <span class="timer-readout" id="timerReadout">00:00.00</span>
          <span class="timer-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <rect x="7" y="7" width="10" height="10" rx="2"></rect>
            </svg>
          </span>
        </span>
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal" id="modal">
    <div class="sheet">
      <div class="handle"></div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const CONFIG = {
        storageKey: "workouts_v7",
        draftKey: "draft_workout_v7",
        localDataKey: "trainer_data_v4",
        cloudDataKey: "trainer_cloud_data_v4",
        splashDelay: 1200,
        toastDelay: 2400,
        persistDelay: 250,
        searchDebounce: 70,
        searchMaxResults: 12,
        cloudPollInterval: 12000,
        cloudResumeDebounce: 1200
      };

      const TRAINING_TYPES = {
        chest: "Грудь",
        back: "Спина",
        legs: "Ноги",
        custom: "Своя тренировка"
      };

      const MAIN_TYPES = ["chest", "back", "legs"];
      const HISTORY_TYPE_ORDER = ["chest", "back", "legs", "custom"];

      const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

      const lowPerfMode =
        window.matchMedia("(prefers-reduced-motion: reduce)").matches ||
        (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4) ||
        (navigator.deviceMemory && navigator.deviceMemory <= 4);

      if (lowPerfMode) {
        document.documentElement.classList.add("lite");
      }

      const state = {
        tab: "today",
        workouts: [],
        workoutsById: new Map(),
        draft: createDraft(),
        exerciseCatalog: {
          sorted: [],
          namesByKey: new Map(),
          searchIndex: []
        },
        progressMetric: "weight",
        progressSelection: {
          exercise: "",
          date: ""
        },
        timer: {
          running: false,
          startedAt: 0,
          raf: 0,
          lastPaintAt: 0
        },
        cloud: {
          enabled: Boolean(tg && tg.CloudStorage),
          loading: false,
          saving: false,
          lastLoadedAt: 0,
          lastSavedAt: 0,
          polling: false,
          syncInFlight: false
        },
        search: {
          exerciseQuery: "",
          results: [],
          open: false,
          debounceTimer: 0
        },
        historyUi: {
          activeType: ""
        }
      };

      const tabOrder = ["today", "history", "progress"];

      const el = {
        splash: document.getElementById("splash"),
        screenTitle: document.getElementById("screenTitle"),
        screenMeta: document.getElementById("screenMeta"),
        tabsNav: document.getElementById("tabsNav"),
        tabs: [...document.querySelectorAll(".tab")],
        typeButtons: [...document.querySelectorAll(".type-btn")],
        currentTypePill: document.getElementById("currentTypePill"),
        changeTypeBtn: document.getElementById("changeTypeBtn"),
        panels: {
          today: document.getElementById("todayPanel"),
          history: document.getElementById("historyPanel"),
          progress: document.getElementById("progressPanel")
        },
        exerciseInputWrap: document.getElementById("exerciseInputWrap"),
        exerciseInput: document.getElementById("exerciseInput"),
        exerciseClearBtn: document.getElementById("exerciseClearBtn"),
        exerciseDropdown: document.getElementById("exerciseDropdown"),
        templateBox: document.getElementById("templateBox"),
        templateSub: document.getElementById("templateSub"),
        templateLines: document.getElementById("templateLines"),
        weightInput: document.getElementById("weightInput"),
        repsInput: document.getElementById("repsInput"),
        addSetBtn: document.getElementById("addSetBtn"),
        repeatSetBtn: document.getElementById("repeatSetBtn"),
        formHint: document.getElementById("formHint"),
        draftList: document.getElementById("draftList"),
        fallbackFinishBtn: document.getElementById("fallbackFinishBtn"),
        historyList: document.getElementById("historyList"),
        progressSelect: document.getElementById("progressSelect"),
        progressResult: document.getElementById("progressResult"),
        progressMetricBtns: [...document.querySelectorAll(".progress-mode-btn")],
        toast: document.getElementById("toast"),
        modal: document.getElementById("modal"),
        modalBody: document.getElementById("modalBody"),
        timerLayer: document.getElementById("timerLayer"),
        timerToggleBtn: document.getElementById("timerToggleBtn"),
        timerReadout: document.getElementById("timerReadout")
      };

      let timerViewportRaf = 0;
      let persistTimer = 0;
      let cloudSaveTimer = 0;
      let cloudPollTimer = 0;
      let cloudResumeTimer = 0;

      function id() {
        return crypto.randomUUID
          ? crypto.randomUUID()
          : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function createDraft() {
        return {
          id: id(),
          status: "draft",
          trainingType: "",
          createdAt: new Date().toISOString(),
          performedAt: new Date().toISOString(),
          syncStatus: "pending",
          exercises: []
        };
      }

      function text(node, value) {
        if (node) node.textContent = value == null ? "" : String(value);
      }

      function make(tag, cls, content) {
        const node = document.createElement(tag);
        if (cls) node.className = cls;
        if (content !== undefined) text(node, content);
        return node;
      }

      function normalizeName(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .replace(/ё/g, "е");
      }

      function sameName(a, b) {
        return normalizeName(a) === normalizeName(b);
      }

      function exerciseKey(value) {
        return normalizeName(value);
      }

      function normalizeSearchText(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/ё/g, "е")
          .replace(/[^\p{L}\p{N}\s]+/gu, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function tokenize(value) {
        const normalized = normalizeSearchText(value);
        return normalized ? normalized.split(" ") : [];
      }

      function normalizeNumber(value) {
        return Number(String(value).trim().replace(",", "."));
      }

      function trimNumber(value) {
        const rounded = Math.round(Number(value) * 10) / 10;
        if (Number.isInteger(rounded)) return String(rounded);
        return String(rounded).replace(".", ",");
      }

      function parseSetInput(weightValue, repsValue) {
        const weight = normalizeNumber(weightValue);
        const reps = Number(String(repsValue).trim());

        if (!Number.isFinite(weight) || weight < 0) return null;
        if (!Number.isInteger(reps) || reps <= 0) return null;

        return { weight, reps };
      }

      function safeJsonParse(value, fallback = null) {
        try {
          return value ? JSON.parse(value) : fallback;
        } catch {
          return fallback;
        }
      }

      function safeStorageGet(key) {
        try {
          return localStorage.getItem(key);
        } catch {
          return null;
        }
      }

      function safeStorageSet(key, value) {
        try {
          localStorage.setItem(key, value);
          return true;
        } catch {
          toast("Не удалось сохранить данные");
          return false;
        }
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function getTypeLabel(type) {
        return TRAINING_TYPES[type] || "Без типа";
      }

      function isComparableType(type) {
        return MAIN_TYPES.includes(type);
      }

      function getWorkoutTimestamp(workout) {
        const raw = workout.finishedAt || workout.performedAt || workout.createdAt || 0;
        const ts = new Date(raw).getTime();
        return Number.isFinite(ts) ? ts : 0;
      }

      function getStats(workout) {
        const exercises = workout.exercises.length;
        const sets = workout.exercises.reduce((sum, ex) => sum + ex.sets.length, 0);
        const volume = workout.exercises.reduce(
          (sum, ex) => sum + ex.sets.reduce((x, set) => x + set.weight * set.reps, 0),
          0
        );
        return { exercises, sets, volume };
      }

      function sanitizeWorkout(workout) {
        return {
          id: workout.id || id(),
          userId: workout.userId || "",
          trainingType: workout.trainingType || "",
          status: workout.status || "completed",
          createdAt: workout.createdAt || new Date().toISOString(),
          finishedAt: workout.finishedAt,
          performedAt: workout.performedAt || workout.finishedAt || workout.createdAt || new Date().toISOString(),
          syncStatus: workout.syncStatus || "pending",
          exercises: (workout.exercises || [])
            .filter((ex) => ex && ex.name && Array.isArray(ex.sets))
            .map((ex) => ({
              id: ex.id || id(),
              name: String(ex.name).trim(),
              sets: ex.sets
                .map((set) => ({
                  id: set.id || id(),
                  weight: Number(set.weight),
                  reps: Number(set.reps)
                }))
                .filter(
                  (set) =>
                    Number.isFinite(set.weight) &&
                    set.weight >= 0 &&
                    Number.isInteger(set.reps) &&
                    set.reps > 0
                )
            }))
            .filter((ex) => ex.name && ex.sets.length)
        };
      }

      function isValidDraft(value) {
        return value && value.status === "draft" && Array.isArray(value.exercises);
      }

      function toast(message) {
        text(el.toast, message);
        el.toast.style.display = "block";
        el.toast.classList.remove("show");
        requestAnimationFrame(() => el.toast.classList.add("show"));
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => {
          el.toast.style.display = "none";
          el.toast.classList.remove("show");
        }, CONFIG.toastDelay);
      }

      function haptic(type = "light") {
        if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred(type);
      }

      function hideKeyboard() {
        if (document.activeElement && document.activeElement.blur) {
          document.activeElement.blur();
        }
      }

      function showPopup(message) {
        if (tg && tg.showPopup) {
          return new Promise((resolve) =>
            tg.showPopup(
              {
                message,
                buttons: [
                  { id: "cancel", type: "cancel", text: "Отмена" },
                  { id: "ok", type: "default", text: "ОК" }
                ]
              },
              resolve
            )
          );
        }

        return Promise.resolve(confirm(message) ? "ok" : "cancel");
      }

      function buildSnapshot() {
        return {
          updatedAt: Date.now(),
          workouts: state.workouts,
          draft: state.draft
        };
      }

      function persistNowLocal() {
        const snapshot = buildSnapshot();
        safeStorageSet(CONFIG.localDataKey, JSON.stringify(snapshot));
        safeStorageSet(CONFIG.storageKey, JSON.stringify(state.workouts));
        safeStorageSet(CONFIG.draftKey, JSON.stringify(state.draft));
      }

      function cloudGetItem(key) {
        return new Promise((resolve) => {
          if (!state.cloud.enabled || !tg || !tg.CloudStorage) {
            resolve(null);
            return;
          }

          try {
            tg.CloudStorage.getItem(key, (error, value) => {
              if (error) {
                resolve(null);
                return;
              }
              resolve(value || null);
            });
          } catch {
            resolve(null);
          }
        });
      }

      function cloudSetItem(key, value) {
        return new Promise((resolve) => {
          if (!state.cloud.enabled || !tg || !tg.CloudStorage) {
            resolve(false);
            return;
          }

          try {
            tg.CloudStorage.setItem(key, value, (error) => {
              resolve(!error);
            });
          } catch {
            resolve(false);
          }
        });
      }

      async function persistNowCloud() {
        if (!state.cloud.enabled) return false;
        const snapshot = buildSnapshot();
        state.cloud.saving = true;
        const ok = await cloudSetItem(CONFIG.cloudDataKey, JSON.stringify(snapshot));
        state.cloud.saving = false;
        return ok;
      }

      function scheduleCloudPersist(immediate = false) {
        clearTimeout(cloudSaveTimer);

        if (!state.cloud.enabled) return;

        if (immediate) {
          persistNowCloud();
          return;
        }

        cloudSaveTimer = setTimeout(() => {
          persistNowCloud();
        }, 500);
      }

      function schedulePersist(immediate = false) {
        clearTimeout(persistTimer);

        if (immediate) {
          persistNowLocal();
          scheduleCloudPersist(true);
          return;
        }

        persistTimer = setTimeout(() => {
          persistNowLocal();
        }, CONFIG.persistDelay);

        scheduleCloudPersist(false);
      }

      function fullRebuildIndexes() {
        state.workoutsById = new Map();
        state.exerciseCatalog.namesByKey = new Map();

        state.workouts.forEach((workout) => {
          state.workoutsById.set(workout.id, workout);
          workout.exercises.forEach((ex) => {
            const key = exerciseKey(ex.name);
            if (!state.exerciseCatalog.namesByKey.has(key)) {
              state.exerciseCatalog.namesByKey.set(key, ex.name);
            }
          });
        });

        state.draft.exercises.forEach((ex) => {
          const key = exerciseKey(ex.name);
          if (!state.exerciseCatalog.namesByKey.has(key)) {
            state.exerciseCatalog.namesByKey.set(key, ex.name);
          }
        });

        state.exerciseCatalog.sorted = [...state.exerciseCatalog.namesByKey.values()]
          .sort((a, b) => a.localeCompare(b, "ru"));

        state.exerciseCatalog.searchIndex = state.exerciseCatalog.sorted.map((name) => ({
          name,
          normalized: normalizeSearchText(name),
          tokens: tokenize(name)
        }));
      }

      function applySnapshot(snapshot) {
        state.workouts = (snapshot.workouts || [])
          .map(sanitizeWorkout)
          .filter((workout) => workout.exercises.length);

        state.workouts.sort((a, b) => getWorkoutTimestamp(b) - getWorkoutTimestamp(a));

        state.draft = isValidDraft(snapshot.draft)
          ? sanitizeWorkout(snapshot.draft)
          : createDraft();

        state.draft.status = "draft";
        if (!state.draft.trainingType) {
          state.draft.trainingType = "";
        }

        fullRebuildIndexes();
      }

      async function loadData() {
        const localSnapshot = safeJsonParse(safeStorageGet(CONFIG.localDataKey), null);
        const localWorkouts = safeJsonParse(safeStorageGet(CONFIG.storageKey), []);
        const localDraft = safeJsonParse(safeStorageGet(CONFIG.draftKey), null);

        let finalSnapshot = null;

        if (localSnapshot && Array.isArray(localSnapshot.workouts) && localSnapshot.draft) {
          finalSnapshot = localSnapshot;
        } else {
          finalSnapshot = {
            updatedAt: Date.now(),
            workouts: Array.isArray(localWorkouts) ? localWorkouts : [],
            draft: isValidDraft(localDraft) ? localDraft : createDraft()
          };
        }

        if (state.cloud.enabled) {
          const cloudRaw = await cloudGetItem(CONFIG.cloudDataKey);
          const cloudSnapshot = safeJsonParse(cloudRaw, null);

          const localUpdatedAt = Number(finalSnapshot.updatedAt) || 0;
          const cloudUpdatedAt = Number(cloudSnapshot && cloudSnapshot.updatedAt) || 0;

          if (cloudSnapshot && Array.isArray(cloudSnapshot.workouts) && cloudSnapshot.draft) {
            if (cloudUpdatedAt >= localUpdatedAt) {
              finalSnapshot = cloudSnapshot;
            } else {
              scheduleCloudPersist(true);
            }
          } else {
            scheduleCloudPersist(true);
          }
        }

        applySnapshot(finalSnapshot);
        renderAll();
        persistNowLocal();
        startCloudPolling();

        setTimeout(() => {
          el.splash.classList.add("hide");
        }, CONFIG.splashDelay);
      }

      function syncFromCloud() {
        if (!state.cloud.enabled || state.cloud.syncInFlight) return;
        state.cloud.syncInFlight = true;

        cloudGetItem(CONFIG.cloudDataKey)
          .then((raw) => {
            const snapshot = safeJsonParse(raw, null);
            if (!snapshot || !Array.isArray(snapshot.workouts) || !snapshot.draft) return;
            applySnapshot(snapshot);
            persistNowLocal();
            renderAll();
          })
          .finally(() => {
            state.cloud.syncInFlight = false;
          });
      }

      function startCloudPolling() {
        stopCloudPolling();
        if (!state.cloud.enabled) return;

        state.cloud.polling = true;
        cloudPollTimer = setInterval(() => {
          if (document.visibilityState !== "visible") return;
          syncFromCloud();
        }, CONFIG.cloudPollInterval);
      }

      function stopCloudPolling() {
        state.cloud.polling = false;
        clearInterval(cloudPollTimer);
        cloudPollTimer = 0;
      }

      function scheduleCloudResumeSync() {
        clearTimeout(cloudResumeTimer);
        if (!state.cloud.enabled) return;

        cloudResumeTimer = setTimeout(() => {
          syncFromCloud();
        }, CONFIG.cloudResumeDebounce);
      }

      function renderShell() {
        updateMeta();
        renderTabs();
        renderTypeButtons();
        updateTypeUi();
        updateMainActions();
      }

      function renderTodayOnly() {
        updateMeta();
        renderTypeButtons();
        updateTypeUi();
        renderDraft();
        updateForm();
        renderExerciseSearchResults(true);
        updateMainActions();
      }

      function renderCurrentPanel() {
        if (state.tab === "today") {
          renderDraft();
          updateForm();
          renderExerciseSearchResults(true);
          return;
        }

        if (state.tab === "history") {
          renderHistory();
          return;
        }

        renderProgress();
      }

      function renderAll() {
        renderShell();
        renderCurrentPanel();
        scheduleTimerViewportSync();
      }

      function updateMeta() {

        text(

        if (state.tab === "today") {
          if (state.draft.trainingType) {

              el.screenMeta,

            );
          } else {
            text(el.screenMeta, "Выбери тип тренировки");
          }
        } else if (state.tab === "history") {
          if (state.historyUi.activeType) {

            text(el.screenMeta, `${getTypeLabel(state.historyUi.activeType)} · ${count} тренировок`);

      }

      function renderTabs() {
        el.tabsNav.dataset.active = String(tabOrder.indexOf(state.tab));

        el.tabs.forEach((tab) => {
          const active = tab.dataset.tab === state.tab;

        });
      }

      function renderTypeButtons() {
        el.typeButtons.forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.type === state.draft.trainingType);
        });
      }

      function updateTypeUi() {
        const type = state.draft.trainingType;
        text(el.currentTypePill, type ? `Сегодня: ${getTypeLabel(type)}` : "Тип не выбран");
        el.changeTypeBtn.disabled = !type;

      function updateMainActions() {
        const hasSets = getStats(state.draft).sets > 0;

        if (!mainButton) return;

        if (!shouldShow) {

        }

        mainButton.setText("Завершить тренировку");
        mainButton.setParams({ color: "#ff6418", text_color: "#ffffff" });
        mainButton.onClick(finishWorkout);
        mainButton.show();
      }

      function getTemplateReference(exerciseName) {
        const type = state.draft.trainingType;
        if (!exerciseName || !type || !isComparableType(type)) return null;

        const key = exerciseKey(exerciseName);
        for (const workout of state.workouts) {
          if (workout.trainingType !== type) continue;
          const ex = workout.exercises.find((item) => exerciseKey(item.name) === key);
          if (ex) {
            return {
              workout,
              exercise: ex
            };
          }
        }
        return null;
      }

      function getLastSet(name) {
        if (!name) return null;

        const draftExercise = state.draft.exercises.find((ex) => sameName(ex.name, name));
        if (draftExercise && draftExercise.sets.length) {
          return draftExercise.sets[draftExercise.sets.length - 1];
        }

        const template = getTemplateReference(name);
        if (template && template.exercise.sets.length) {
          return template.exercise.sets[template.exercise.sets.length - 1];
        }

        return null;
      }

      function showTemplateForExercise(name) {
        const type = state.draft.trainingType;

        if (!type || !isComparableType(type) || !name) {
          hideTemplateBox();
          return;
        }

        const template = getTemplateReference(name);
        if (!template) {
          hideTemplateBox();
          return;
        }

        text(
          el.templateSub,
          `${getTypeLabel(type)} · ${formatDateWithWeekday(template.workout.performedAt || template.workout.finishedAt || template.workout.createdAt)}`
        );

        el.templateLines.replaceChildren();
        template.exercise.sets.forEach((set, index) => {
          const line = make("div", "template-line", `${index + 1}. ${trimNumber(set.weight)} кг × ${set.reps}`);
          el.templateLines.appendChild(line);
        });

        el.templateBox.classList.add("show");
      }

      function hideTemplateBox() {
        el.templateBox.classList.remove("show");
        el.templateLines.replaceChildren();
        text(el.templateSub, "");
      }

      function updateForm() {
        const type = state.draft.trainingType;
        const name = el.exerciseInput.value.trim();
        const parsed = parseSetInput(el.weightInput.value, el.repsInput.value);
        const valid = Boolean(type) && Boolean(name) && Boolean(parsed);

        el.addSetBtn.disabled = !valid;
        el.repeatSetBtn.disabled = !(type && getLastSet(name));
        updateExerciseClear();
        showTemplateForExercise(name);

        if (!type) {
          text(el.formHint, "Сначала выбери тип тренировки");
          return;
        }

        text(
          el.formHint,

        );
      }

      function clearExerciseInput() {
        el.exerciseInput.value = "";
        state.search.exerciseQuery = "";
        closeExerciseDropdown();
        hideTemplateBox();
        updateForm();
        el.exerciseInput.focus();
      }

      function closeExerciseDropdown() {
        state.search.open = false;
        el.exerciseDropdown.classList.remove("open");
      }

      function scoreExerciseRecord(record, queryTokens, normalizedQuery) {
        if (!normalizedQuery) return 0;
        if (record.normalized === normalizedQuery) return 1000;
        if (record.normalized.startsWith(normalizedQuery)) return 850;
        if (record.normalized.includes(` ${normalizedQuery}`)) return 740;
        if (record.normalized.includes(normalizedQuery)) return 620;

        let score = 0;
        for (const token of queryTokens) {
          if (record.normalized.startsWith(token)) score += 120;
          else if (record.normalized.includes(` ${token}`)) score += 90;
          else if (record.normalized.includes(token)) score += 50;
          else return 0;
        }
        return score;
      }

      function highlightTextByTokens(textValue, queryTokens) {
        const textValueSafe = String(textValue || "");
        if (!queryTokens || !queryTokens.length) return escapeHtml(textValueSafe);

        const normalized = textValueSafe.toLowerCase().replace(/ё/g, "е");
        const ranges = [];

        queryTokens
          .slice()
          .sort((a, b) => b.length - a.length)
          .forEach((token) => {
            let from = 0;
            while (from < normalized.length) {
              const index = normalized.indexOf(token, from);
              if (index < 0) break;
              ranges.push([index, index + token.length]);
              from = index + token.length;
            }
          });

        if (!ranges.length) return escapeHtml(textValueSafe);

        ranges.sort((a, b) => a[0] - b[0]);
        const merged = [];
        for (const range of ranges) {
          const last = merged[merged.length - 1];
          if (!last || range[0] > last[1]) {
            merged.push(range.slice());
          } else {
            last[1] = Math.max(last[1], range[1]);
          }
        }

        let result = "";
        let cursor = 0;
        for (const [start, end] of merged) {
          result += escapeHtml(textValueSafe.slice(cursor, start));
          result += `<span class="history-highlight">${escapeHtml(textValueSafe.slice(start, end))}</span>`;
          cursor = end;
        }
        result += escapeHtml(textValueSafe.slice(cursor));
        return result;
      }

      function renderExerciseSearchResults(force = false) {
        if (!state.draft.trainingType) {
          closeExerciseDropdown();
          return;
        }

        const query = el.exerciseInput.value.trim();
        const normalizedQuery = normalizeSearchText(query);
        const queryTokens = tokenize(query);

        let nextResults;
        if (!normalizedQuery) {
          nextResults = state.exerciseCatalog.searchIndex
            .slice(0, CONFIG.searchMaxResults)
            .map((item) => item.name);
        } else {
          nextResults = state.exerciseCatalog.searchIndex
            .map((record) => ({
              name: record.name,
              score: scoreExerciseRecord(record, queryTokens, normalizedQuery)
            }))
            .filter((item) => item.score > 0)
            .sort((a, b) => {
              if (b.score !== a.score) return b.score - a.score;
              return a.name.localeCompare(b.name, "ru");
            })
            .slice(0, CONFIG.searchMaxResults)
            .map((item) => item.name);
        }

        if (
          !force &&
          state.search.exerciseQuery === query &&
          state.search.results.length === nextResults.length &&
          state.search.results.every((value, index) => value === nextResults[index])
        ) {
          return;
        }

        state.search.exerciseQuery = query;
        state.search.results = nextResults;
        el.exerciseDropdown.replaceChildren();

        if (!document.activeElement || document.activeElement !== el.exerciseInput) {
          closeExerciseDropdown();
          return;
        }

        if (!nextResults.length) {
          closeExerciseDropdown();
          return;
        }

        const fragment = document.createDocumentFragment();
        nextResults.forEach((name) => {
          const btn = make("button", "search-option");
          btn.type = "button";
          btn.innerHTML = highlightTextByTokens(name, queryTokens);
          btn.addEventListener("click", () => {
            selectExerciseSuggestion(name);
          });
          fragment.appendChild(btn);
        });

        el.exerciseDropdown.appendChild(fragment);
        state.search.open = true;
        el.exerciseDropdown.classList.add("open");
      }

      function scheduleExerciseSearchRender() {
        clearTimeout(state.search.debounceTimer);
        state.search.debounceTimer = setTimeout(() => {
          renderExerciseSearchResults();
        }, CONFIG.searchDebounce);
      }

      function selectExerciseSuggestion(name) {
        el.exerciseInput.value = name;
        closeExerciseDropdown();
        fillLastSet();
        updateForm();
        haptic();
      }

      function addExerciseNameToIndex(name) {
        const clean = String(name || "").trim();
        if (!clean) return;
        const key = exerciseKey(clean);
        if (!state.exerciseCatalog.namesByKey.has(key)) {
          state.exerciseCatalog.namesByKey.set(key, clean);
          state.exerciseCatalog.sorted = [...state.exerciseCatalog.namesByKey.values()].sort((a, b) => a.localeCompare(b, "ru"));
          state.exerciseCatalog.searchIndex = state.exerciseCatalog.sorted.map((value) => ({
            name: value,
            normalized: normalizeSearchText(value),
            tokens: tokenize(value)
          }));
        }
      }

      function getOrCreateDraftExercise(name) {
        let ex = state.draft.exercises.find((item) => sameName(item.name, name));

        if (!ex) {
          ex = { id: id(), name, sets: [] };
          state.draft.exercises.push(ex);
          addExerciseNameToIndex(name);
        }

        return ex;
      }

      function addSet() {
        const type = state.draft.trainingType;
        const name = el.exerciseInput.value.trim();
        const parsed = parseSetInput(el.weightInput.value, el.repsInput.value);

        if (!type) {
          toast("Сначала выбери тип тренировки");
          return;
        }

        if (!name || !parsed) {
          toast("Проверь вес и повторы");
          return;
        }

        getOrCreateDraftExercise(name).sets.push({ id: id(), ...parsed });

        el.weightInput.value = "";
        el.repsInput.value = "";
        hideKeyboard();
        haptic();

        schedulePersist();
        renderTodayOnly();

        el.draftList.classList.remove("flash");
        requestAnimationFrame(() => el.draftList.classList.add("flash"));
      }

      function fillLastSet() {
        const last = getLastSet(el.exerciseInput.value.trim());
        if (!last) return;

        el.weightInput.value = last.weight;
        el.repsInput.value = last.reps;
        updateForm();
      }

      function compareSetWithTemplate(exerciseName, setIndex, currentSet) {
        const type = state.draft.trainingType;
        if (!isComparableType(type)) return null;

        const template = getTemplateReference(exerciseName);
        if (!template) return null;

        const prevSet = template.exercise.sets[setIndex];
        if (!prevSet) return null;

        if (currentSet.weight > prevSet.weight) {
          return `+${trimNumber(currentSet.weight - prevSet.weight)} кг ↑`;
        }

        if (currentSet.weight === prevSet.weight && currentSet.reps > prevSet.reps) {
          return `+${currentSet.reps - prevSet.reps} повтор ↑`;
        }

        if (currentSet.weight === prevSet.weight && currentSet.reps === prevSet.reps) {
          return "Без изменений";
        }

        return null;
      }

      function renderDraft() {
        el.draftList.replaceChildren();

        if (!state.draft.trainingType) {
          el.draftList.appendChild(make("div", "empty", "Сначала выбери тип тренировки"));
          return;
        }

        if (!state.draft.exercises.length) {
          el.draftList.appendChild(make("div", "empty", "Пока нет подходов"));
          return;
        }

        const fragment = document.createDocumentFragment();

        state.draft.exercises.forEach((ex) => {
          const box = make("div", "exercise");
          const volume = ex.sets.reduce((sum, set) => sum + set.weight * set.reps, 0);

          const head = make("div", "exercise-head");
          const headLeft = make("div", "");
          headLeft.append(
            make("div", "exercise-name", ex.name)
          );

          if (isComparableType(state.draft.trainingType)) {
            const template = getTemplateReference(ex.name);
            if (template) {
              headLeft.append(make("div", "exercise-sub", "Ориентир с прошлого выполнения"));
            }
          }

          head.append(
            headLeft,
            make("div", "muted", `${ex.sets.length} подходов · ${Math.round(volume)} кг`)
          );

          box.appendChild(head);

          if (isComparableType(state.draft.trainingType)) {
            const template = getTemplateReference(ex.name);
            if (template) {
              const templateInline = make("div", "exercise-template-inline");
              templateInline.appendChild(make("div", "template-title", "Прошлый раз"));
              template.exercise.sets.forEach((set, index) => {
                templateInline.appendChild(
                  make("div", "template-line", `${index + 1}. ${trimNumber(set.weight)} кг × ${set.reps}`)
                );
              });
              box.appendChild(templateInline);
            }
          }

          ex.sets.forEach((set, index) => {
            const row = make("div", "set-row");
            const content = make("div", "set-content");
            content.appendChild(
              make("div", "set-value", `${index + 1}. ${trimNumber(set.weight)} кг × ${set.reps}`)
            );

            const compare = compareSetWithTemplate(ex.name, index, set);
            if (compare) {
              const chip = make(
                "div",
                compare === "Без изменений" ? "progress-chip muted" : "progress-chip",
                compare
              );
              content.appendChild(chip);
            }

            const edit = make("button", "btn-card btn-accent icon-square", "✎");
            edit.type = "button";
            edit.onclick = () => openEditSetModal(ex.id, set.id);

            const del = make("button", "btn-card btn-danger icon-square", "×");
            del.type = "button";
            del.onclick = () => animateRemove(row, () => deleteDraftSet(ex.id, set.id));

            row.append(content, edit, del);
            box.appendChild(row);
          });

          fragment.appendChild(box);
        });

        el.draftList.appendChild(fragment);
      }

      function deleteDraftSet(exId, setId) {
        const ex = state.draft.exercises.find((item) => item.id === exId);
        if (!ex) return;

        ex.sets = ex.sets.filter((set) => set.id !== setId);

        if (!ex.sets.length) {
          state.draft.exercises = state.draft.exercises.filter((item) => item.id !== exId);
        }

        haptic("medium");
        schedulePersist();
        renderTodayOnly();
        toast("Подход удален");
      }

      function openEditSetModal(exId, setId) {
        const ex = state.draft.exercises.find((item) => item.id === exId);
        const set = ex && ex.sets.find((item) => item.id === setId);
        if (!set) return;

        openSheet();
        el.modalBody.replaceChildren();

        const title = make("div", "title", "Редактировать подход");
        const form = make("div", "modal-form");

        const name = document.createElement("input");
        name.value = ex.name;
        name.placeholder = "Упражнение";

        const nums = make("div", "form-numbers");

        const weight = document.createElement("input");
        weight.value = set.weight;
        weight.inputMode = "decimal";
        weight.placeholder = "кг";

        const reps = document.createElement("input");
        reps.value = set.reps;
        reps.inputMode = "numeric";
        reps.placeholder = "раз";

        nums.append(weight, reps);

        const save = make("button", "btn-card btn-accent", "Сохранить");
        save.type = "button";
        save.onclick = () => {
          const parsed = parseSetInput(weight.value, reps.value);
          if (!name.value.trim() || !parsed) {
            toast("Проверь упражнение, вес и повторы");
            return;
          }

          moveOrUpdateSet(state.draft, ex.id, set.id, name.value.trim(), parsed.weight, parsed.reps);
          closeModal();
        };

        const cancel = make("button", "btn-card btn-muted", "Отмена");
        cancel.type = "button";
        cancel.onclick = closeModal;

        form.append(name, nums, save, cancel);
        el.modalBody.append(title, form);
      }

      function moveOrUpdateSet(workout, exId, setId, newName, weight, reps) {
        const oldExercise = workout.exercises.find((ex) => ex.id === exId);
        if (!oldExercise) return;

        const index = oldExercise.sets.findIndex((set) => set.id === setId);
        if (index < 0) return;

        const updated = { ...oldExercise.sets[index], weight, reps };
        oldExercise.sets.splice(index, 1);

        let target = workout.exercises.find((ex) => sameName(ex.name, newName));
        if (!target) {
          target = { id: id(), name: newName, sets: [] };
          workout.exercises.push(target);
          addExerciseNameToIndex(newName);
        }

        target.sets.push(updated);

        if (!oldExercise.sets.length) {
          workout.exercises = workout.exercises.filter((ex) => ex.id !== oldExercise.id);
        }

        haptic();
        schedulePersist();
        renderTodayOnly();
        toast("Подход обновлен");
      }

      async function selectTrainingType(type) {
        if (state.draft.trainingType === type) return;

        const hasSets = getStats(state.draft).sets > 0;
        if (state.draft.trainingType && hasSets) {
          const answer = await showPopup("Сменить тип тренировки?\nТекущая тренировка будет сброшена без сохранения. Продолжить?");
          if (answer !== "ok") return;
          state.draft = createDraft();
        }

        state.draft.trainingType = type;
        state.draft.createdAt = new Date().toISOString();
        state.draft.performedAt = new Date().toISOString();
        el.exerciseInput.value = "";
        el.weightInput.value = "";
        el.repsInput.value = "";
        hideTemplateBox();

        haptic();
        schedulePersist();
        renderTodayOnly();
      }

      async function changeTrainingType() {
        if (!state.draft.trainingType) return;

        const hasSets = getStats(state.draft).sets > 0;
        if (!hasSets) {
          state.draft = createDraft();
          schedulePersist();
          renderTodayOnly();
          return;
        }

        const answer = await showPopup("Сменить тип тренировки?\nТекущая тренировка будет сброшена без сохранения. Продолжить?");
        if (answer !== "ok") return;

        state.draft = createDraft();
        haptic("medium");
        schedulePersist();
        renderTodayOnly();
      }

      async function finishWorkout() {
        if (!state.draft.trainingType) {
          toast("Сначала выбери тип тренировки");
          return;
        }

        if (!getStats(state.draft).sets) return;

        const answer = await showPopup(`Завершить тренировку "${getTypeLabel(state.draft.trainingType)}"?`);
        if (answer !== "ok") return;

        const completedWorkout = sanitizeWorkout({
          ...state.draft,
          status: "completed",
          finishedAt: new Date().toISOString(),
          performedAt: state.draft.performedAt || new Date().toISOString(),
          syncStatus: "pending"
        });

        state.workouts.unshift(completedWorkout);
        state.draft = createDraft();

        fullRebuildIndexes();

        haptic("heavy");
        renderAll();
        schedulePersist(true);
        toast("Тренировка сохранена");
      }

      function formatDateTitle(iso) {
        const date = new Date(iso);
        const now = new Date();

        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const day = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diff = Math.round((today - day) / 86400000);

        if (diff === 0) return "Сегодня";
        if (diff === 1) return "Вчера";

        return date.toLocaleDateString("ru-RU", {
          day: "numeric",
          month: "long",
          year: "numeric"
        });
      }

      function formatDateWithWeekday(iso) {
        const date = new Date(iso);
        const now = new Date();

        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const day = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diff = Math.round((today - day) / 86400000);

        const weekday = date.toLocaleDateString("ru-RU", { weekday: "long" });
        if (diff === 0) return `сегодня, ${weekday}`;

        return `${weekday}, ${date.toLocaleDateString("ru-RU")}`;
      }

      function formatDateInputValue(iso) {
        const d = new Date(iso);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
      }

      function getLastWorkoutByType(type) {
