<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневник тренировок</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        html, body { height: 100%; }
        body {
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 16px 16px 100px 16px;
            display: flex;
            flex-direction: column;
        }
        #app { flex: 1; display: flex; flex-direction: column; }

        .card { background: var(--tg-theme-secondary-bg-color, #f5f5f5); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        input, button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; margin-bottom: 10px; }
        input { background: var(--tg-theme-secondary-bg-color, #f0f0f0); color: var(--tg-theme-text-color, #000); }
        button { background: var(--tg-theme-button-color, #007aff); color: var(--tg-theme-button-text-color, #fff); font-weight: 600; cursor: pointer; }
        .btn-danger { background: #ff3b30; }
        .btn-success { background: #34c759; }
        .btn-warning { background: #ff9500; }
        .row { display: flex; gap: 10px; }
        .row input { flex: 1; }
        .set-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 14px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-card { background: var(--tg-theme-secondary-bg-color, #f5f5f5); padding: 12px; border-radius: 10px; text-align: center; }
        .stat-card .num { font-size: 24px; font-weight: 700; color: var(--tg-theme-button-color, #007aff); }
        .stat-card .label { font-size: 12px; opacity: 0.6; }
        .hidden { display: none; }
        .tab-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-shrink: 0; }
        .tab-bar button { flex: 1; padding: 10px; background: var(--tg-theme-secondary-bg-color, #e5e5e5); color: var(--tg-theme-text-color, #000); border-radius: 10px; font-size: 14px; margin: 0; }
        .tab-bar button.active { background: var(--tg-theme-button-color, #007aff); color: #fff; }
        .content { flex: 1; overflow-y: auto; }

        .timer-bottom {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: auto;
            min-width: 140px;
            padding: 14px 24px;
            border-radius: 16px;
            background: var(--tg-theme-button-color, #007aff);
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: none;
            color: #fff;
            font-weight: 700;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .timer-bottom.running { background: #34c759; }
        .timer-bottom .time { font-size: 22px; font-variant-numeric: tabular-nums; letter-spacing: 0.5px; font-weight: 700; }
        .timer-bottom .ms { font-size: 16px; font-weight: 400; opacity: 0.8; letter-spacing: 0; }
        .timer-bottom .action { font-size: 15px; font-weight: 600; opacity: 0.95; background: rgba(255,255,255,0.2); padding: 4px 14px; border-radius: 20px; }
        .timer-bottom.running .action { background: rgba(255,255,255,0.25); }

        .sync-status { font-size: 12px; opacity: 0.6; text-align: center; padding: 4px; margin-top: 4px; }
        .sync-status.synced { color: #34c759; }
        .sync-status.syncing { color: #ff9500; }

        /* ===== ИСТОРИЯ — ПРОСТЫЕ ПЛАШКИ ===== */
        .history-item {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.15s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .history-item:active {
            background: var(--tg-theme-secondary-bg-color, #e5e5e5);
        }
        .history-item .title {
            font-weight: 600;
            font-size: 16px;
        }
        .history-item .sub {
            font-size: 13px;
            opacity: 0.6;
            margin-top: 2px;
        }
        .history-item .meta {
            font-size: 12px;
            opacity: 0.5;
            margin-top: 4px;
        }

        /* ===== МОДАЛЬНОЕ ОКНО ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-content {
            background: var(--tg-theme-bg-color, #fff);
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            border-radius: 20px 20px 0 0;
            padding: 24px 20px 30px;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        .modal-content .modal-handle {
            width: 40px;
            height: 4px;
            background: rgba(0,0,0,0.2);
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        .modal-content .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .modal-content .modal-date {
            font-size: 14px;
            opacity: 0.6;
            margin-bottom: 16px;
        }
        .modal-content .modal-set {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            font-size: 15px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .modal-content .modal-set .set-info {
            flex: 1;
            min-width: 120px;
        }
        .modal-content .modal-set .set-edit {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .modal-content .modal-set .set-edit input {
            width: 55px;
            padding: 6px 8px;
            font-size: 14px;
            margin: 0;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.08);
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000);
        }
        .modal-content .modal-set .set-edit input.ex-name-input {
            width: 90px;
        }
        .modal-content .modal-set .set-edit .del-btn {
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 20px;
            cursor: pointer;
            padding: 0 6px;
            width: auto;
            margin: 0;
            line-height: 1;
        }
        .modal-content .modal-set .set-edit .del-btn:hover {
            opacity: 0.7;
        }
        .modal-content .modal-close {
            margin-top: 16px;
            background: var(--tg-theme-button-color, #007aff);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }
        .modal-content .modal-add-btn {
            background: var(--tg-theme-button-color, #007aff);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
        }
        .modal-content .modal-save-btn {
            background: #34c759;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="tab-bar">
            <button class="active" onclick="showTab('training')">🏋️ Тренировка</button>
            <button onclick="showTab('history')">📜 История</button>
            <button onclick="showTab('stats')">📊 Прогресс</button>
        </div>

        <div class="content" id="content">
            <div id="tab-training">
                <div class="card">
                    <h3 style="margin-bottom:10px;">Добавить подход</h3>
                    <input id="ex-name" placeholder="Упражнение" list="ex-list">
                    <datalist id="ex-list"></datalist>
                    <div class="row">
                        <input id="ex-weight" placeholder="Вес (кг)" type="number">
                        <input id="ex-reps" placeholder="Повторы" type="number">
                    </div>
                    <button onclick="addSet()">✅ Добавить подход</button>
                </div>

                <div class="card">
                    <h3 style="margin-bottom:10px;">Текущая тренировка</h3>
                    <div id="current-workout"><p style="opacity:0.5;">Пока ничего нет</p></div>
                    <button onclick="saveWorkout()" class="btn-success">💾 Сохранить</button>
                    <div id="syncStatus" class="sync-status">☁️ Данные в облаке</div>
                </div>
            </div>

            <div id="tab-history" class="hidden">
                <div id="history-list"></div>
            </div>

            <div id="tab-stats" class="hidden">
                <div class="card">
                    <h3 style="margin-bottom:10px;">Прогресс</h3>
                    <input id="stats-ex" placeholder="Упражнение" list="ex-list">
                    <button onclick="showProgress()">📈 Показать</button>
                    <div id="stats-result" style="margin-top:12px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- СЕКУНДОМЕР -->
    <div class="timer-bottom" id="timerBtn" onclick="handleTimerClick()">
        <span class="time" id="timerDisplay">00:00<span class="ms">.00</span></span>
        <span class="action" id="timerAction">▶</span>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
        <div class="modal-content" id="modalContent">
            <div class="modal-handle"></div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ===== ОСНОВНЫЕ ДАННЫЕ =====
        let workouts = [];
        let currentSets = [];
        let allExercises = new Set();
        let editingModalIndex = null;

        // ===== CLOUD STORAGE =====
        let cloudStorage = null;
        let isCloudReady = false;

        function initCloud() {
            if (window.Telegram && Telegram.WebApp) {
                cloudStorage = Telegram.WebApp.CloudStorage;
                isCloudReady = true;
            }
        }

        function saveToCloud(key, data) {
            return new Promise((resolve, reject) => {
                if (!isCloudReady || !cloudStorage) {
                    reject(new Error('CloudStorage недоступен'));
                    return;
                }
                try {
                    const json = JSON.stringify(data);
                    cloudStorage.setItem(key, json, (error, success) => {
                        if (error) reject(error);
                        else resolve(success);
                    });
                } catch (e) { reject(e); }
            });
        }

        function loadFromCloud(key) {
            return new Promise((resolve, reject) => {
                if (!isCloudReady || !cloudStorage) {
                    reject(new Error('CloudStorage недоступен'));
                    return;
                }
                cloudStorage.getItem(key, (error, value) => {
                    if (error) reject(error);
                    else {
                        try { resolve(value ? JSON.parse(value) : null); }
                        catch (e) { reject(e); }
                    }
                });
            });
        }

        // ===== СЕКУНДОМЕР =====
        let milliseconds = 0, seconds = 0, interval = null, isRunning = false, startTime = 0;
        const timerBtn = document.getElementById('timerBtn');
        const timerDisplay = document.getElementById('timerDisplay');

        function formatTime() {
            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            const ms = String(milliseconds).padStart(2, '0');
            return `${m}:${s}.<span class="ms">${ms}</span>`;
        }

        function updateUI() {
            timerDisplay.innerHTML = formatTime();
            if (isRunning) {
                timerBtn.className = 'timer-bottom running';
                document.getElementById('timerAction').textContent = '⏹';
            } else {
                timerBtn.className = 'timer-bottom';
                document.getElementById('timerAction').textContent = '▶';
            }
        }

        function handleTimerClick() {
            if (isRunning) {
                clearInterval(interval);
                interval = null;
                isRunning = false;
                milliseconds = 0;
                seconds = 0;
                startTime = 0;
            } else {
                milliseconds = 0;
                seconds = 0;
                startTime = Date.now();
                isRunning = true;
                interval = setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    seconds = Math.floor(elapsed / 1000);
                    milliseconds = Math.floor((elapsed % 1000) / 10);
                    timerDisplay.innerHTML = formatTime();
                }, 20);
            }
            updateUI();
        }

        // ===== РАБОТА С ДАННЫМИ =====
        function updateExerciseList() {
            const list = document.getElementById('ex-list');
            list.innerHTML = '';
            allExercises.forEach(ex => {
                const opt = document.createElement('option');
                opt.value = ex;
                list.appendChild(opt);
            });
        }

        async function loadData() {
            try {
                const saved = await loadFromCloud('workouts');
                if (saved) {
                    workouts = saved;
                    workouts.forEach(w => {
                        w.sets.forEach(s => allExercises.add(s.name));
                    });
                }
            } catch (e) {
                try {
                    const local = localStorage.getItem('workouts_backup');
                    if (local) {
                        workouts = JSON.parse(local);
                        workouts.forEach(w => {
                            w.sets.forEach(s => allExercises.add(s.name));
                        });
                    }
                } catch (e2) {}
            }
            updateExerciseList();
            renderHistory();
            renderCurrentWorkout();
        }

        async function syncToCloud() {
            const statusEl = document.getElementById('syncStatus');
            if (statusEl) {
                statusEl.textContent = '☁️ Синхронизация...';
                statusEl.className = 'sync-status syncing';
            }
            try {
                await saveToCloud('workouts', workouts);
                localStorage.setItem('workouts_backup', JSON.stringify(workouts));
                if (statusEl) {
                    statusEl.textContent = '✅ Сохранено в облаке';
                    statusEl.className = 'sync-status synced';
                }
            } catch (e) {
                localStorage.setItem('workouts_backup', JSON.stringify(workouts));
                if (statusEl) {
                    statusEl.textContent = '⚠️ Сохранено локально';
                    statusEl.className = 'sync-status';
                }
            }
            if (statusEl) {
                setTimeout(() => {
                    statusEl.textContent = '☁️ Данные в облаке';
                    statusEl.className = 'sync-status';
                }, 3000);
            }
        }

        function addSet() {
            const name = document.getElementById('ex-name').value.trim();
            const weight = parseFloat(document.getElementById('ex-weight').value);
            const reps = parseInt(document.getElementById('ex-reps').value);
            if (!name || !weight || !reps) { alert('Заполните все поля'); return; }
            currentSets.push({ name, weight, reps });
            allExercises.add(name);
            updateExerciseList();
            document.getElementById('ex-name').value = '';
            document.getElementById('ex-weight').value = '';
            document.getElementById('ex-reps').value = '';
            renderCurrentWorkout();
        }

        function renderCurrentWorkout() {
            const div = document.getElementById('current-workout');
            if (currentSets.length === 0) {
                div.innerHTML = '<p style="opacity:0.5;">Пока ничего нет</p>';
                return;
            }
            div.innerHTML = currentSets.map((s, i) =>
                `<div class="set-item"><span>${s.name} — ${s.weight}кг × ${s.reps}</span></div>`
            ).join('');
        }

        async function saveWorkout() {
            if (currentSets.length === 0) { alert('Нет подходов'); return; }
            const now = new Date();
            const date = now.toLocaleDateString('ru-RU') + ' ' + now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            workouts.push({ date, sets: [...currentSets] });
            currentSets = [];
            renderCurrentWorkout();
            renderHistory();
            await syncToCloud();
        }

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function getDayName(dateStr) {
            const parts = dateStr.split(' ');
            const d = parts[0].split('.');
            const date = new Date(parseInt(d[2]), parseInt(d[1])-1, parseInt(d[0]));
            const days = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
            return days[date.getDay()];
        }

        function getExercisesCount(sets) {
            const unique = new Set(sets.map(s => s.name));
            return unique.size;
        }

        function getTotalSets(sets) {
            return sets.length;
        }

        // ===== ИСТОРИЯ — ПРОСТЫЕ ПЛАШКИ БЕЗ КНОПОК =====
        function renderHistory() {
            const div = document.getElementById('history-list');
            if (workouts.length === 0) {
                div.innerHTML = '<div class="card"><p style="opacity:0.5;">История пуста</p></div>';
                return;
            }

            let html = '';
            workouts.slice().reverse().forEach((w, idx) => {
                const realIndex = workouts.length - 1 - idx;
                const dayName = getDayName(w.date);
                const exCount = getExercisesCount(w.sets);
                const setCount = getTotalSets(w.sets);

                html += `
                    <div class="history-item" onclick="openModal(${realIndex})">
                        <div class="title">🏋️ Тренировка в ${dayName}</div>
                        <div class="sub">${w.date}</div>
                        <div class="meta">${exCount} упражнений · ${setCount} подходов</div>
                    </div>
                `;
            });

            div.innerHTML = html;
        }

        // ===== МОДАЛЬНОЕ ОКНО С РЕДАКТИРОВАНИЕМ =====
        function openModal(index) {
            editingModalIndex = index;
            const overlay = document.getElementById('modalOverlay');
            const body = document.getElementById('modalBody');
            const w = workouts[index];
            if (!w) return;

            renderModalBody(index);
            overlay.classList.add('open');
        }

        function renderModalBody(index) {
            const body = document.getElementById('modalBody');
            const w = workouts[index];
            if (!w) return;

            let setsHtml = w.sets.map((s, si) => `
                <div class="modal-set" data-setindex="${si}">
                    <div class="set-info">${s.name}</div>
                    <div class="set-edit">
                        <input type="text" class="ex-name-input" value="${s.name}" data-set="${si}" placeholder="Упр.">
                        <input type="number" class="edit-weight" value="${s.weight}" data-set="${si}" placeholder="Вес">
                        <span>×</span>
                        <input type="number" class="edit-reps" value="${s.reps}" data-set="${si}" placeholder="Повт.">
                        <button class="del-btn" onclick="deleteSetFromModal(${index}, ${si})">✕</button>
                    </div>
                </div>
            `).join('');

            body.innerHTML = `
                <div class="modal-title">✏️ Редактирование</div>
                <div class="modal-date">${w.date}</div>
                <div style="margin: 8px 0 4px; font-size: 13px; opacity:0.6;">Подходы</div>
                ${setsHtml}
                <button class="modal-add-btn" onclick="addSetToModal(${index})">➕ Добавить подход</button>
                <button class="modal-save-btn" onclick="saveEditModal(${index})">💾 Сохранить изменения</button>
                <button class="modal-close" onclick="closeModal()">Закрыть</button>
            `;
        }

        function addSetToModal(index) {
            const w = workouts[index];
            if (!w) return;
            w.sets.push({ name: 'Новое', weight: 0, reps: 0 });
            renderModalBody(index);
        }

        function deleteSetFromModal(index, setIdx) {
            if (workouts[index]) {
                workouts[index].sets.splice(setIdx, 1);
                if (workouts[index].sets.length === 0) {
                    workouts.splice(index, 1);
                    closeModal();
                } else {
                    renderModalBody(index);
                }
                renderHistory();
                syncToCloud();
            }
        }

        function saveEditModal(index) {
            const body = document.getElementById('modalBody');
            const exInputs = body.querySelectorAll('.ex-name-input');
            const weightInputs = body.querySelectorAll('.edit-weight');
            const repInputs = body.querySelectorAll('.edit-reps');

            const newSets = [];
            let valid = true;
            exInputs.forEach((el, i) => {
                const name = el.value.trim();
                const weight = parseFloat(weightInputs[i].value);
                const reps = parseInt(repInputs[i].value);
                if (name && !isNaN(weight) && !isNaN(reps) && weight > 0 && reps > 0) {
                    newSets.push({ name, weight, reps });
                    allExercises.add(name);
                } else {
                    valid = false;
                }
            });

            if (!valid || newSets.length === 0) {
                alert('Заполните все поля корректно (название, вес > 0, повторы > 0)');
                return;
            }

            workouts[index].sets = newSets;
            editingModalIndex = null;
            updateExerciseList();
            renderHistory();
            syncToCloud();
            renderModalBody(index);
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
            editingModalIndex = null;
        }

        function closeModalOutside(e) {
            if (e.target === document.getElementById('modalOverlay')) {
                closeModal();
            }
        }

        // ===== ПРОГРЕСС =====
        function showProgress() {
            const exName = document.getElementById('stats-ex').value.trim();
            const div = document.getElementById('stats-result');
            if (!exName) { div.innerHTML = 'Введите упражнение'; return; }
            const entries = [];
            workouts.forEach(w => {
                w.sets.forEach(s => {
                    if (s.name === exName) entries.push({ date: w.date, weight: s.weight, reps: s.reps });
                });
            });
            if (entries.length === 0) { div.innerHTML = 'Нет данных'; return; }
            const maxWeight = Math.max(...entries.map(e => e.weight));
            const maxReps = Math.max(...entries.map(e => e.reps));
            div.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="num">${entries.length}</div><div class="label">Подходов</div></div>
                    <div class="stat-card"><div class="num">${maxWeight}кг</div><div class="label">Макс вес</div></div>
                    <div class="stat-card"><div class="num">${maxReps}</div><div class="label">Макс повторы</div></div>
                    <div class="stat-card"><div class="num">${entries[entries.length-1].weight}×${entries[entries.length-1].reps}</div><div class="label">Последний</div></div>
                </div>
                <div style="margin-top:10px;font-size:12px;opacity:0.6;">${entries.map(e => `${e.weight}×${e.reps}`).join(' → ')}</div>
            `;
        }

        // ===== ВКЛАДКИ =====
        function showTab(tab) {
            document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-bar button:nth-child(${tab === 'training' ? 1 : tab === 'history' ? 2 : 3})`).classList.add('active');
            document.getElementById('tab-training').classList.toggle('hidden', tab !== 'training');
            document.getElementById('tab-history').classList.toggle('hidden', tab !== 'history');
            document.getElementById('tab-stats').classList.toggle('hidden', tab !== 'stats');
            if (tab === 'history') renderHistory();
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        function initApp() {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
                initCloud();
                loadData();
                updateUI();
            } else {
                setTimeout(initApp, 500);
            }
        }

        initApp();
    </script>
</body>
</html>
