<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Святилище ТРЕНЕРА</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #070707;
      --bg-solid: #090909;
      --surface: rgba(255, 255, 255, 0.055);
      --surface-strong: rgba(255, 255, 255, 0.075);
      --field: #171717;
      --line: rgba(255, 255, 255, 0.09);
      --line-strong: rgba(255, 255, 255, 0.14);
      --text: #fff;
      --muted: rgba(255, 255, 255, 0.58);
      --muted-2: rgba(255, 255, 255, 0.4);
      --accent: #ff6418;
      --accent-soft: rgba(255, 100, 24, 0.1);
      --accent-line: rgba(255, 100, 24, 0.24);
      --success: #31d67b;
      --success-soft: rgba(49, 214, 123, 0.12);
      --success-line: rgba(49, 214, 123, 0.26);
      --warn: #ffb24a;
      --warn-soft: rgba(255, 178, 74, 0.12);
      --warn-line: rgba(255, 178, 74, 0.28);
      --danger: #ff8a8a;
      --danger-soft: rgba(255, 70, 70, 0.12);
      --danger-line: rgba(255, 90, 90, 0.28);
      --radius: 18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --tab-index: 0;
    }

    html,
    body {
      min-height: 100%;
      background: var(--bg-solid);
    }

    body {
      position: relative;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      background:
        radial-gradient(circle at 100% 0%, rgba(255, 100, 24, 0.11), transparent 30%),
        radial-gradient(circle at 0% 0%, rgba(255, 100, 24, 0.05), transparent 24%),
        var(--bg-solid);
      color: var(--text);
      padding: max(14px, var(--safe-top)) 14px calc(28px + var(--safe-bottom));
      font-size: 15px;
      overflow-x: hidden;
    }

    button,
    input,
    select {
      font: inherit;
      color: inherit;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 760;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition:
        transform 0.14s ease,
        background-color 0.16s ease,
        border-color 0.16s ease,
        box-shadow 0.16s ease,
        opacity 0.16s ease,
        color 0.16s ease;
    }

    button:disabled {
      opacity: 0.42;
      cursor: default;
    }

    input,
    select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: var(--field);
      color: #fff;
      outline: none;
      transition:
        border-color 0.16s ease,
        box-shadow 0.16s ease,
        transform 0.14s ease,
        opacity 0.16s ease;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.38);
    }

    input:focus,
    select:focus {
      border-color: rgba(255, 100, 24, 0.75);
      box-shadow: 0 0 0 3px rgba(255, 100, 24, 0.13);
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
      background: transparent;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      padding-right: clamp(138px, 35vw, 176px);
      animation: softIn 0.18s ease both;
    }

    .top-copy {
      min-width: 0;
    }

    .title {
      font-size: 28px;
      line-height: 1.08;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .section {
      margin-bottom: 16px;
      animation: softIn 0.18s ease both;
    }

    .section-title {
      font-size: 18px;
      font-weight: 820;
      margin-bottom: 10px;
    }

    .card {
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 13px;
      margin-bottom: 10px;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.14);
      animation: softIn 0.18s ease both;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .empty {
      padding: 24px 14px;
      text-align: center;
      color: var(--muted);
    }

    .panel {
      display: none;
      background: transparent;
    }

    .panel.active {
      display: block;
      animation: panelSlide 0.18s cubic-bezier(.2, .8, .2, 1) both;
    }

    .splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      align-items: end;
      background: #050505;
      overflow: hidden;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    .splash.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.02);
      filter: saturate(0.98) brightness(0.86) contrast(1.02);
    }

    .splash::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.08),
        rgba(0, 0, 0, 0.18) 38%,
        rgba(0, 0, 0, 0.92)
      );
    }

    .splash-content {
      position: relative;
      z-index: 2;
      padding: 28px 22px calc(34px + var(--safe-bottom));
    }

    .splash-title {
      max-width: 360px;
      font-size: 42px;
      line-height: 1.05;
      font-weight: 850;
    }

    .splash-title span {
      color: var(--accent);
    }

    .splash-sub {
      margin-top: 12px;
      max-width: 310px;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.45;
    }

    .loader {
      width: 100%;
      height: 5px;
      margin-top: 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      overflow: hidden;
    }

    .loader i {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      animation: load 1.5s ease-in-out infinite;
    }

    .tabs-shell {
      width: 100%;
      padding: 7px;
      margin-bottom: 16px;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.055)),
        rgba(255, 255, 255, 0.075);
      border: 1px solid rgba(255, 255, 255, 0.13);
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      animation: softIn 0.18s ease both;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .tabs {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .tabs::before {
      content: "";
      position: absolute;
      z-index: 0;
      top: 0;
      bottom: 0;
      left: 0;
      width: calc((100% - 16px) / 3);
      border-radius: 18px;
      background: rgba(255, 100, 24, 0.14);
      border: 1px solid rgba(255, 100, 24, 0.28);
      box-shadow: 0 8px 16px rgba(255, 100, 24, 0.08);
      transform: translateX(calc(var(--tab-index) * (100% + 8px)));
      transition: transform 0.22s cubic-bezier(.2, .9, .2, 1);
      box-sizing: border-box;
    }

    .tabs[data-active="0"] { --tab-index: 0; }
    .tabs[data-active="1"] { --tab-index: 1; }
    .tabs[data-active="2"] { --tab-index: 2; }

    .tab {
      position: relative;
      z-index: 1;
      min-height: 50px;
      border-radius: 18px;
      background: transparent;
      border: 1px solid transparent;
      color: rgba(255, 255, 255, 0.72);
      box-shadow: none;
      font-size: 14px;
      transition: color 0.18s ease, transform 0.14s ease;
    }

    .tab.active {
      color: var(--accent);
    }

    .premium-chooser {
      display: grid;
      gap: 12px;
      margin-top: 4px;
    }

    .premium-type {
      position: relative;
      width: 100%;
      min-height: 90px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)),
        rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      box-shadow:
        0 14px 26px rgba(0, 0, 0, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      text-align: left;
      overflow: hidden;
    }

    .premium-type::after {
      content: "";
      position: absolute;
      inset: auto -10% -30% auto;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,100,24,0.14), transparent 68%);
      pointer-events: none;
    }

    .premium-type.active {
      border-color: rgba(255,100,24,0.34);
      background:
        linear-gradient(180deg, rgba(255,100,24,0.12), rgba(255,255,255,0.03)),
        rgba(255,255,255,0.035);
      box-shadow:
        0 18px 30px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .premium-icon {
      width: 52px;
      height: 52px;
      min-width: 52px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--accent);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .premium-icon svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .premium-copy {
      min-width: 0;
      flex: 1;
      display: block;
    }

    .premium-title {
      display: block;
      font-size: 17px;
      font-weight: 820;
      line-height: 1.1;
    }

    .premium-sub {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .premium-check {
      min-width: 26px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: transparent;
      background: rgba(255,255,255,0.04);
      transition: all 0.16s ease;
    }

    .premium-type.active .premium-check {
      color: #fff;
      border-color: rgba(255,100,24,0.44);
      background: rgba(255,100,24,0.78);
    }

    .start-cta {
      margin-top: 4px;
      min-height: 58px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 800;
    }

    .training-head {
      width: 100%;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03)),
        rgba(255,255,255,0.02);
      border: 1px solid var(--line);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
      box-shadow: 0 14px 28px rgba(0,0,0,0.14);
    }

    .training-head-title {
      font-size: 22px;
      font-weight: 840;
      line-height: 1.08;
    }

    .training-head-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .training-head-arrow {
      min-width: 36px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.52);
      background: rgba(255,255,255,0.03);
      flex: none;
    }

    .form-stack,
    .modal-form {
      display: grid;
      gap: 9px;
    }

    .form-numbers {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 9px;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row > * {
      flex: 1;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      padding-right: 38px;
    }

    .input-clear {
      position: absolute;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      min-width: 28px;
      min-height: 28px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: transparent;
      box-shadow: none;
      color: rgba(255, 255, 255, 0.54);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.16s ease,
        transform 0.16s ease,
        color 0.16s ease;
    }

    .input-wrap.has-value .input-clear {
      opacity: 1;
      pointer-events: auto;
    }

    .input-clear svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .search-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 30;
      display: none;
      max-height: min(300px, 48vh);
      overflow: auto;
      border-radius: 16px;
      background: #121212;
      border: 1px solid var(--line);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.32);
      overscroll-behavior: contain;
    }

    .search-dropdown.open {
      display: block;
      animation: softIn 0.12s ease both;
    }

    .search-option {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: #fff;
      text-align: left;
      padding: 12px 14px;
      box-shadow: none;
      font-weight: 650;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .search-option:last-child {
      border-bottom: 0;
    }

    .search-main {
      font-size: 15px;
      font-weight: 760;
    }

    .search-secondary {
      margin-top: 4px;
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      font-weight: 500;
    }

    .history-highlight {
      background: rgba(255, 100, 24, 0.22);
      color: #fff;
      padding: 0 2px;
      border-radius: 4px;
    }

    .btn-card {
      min-height: 54px;
      padding: 0 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      box-shadow: none;
      font-weight: 750;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      overflow: visible;
      text-overflow: clip;
      line-height: 1;
    }

    .btn-muted {
      background: rgba(255, 255, 255, 0.06);
    }

    .btn-accent {
      color: var(--accent);
      background: var(--accent-soft);
      border-color: var(--accent-line);
    }

    .btn-danger {
      color: var(--danger);
      background: var(--danger-soft);
      border-color: var(--danger-line);
    }

    .icon-square {
      width: 58px;
      min-width: 58px;
      min-height: 58px;
      padding: 0;
      font-size: 18px;
      flex-shrink: 0;
    }

    .fallback-finish {
      display: none;
      width: 100%;
      margin-top: 10px;
      background: #ff6418;
      color: #fff;
      border-color: rgba(255, 100, 24, 0.55);
    }

    .exercise {
      padding: 16px 0;
      border-bottom: 1px solid var(--line);
      animation: itemIn 0.16s cubic-bezier(.2, .8, .2, 1) both;
    }

    .exercise:last-child {
      border-bottom: 0;
    }

    .exercise-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      align-items: flex-start;
    }

    .exercise-name {
      font-size: 16px;
      font-weight: 820;
      overflow-wrap: anywhere;
    }

    .exercise-sub {
      margin-top: 4px;
      color: rgba(255,255,255,0.42);
      font-size: 12px;
    }

    .previous-summary {
      margin-bottom: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      line-height: 1.35;
    }

    .set-row {
      display: grid;
      grid-template-columns: 1fr 58px 58px;
      gap: 8px;
      align-items: stretch;
      min-height: 54px;
      margin-bottom: 10px;
      animation: itemIn 0.16s cubic-bezier(.2, .8, .2, 1) both;
      overflow: hidden;
    }

    .set-card {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02)),
        rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .set-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .set-index {
      font-size: 12px;
      color: rgba(255,255,255,0.42);
      font-weight: 740;
      letter-spacing: 0.01em;
    }

    .set-status {
      min-height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      width: fit-content;
    }

    .set-status.progress {
      color: var(--success);
      background: var(--success-soft);
      border-color: var(--success-line);
    }

    .set-status.regress {
      color: var(--danger);
      background: var(--danger-soft);
      border-color: var(--danger-line);
    }

    .set-status.equal {
      color: var(--warn);
      background: var(--warn-soft);
      border-color: var(--warn-line);
    }

    .set-values {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .value-box {
      min-width: 0;
      padding: 10px 11px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.07);
    }

    .value-box.current {
      background: rgba(255,255,255,0.045);
    }

    .value-box.previous {
      background: rgba(255,255,255,0.025);
    }

    .value-label {
      font-size: 11px;
      color: rgba(255,255,255,0.38);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .value-main {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .history-categories {
      display: grid;
      gap: 10px;
    }

    .history-category {
      width: 100%;
      min-height: 92px;
      text-align: left;
      display: block;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.02)),
        rgba(255, 255, 255, 0.025);
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: none;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .history-category.custom {
      margin-top: 8px;
      border-color: rgba(255,100,24,0.16);
    }

    .history-category-title {
      font-weight: 820;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .history-category-sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .history-breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .link-btn {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      box-shadow: none;
      color: rgba(255,255,255,0.86);
      font-size: 13px;
      font-weight: 700;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255, 100, 24, 0.12);
      border: 1px solid rgba(255, 100, 24, 0.22);
      color: var(--accent);
      font-size: 13px;
      font-weight: 760;
    }

    .history-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 62px 62px;
      gap: 8px;
      align-items: stretch;
      min-height: 92px;
      margin-bottom: 8px;
      overflow: visible;
      animation: itemIn 0.16s cubic-bezier(.2, .8, .2, 1) both;
    }

    .history-item {
      width: 100%;
      min-height: 92px;
      text-align: left;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.02)),
        rgba(255, 255, 255, 0.025);
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: none;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      overflow: hidden;
    }

    .history-title {
      font-weight: 820;
      font-size: 16px;
      margin-bottom: 4px;
      line-height: 1.1;
    }

    .progress-controls {
      display: grid;
      gap: 10px;
    }

    .progress-mode {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 5px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .progress-mode-btn {
      min-height: 42px;
      border-radius: 14px;
      background: transparent;
      border: 1px solid transparent;
      color: rgba(255, 255, 255, 0.68);
      font-weight: 760;
      box-shadow: none;
    }

    .progress-mode-btn.active {
      color: var(--accent);
      background: rgba(255, 100, 24, 0.12);
      border-color: rgba(255, 100, 24, 0.26);
    }

    .progress-empty-card {
      border-radius: 22px;
      padding: 24px 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at 90% 100%, rgba(255, 84, 0, 0.12), transparent 28%),
        linear-gradient(180deg, rgba(22, 22, 22, 0.96), rgba(10, 10, 10, 0.98));
      text-align: center;
    }

    .progress-empty-card-title {
      font-size: 16px;
      font-weight: 820;
      margin-bottom: 6px;
    }

    .sync-pill {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      font-weight: 700;
      width: fit-content;
    }

    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      flex: none;
    }

    .sync-pill.synced .sync-dot { background: var(--success); }
    .sync-pill.syncing .sync-dot { background: var(--warn); }
    .sync-pill.failed .sync-dot { background: var(--danger); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + var(--safe-bottom));
      transform: translateX(-50%);
      max-width: calc(100vw - 28px);
      padding: 11px 15px;
      border-radius: 999px;
      background: rgba(20, 20, 20, 0.92);
      border: 1px solid var(--line);
      z-index: 95;
      display: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.64);
      display: none;
      align-items: flex-end;
      z-index: 80;
    }

    .modal.open {
      display: flex;
      animation: fadeIn 0.14s ease both;
    }

    .sheet {
      width: 100%;
      max-width: 560px;
      max-height: 88vh;
      margin: 0 auto;
      overflow: auto;
      background: #0b0b0b;
      border: 1px solid var(--line);
      border-radius: 24px 24px 0 0;
      padding: 18px 14px calc(28px + var(--safe-bottom));
      animation: sheetIn 0.2s cubic-bezier(.2, .9, .2, 1) both;
    }

    .handle {
      width: 42px;
      height: 4px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.22);
      margin: 0 auto 16px;
    }

    .sheet-actions {
      position: sticky;
      bottom: -14px;
      padding-top: 12px;
      margin-top: 12px;
      background: linear-gradient(
        180deg,
        transparent,
        rgba(11, 11, 11, 0.95) 44%,
        #0b0b0b 90%
      );
      display: grid;
      gap: 8px;
    }

    .sheet-actions > .btn-card {
      width: 100%;
      display: block;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .modal-set-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 40px;
      padding: 8px 0;
    }

    .edit-exercise-group {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .edit-exercise-group:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .edit-exercise-group > input {
      margin-bottom: 12px;
    }

    .edit-set-card {
      display: grid;
      grid-template-columns: 1fr 58px;
      gap: 8px;
      align-items: stretch;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.045);
      box-shadow: none;
      overflow: hidden;
    }

    .remove-anim {
      opacity: 0 !important;
      transform: translateX(18px) scale(0.96) !important;
      max-height: 0 !important;
      margin-top: 0 !important;
      margin-bottom: 0 !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      transition:
        opacity 0.18s ease,
        transform 0.18s ease,
        max-height 0.2s ease,
        margin 0.2s ease,
        padding 0.2s ease;
    }

    .flash {
      animation: flash 0.32s ease both;
    }

    .global-timer-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 60;
      transform: translate3d(0, 0, 0);
      will-change: transform, width, height;
    }

    .global-timer {
      position: absolute;
      top: calc(12px + var(--safe-top));
      right: calc(12px + var(--safe-right));
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .timer-widget {
      min-height: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 17px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(10, 10, 10, 0.28);
      box-shadow:
        0 10px 20px rgba(0, 0, 0, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.92);
      pointer-events: auto;
      touch-action: manipulation;
    }

    .timer-idle,
    .timer-live {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .timer-idle {
      color: rgba(255, 255, 255, 0.76);
      font-size: 15px;
      font-weight: 780;
    }

    .timer-live {
      color: rgba(255, 255, 255, 0.96);
    }

    .timer-icon {
      width: 14px;
      height: 14px;
      display: block;
      flex: none;
      color: var(--accent);
    }

    .timer-readout {
      font-size: 20px;
      line-height: 1;
      font-weight: 820;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }

    .timer-mark {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      opacity: 0.88;
      flex: none;
    }

    .timer-mark svg {
      width: 9px;
      height: 9px;
      display: block;
    }

    .timer-widget.running .timer-idle {
      display: none;
    }

    .timer-widget:not(.running) .timer-live {
      display: none;
    }

    button:active,
    .history-item:active,
    .history-category:active,
    .premium-type:active {
      transform: scale(0.98);
    }

    .toast.show {
      animation: toastIn 0.16s ease both;
    }

    @keyframes load {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(260%); }
    }

    @keyframes softIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes panelSlide {
      from { opacity: 0; transform: translateX(10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes itemIn {
      from { opacity: 0; transform: translateY(6px) scale(0.99); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 8px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes sheetIn {
      from { opacity: 0; transform: translateY(20px) scale(0.99); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes flash {
      0% { box-shadow: 0 0 0 rgba(255, 100, 24, 0); }
      35% {
        box-shadow:
          0 0 0 2px rgba(255, 100, 24, 0.14),
          0 12px 20px rgba(255, 100, 24, 0.08);
      }
      100% { box-shadow: 0 14px 28px rgba(0, 0, 0, 0.14); }
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <img class="splash-img" src="loading.jpg" alt="Загрузка" />
    <div class="splash-content">
      <div class="splash-title">Святилище<br /><span>ТРЕНЕРА</span></div>
      <div class="splash-sub">всем привет сегодня трена</div>
      <div class="loader"><i></i></div>
    </div>
  </div>

  <div class="app">
    <header class="top">
      <div class="top-copy">
        <div class="title" id="screenTitle">Трена</div>
        <div class="meta" id="screenMeta">Загрузка данных</div>
      </div>
    </header>

    <div class="tabs-shell">
      <nav class="tabs" id="tabsNav" data-active="0">
        <button class="tab active" type="button" data-tab="today">Трена</button>
        <button class="tab" type="button" data-tab="history">История</button>
        <button class="tab" type="button" data-tab="progress">Прогресс</button>
      </nav>
    </div>

    <main>
      <section class="panel active" id="todayPanel">
        <div id="typeChooserBlock">
          <section class="section">
            <div class="premium-chooser" id="typeChooser"></div>
            <button class="start-cta" id="startTrainingBtn" type="button" disabled>Начать тренировку</button>
          </section>
        </div>

        <div id="trainingScreen" style="display:none;">
          <section class="section">
            <button class="training-head" id="trainingHeadBtn" type="button">
              <div>
                <div class="training-head-title" id="trainingHeadTitle">Тренировка</div>
                <div class="training-head-sub">Нажми, чтобы сменить тип тренировки</div>
              </div>
              <div class="training-head-arrow">›</div>
            </button>
          </section>

          <section class="section">
            <div class="section-title">Добавить подход</div>
            <div class="card">
              <div class="form-stack">
                <div class="input-wrap" id="exerciseInputWrap">
                  <input
                    id="exerciseInput"
                    placeholder="Название упражнения"
                    autocomplete="off"
                    spellcheck="false"
                  />
                  <button
                    id="exerciseClearBtn"
                    class="input-clear"
                    type="button"
                    aria-label="Очистить поле упражнения"
                  >
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                      <path d="M7.76 7.76a1 1 0 0 1 1.41 0L12 10.59l2.83-2.83a1 1 0 1 1 1.41 1.41L13.41 12l2.83 2.83a1 1 0 1 1-1.41 1.41L12 13.41l-2.83 2.83a1 1 0 1 1-1.41-1.41L10.59 12 7.76 9.17a1 1 0 0 1 0-1.41Z"></path>
                    </svg>
                  </button>
                  <div class="search-dropdown" id="exerciseDropdown"></div>
                </div>

                <div class="form-numbers">
                  <input id="weightInput" placeholder="Вес, кг" inputmode="decimal" />
                  <input id="repsInput" placeholder="Повторы" inputmode="numeric" />
                </div>

                <div class="row">
                  <button id="prefillSetBtn" type="button" class="btn-card btn-muted" disabled>Подставить</button>
                  <button id="addSetBtn" type="button" class="btn-card btn-accent" disabled>Добавить</button>
                </div>

                <div class="muted" id="formHint">Выбери упражнение, вес и повторы</div>
              </div>
            </div>
          </section>

          <section class="section">
            <div class="section-title">Текущая тренировка</div>
            <div class="card" id="draftList"></div>
            <button id="fallbackFinishBtn" type="button" class="fallback-finish btn-card">
              Завершить тренировку
            </button>
          </section>
        </div>
      </section>

      <section class="panel" id="historyPanel">
        <div id="historyList"></div>
      </section>

      <section class="panel" id="progressPanel">
        <div class="card">
          <div class="progress-controls">
            <select id="progressSelect"></select>
            <div class="progress-mode" id="progressMode">
              <button class="progress-mode-btn active" type="button" data-metric="weight">Вес</button>
              <button class="progress-mode-btn" type="button" data-metric="volume">Объём</button>
              <button class="progress-mode-btn" type="button" data-metric="reps">Повторы</button>
            </div>
          </div>
          <div id="progressResult"></div>
        </div>
      </section>
    </main>
  </div>

  <div class="global-timer-layer" id="timerLayer" aria-hidden="false">
    <div class="global-timer">
      <button class="timer-widget" id="timerToggleBtn" type="button" aria-label="Запустить секундомер">
        <span class="timer-idle">
          <svg class="timer-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M8 6.5c0-.82.93-1.29 1.59-.81l8.15 5.95a1 1 0 0 1 0 1.62L9.59 19.2A1 1 0 0 1 8 18.39V6.5Z"></path>
          </svg>
          <span>Старт</span>
        </span>
        <span class="timer-live">
          <span class="timer-readout" id="timerReadout">00:00.00</span>
          <span class="timer-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <rect x="7" y="7" width="10" height="10" rx="2"></rect>
            </svg>
          </span>
        </span>
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal" id="modal">
    <div class="sheet">
      <div class="handle"></div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const CONFIG = {
        storageKey: "workouts_v10",
        draftKey: "draft_workout_v10",
        localDataKey: "trainer_data_v7",
        cloudDataKey: "trainer_cloud_data_v7",
        splashDelay: 900,
        toastDelay: 2300,
        persistDelay: 80,
        cloudSaveDebounce: 180,
        searchDebounce: 70,
        searchMaxResults: 20,
        cloudPollInterval: 7000,
        cloudResumeDebounce: 600
      };

      const TRAINING_TYPES = {
        chest: {
          label: "Грудь",
          sub: "Жимы, разводки, акцент на силу и форму",
          icon: `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 10h3"></path>
              <path d="M18 10h3"></path>
              <path d="M6 8v4"></path>
              <path d="M18 8v4"></path>
              <path d="M9 12V8"></path>
              <path d="M15 12V8"></path>
              <path d="M9 10h6"></path>
            </svg>
          `
        },
        back: {
          label: "Спина",
          sub: "Тяги, ширина, толщина и контроль спины",
          icon: `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 4a2 2 0 1 0 0 4a2 2 0 0 0 0-4Z"></path>
              <path d="M8.5 20c0-2.5 1-4.5 3.5-5 2.5.5 3.5 2.5 3.5 5"></path>
              <path d="M7 10l3 2"></path>
              <path d="M17 10l-3 2"></path>
              <path d="M10 12l-1.5 4"></path>
              <path d="M14 12l1.5 4"></path>
            </svg>
          `
        },
        legs: {
          label: "Ноги",
          sub: "Присед, разгибания, бёдра и объём нижней части",
          icon: `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 4h6"></path>
              <path d="M10 4v6l-2 3"></path>
              <path d="M14 4v6l2 3"></path>
              <path d="M8 13l1 7"></path>
              <path d="M16 13l-1 7"></path>
              <path d="M10 20h-2"></path>
              <path d="M16 20h-2"></path>
            </svg>
          `
        },
        custom: {
          label: "Своя тренировка",
          sub: "Свободный формат без сравнительных шаблонов",
          icon: `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14"></path>
              <path d="M5 12h14"></path>
              <path d="M7 7l10 10"></path>
              <path d="M17 7L7 17"></path>
            </svg>
          `
        }
      };

      const MAIN_TYPES = ["chest", "back", "legs"];
      const HISTORY_TYPE_ORDER = ["chest", "back", "legs", "custom"];
      const tabOrder = ["today", "history", "progress"];

      const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

      const state = {
        tab: "today",
        workouts: [],
        workoutsById: new Map(),
        draft: createDraft(),
        selectedStartType: "",
        exerciseCatalog: {
          sorted: [],
          namesByKey: new Map(),
          searchIndex: []
        },
        search: {
          exerciseQuery: "",
          results: [],
          debounceTimer: 0
        },
        historyUi: {
          activeType: ""
        },
        progressMetric: "weight",
        timer: {
          running: false,
          startedAt: 0,
          raf: 0,
          lastPaintAt: 0
        },
        cloud: {
          enabled: Boolean(tg && tg.CloudStorage),
          syncInFlight: false,
          saveInFlight: false,
          pendingSave: false,
          status: "idle"
        }
      };

      const el = {
        splash: document.getElementById("splash"),
        screenTitle: document.getElementById("screenTitle"),
        screenMeta: document.getElementById("screenMeta"),
        tabsNav: document.getElementById("tabsNav"),
        tabs: [...document.querySelectorAll(".tab")],
        panels: {
          today: document.getElementById("todayPanel"),
          history: document.getElementById("historyPanel"),
          progress: document.getElementById("progressPanel")
        },
        typeChooserBlock: document.getElementById("typeChooserBlock"),
        typeChooser: document.getElementById("typeChooser"),
        startTrainingBtn: document.getElementById("startTrainingBtn"),
        trainingScreen: document.getElementById("trainingScreen"),
        trainingHeadBtn: document.getElementById("trainingHeadBtn"),
        trainingHeadTitle: document.getElementById("trainingHeadTitle"),
        exerciseInputWrap: document.getElementById("exerciseInputWrap"),
        exerciseInput: document.getElementById("exerciseInput"),
        exerciseClearBtn: document.getElementById("exerciseClearBtn"),
        exerciseDropdown: document.getElementById("exerciseDropdown"),
        weightInput: document.getElementById("weightInput"),
        repsInput: document.getElementById("repsInput"),
        prefillSetBtn: document.getElementById("prefillSetBtn"),
        addSetBtn: document.getElementById("addSetBtn"),
        formHint: document.getElementById("formHint"),
        draftList: document.getElementById("draftList"),
        fallbackFinishBtn: document.getElementById("fallbackFinishBtn"),
        historyList: document.getElementById("historyList"),
        progressSelect: document.getElementById("progressSelect"),
        progressResult: document.getElementById("progressResult"),
        progressMetricBtns: [...document.querySelectorAll(".progress-mode-btn")],
        toast: document.getElementById("toast"),
        modal: document.getElementById("modal"),
        modalBody: document.getElementById("modalBody"),
        timerLayer: document.getElementById("timerLayer"),
        timerToggleBtn: document.getElementById("timerToggleBtn"),
        timerReadout: document.getElementById("timerReadout")
      };

      let persistTimer = 0;
      let cloudSaveTimer = 0;
      let cloudPollTimer = 0;
      let cloudResumeTimer = 0;
      let timerViewportRaf = 0;

      function id() {
        return crypto.randomUUID
          ? crypto.randomUUID()
          : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function createDraft() {
        return {
          id: id(),
          status: "draft",
          trainingType: "",
          createdAt: new Date().toISOString(),
          performedAt: new Date().toISOString(),
          exercises: []
        };
      }

      function text(node, value) {
        if (node) node.textContent = value == null ? "" : String(value);
      }

      function make(tag, cls, content) {
        const node = document.createElement(tag);
        if (cls) node.className = cls;
        if (content !== undefined) text(node, content);
        return node;
      }

      function normalizeName(value) {
        return String(value || "").trim().toLowerCase().replace(/ё/g, "е");
      }

      function exerciseKey(value) {
        return normalizeName(value);
      }

      function sameName(a, b) {
        return normalizeName(a) === normalizeName(b);
      }

      function normalizeSearchText(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/ё/g, "е")
          .replace(/[^\p{L}\p{N}\s]+/gu, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function tokenize(value) {
        const normalized = normalizeSearchText(value);
        return normalized ? normalized.split(" ") : [];
      }

      function normalizeNumber(value) {
        return Number(String(value).trim().replace(",", "."));
      }

      function trimNumber(value) {
        const rounded = Math.round(Number(value) * 10) / 10;
        if (Number.isInteger(rounded)) return String(rounded);
        return String(rounded).replace(".", ",");
      }

      function parseSetInput(weightValue, repsValue) {
        const weight = normalizeNumber(weightValue);
        const reps = Number(String(repsValue).trim());

        if (!Number.isFinite(weight) || weight < 0) return null;
        if (!Number.isInteger(reps) || reps <= 0) return null;

        return { weight, reps };
      }

      function safeJsonParse(value, fallback = null) {
        try {
          return value ? JSON.parse(value) : fallback;
        } catch {
          return fallback;
        }
      }

      function safeStorageGet(key) {
        try {
          return localStorage.getItem(key);
        } catch {
          return null;
        }
      }

      function safeStorageSet(key, value) {
        try {
          localStorage.setItem(key, value);
          return true;
        } catch {
          toast("Не удалось сохранить данные");
          return false;
        }
      }

      function getTypeLabel(type) {
        return TRAINING_TYPES[type]?.label || "Без типа";
      }

      function isComparableType(type) {
        return MAIN_TYPES.includes(type);
      }

      function getWorkoutTimestamp(workout) {
        const raw = workout.finishedAt || workout.performedAt || workout.createdAt || 0;
        const ts = new Date(raw).getTime();
        return Number.isFinite(ts) ? ts : 0;
      }

      function getStats(workout) {
        const exercises = workout.exercises.length;
        const sets = workout.exercises.reduce((sum, ex) => sum + ex.sets.length, 0);
        const volume = workout.exercises.reduce(
          (sum, ex) => sum + ex.sets.reduce((x, set) => x + set.weight * set.reps, 0),
          0
        );
        return { exercises, sets, volume };
      }

      function sanitizeWorkout(workout) {
        return {
          id: workout.id || id(),
          trainingType: workout.trainingType || "",
          status: workout.status || "completed",
          createdAt: workout.createdAt || new Date().toISOString(),
          finishedAt: workout.finishedAt,
          performedAt: workout.performedAt || workout.finishedAt || workout.createdAt || new Date().toISOString(),
          exercises: (workout.exercises || [])
            .filter((ex) => ex && ex.name && Array.isArray(ex.sets))
            .map((ex) => ({
              id: ex.id || id(),
              name: String(ex.name).trim(),
              sets: ex.sets
                .map((set) => ({
                  id: set.id || id(),
                  weight: Number(set.weight),
                  reps: Number(set.reps)
                }))
                .filter(
                  (set) =>
                    Number.isFinite(set.weight) &&
                    set.weight >= 0 &&
                    Number.isInteger(set.reps) &&
                    set.reps > 0
                )
            }))
            .filter((ex) => ex.name && ex.sets.length)
        };
      }

      function isValidDraft(value) {
        return value && value.status === "draft" && Array.isArray(value.exercises);
      }

      function toast(message) {
        text(el.toast, message);
        el.toast.style.display = "block";
        el.toast.classList.remove("show");
        requestAnimationFrame(() => el.toast.classList.add("show"));
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => {
          el.toast.style.display = "none";
          el.toast.classList.remove("show");
        }, CONFIG.toastDelay);
      }

      function haptic(type = "light") {
        if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred(type);
      }

      function hideKeyboard() {
        if (document.activeElement && document.activeElement.blur) {
          document.activeElement.blur();
        }
      }

      function showPopup(message) {
        if (tg && tg.showPopup) {
          return new Promise((resolve) =>
            tg.showPopup(
              {
                message,
                buttons: [
                  { id: "cancel", type: "cancel", text: "Отмена" },
                  { id: "ok", type: "default", text: "ОК" }
                ]
              },
              resolve
            )
          );
        }
        return Promise.resolve(confirm(message) ? "ok" : "cancel");
      }

      function buildSnapshot() {
        return {
          updatedAt: Date.now(),
          workouts: state.workouts,
          draft: state.draft
        };
      }

      function markSyncStatus(status) {
        state.cloud.status = status;
        updateMeta();
      }

      function persistNowLocal() {
        const snapshot = buildSnapshot();
        safeStorageSet(CONFIG.localDataKey, JSON.stringify(snapshot));
        safeStorageSet(CONFIG.storageKey, JSON.stringify(state.workouts));
        safeStorageSet(CONFIG.draftKey, JSON.stringify(state.draft));
      }

      function cloudGetItem(key) {
        return new Promise((resolve) => {
          if (!state.cloud.enabled || !tg || !tg.CloudStorage) {
            resolve(null);
            return;
          }
          try {
            tg.CloudStorage.getItem(key, (error, value) => {
              if (error) return resolve(null);
              resolve(value || null);
            });
          } catch {
            resolve(null);
          }
        });
      }

      function cloudSetItem(key, value) {
        return new Promise((resolve) => {
          if (!state.cloud.enabled || !tg || !tg.CloudStorage) {
            resolve(false);
            return;
          }
          try {
            tg.CloudStorage.setItem(key, value, (error) => {
              resolve(!error);
            });
          } catch {
            resolve(false);
          }
        });
      }

      async function persistNowCloud() {
        if (!state.cloud.enabled) return false;
        if (state.cloud.saveInFlight) {
          state.cloud.pendingSave = true;
          return false;
        }

        state.cloud.saveInFlight = true;
        markSyncStatus("syncing");

        const snapshot = buildSnapshot();
        const ok = await cloudSetItem(CONFIG.cloudDataKey, JSON.stringify(snapshot));

        state.cloud.saveInFlight = false;

        if (ok) {
          markSyncStatus("synced");
        } else {
          markSyncStatus("failed");
        }

        if (state.cloud.pendingSave) {
          state.cloud.pendingSave = false;
          persistNowCloud();
        }

        return ok;
      }

      function scheduleCloudPersist(immediate = false) {
        clearTimeout(cloudSaveTimer);
        if (!state.cloud.enabled) return;

        if (immediate) {
          persistNowCloud();
          return;
        }

        markSyncStatus("syncing");
        cloudSaveTimer = setTimeout(() => {
          persistNowCloud();
        }, CONFIG.cloudSaveDebounce);
      }

      function persistCritical() {
        persistNowLocal();
        scheduleCloudPersist(true);
      }

      function schedulePersist(immediate = false) {
        clearTimeout(persistTimer);

        if (immediate) {
          persistNowLocal();
          scheduleCloudPersist(true);
          return;
        }

        persistTimer = setTimeout(() => {
          persistNowLocal();
        }, CONFIG.persistDelay);

        scheduleCloudPersist(false);
      }

      function rebuildIndexes() {
        state.workoutsById = new Map();
        state.exerciseCatalog.namesByKey = new Map();

        state.workouts.forEach((workout) => {
          state.workoutsById.set(workout.id, workout);
          workout.exercises.forEach((ex) => {
            const key = exerciseKey(ex.name);
            if (!state.exerciseCatalog.namesByKey.has(key)) {
              state.exerciseCatalog.namesByKey.set(key, ex.name);
            }
          });
        });

        state.draft.exercises.forEach((ex) => {
          const key = exerciseKey(ex.name);
          if (!state.exerciseCatalog.namesByKey.has(key)) {
            state.exerciseCatalog.namesByKey.set(key, ex.name);
          }
        });

        state.exerciseCatalog.sorted = [...state.exerciseCatalog.namesByKey.values()].sort((a, b) =>
          a.localeCompare(b, "ru")
        );

        state.exerciseCatalog.searchIndex = state.exerciseCatalog.sorted.map((name) => ({
          name,
          normalized: normalizeSearchText(name),
          tokens: tokenize(name)
        }));
      }

      function applySnapshot(snapshot) {
        state.workouts = (snapshot.workouts || [])
          .map(sanitizeWorkout)
          .filter((workout) => workout.exercises.length);

        state.workouts.sort((a, b) => getWorkoutTimestamp(b) - getWorkoutTimestamp(a));

        state.draft = isValidDraft(snapshot.draft)
          ? sanitizeWorkout(snapshot.draft)
          : createDraft();

        state.draft.status = "draft";
        rebuildIndexes();
      }

      async function syncFromCloud(force = false) {
        if (!state.cloud.enabled || state.cloud.syncInFlight) return false;

        state.cloud.syncInFlight = true;
        const raw = await cloudGetItem(CONFIG.cloudDataKey);
        const snapshot = safeJsonParse(raw, null);
        state.cloud.syncInFlight = false;

        if (!snapshot || !Array.isArray(snapshot.workouts) || !snapshot.draft) return false;

        const cloudUpdatedAt = Number(snapshot.updatedAt) || 0;
        const localSnapshot = safeJsonParse(safeStorageGet(CONFIG.localDataKey), buildSnapshot());
        const localUpdatedAt = Number(localSnapshot.updatedAt) || 0;

        if (force || cloudUpdatedAt > localUpdatedAt) {
          applySnapshot(snapshot);
          persistNowLocal();
          renderAll();
          markSyncStatus("synced");
          return true;
        }

        return false;
      }

      async function loadData() {
        const localSnapshot = safeJsonParse(safeStorageGet(CONFIG.localDataKey), null);
        const localWorkouts = safeJsonParse(safeStorageGet(CONFIG.storageKey), []);
        const localDraft = safeJsonParse(safeStorageGet(CONFIG.draftKey), null);

        let finalSnapshot;
        if (localSnapshot && Array.isArray(localSnapshot.workouts) && localSnapshot.draft) {
          finalSnapshot = localSnapshot;
        } else {
          finalSnapshot = {
            updatedAt: Date.now(),
            workouts: Array.isArray(localWorkouts) ? localWorkouts : [],
            draft: isValidDraft(localDraft) ? localDraft : createDraft()
          };
        }

        if (state.cloud.enabled) {
          markSyncStatus("syncing");
          const cloudRaw = await cloudGetItem(CONFIG.cloudDataKey);
          const cloudSnapshot = safeJsonParse(cloudRaw, null);

          const localUpdatedAt = Number(finalSnapshot.updatedAt) || 0;
          const cloudUpdatedAt = Number(cloudSnapshot && cloudSnapshot.updatedAt) || 0;

          if (cloudSnapshot && Array.isArray(cloudSnapshot.workouts) && cloudSnapshot.draft) {
            if (cloudUpdatedAt >= localUpdatedAt) {
              finalSnapshot = cloudSnapshot;
            } else {
              scheduleCloudPersist(true);
            }
            markSyncStatus("synced");
          } else {
            scheduleCloudPersist(true);
          }
        }

        applySnapshot(finalSnapshot);
        persistNowLocal();
        renderAll();
        startCloudPolling();

        setTimeout(() => {
          el.splash.classList.add("hide");
        }, CONFIG.splashDelay);
      }

      function startCloudPolling() {
        stopCloudPolling();
        if (!state.cloud.enabled) return;

        cloudPollTimer = setInterval(() => {
          if (document.visibilityState !== "visible") return;
          syncFromCloud(false);
        }, CONFIG.cloudPollInterval);
      }

      function stopCloudPolling() {
        clearInterval(cloudPollTimer);
        cloudPollTimer = 0;
      }

      function scheduleCloudResumeSync() {
        clearTimeout(cloudResumeTimer);
        if (!state.cloud.enabled) return;
        cloudResumeTimer = setTimeout(() => {
          syncFromCloud(false);
        }, CONFIG.cloudResumeDebounce);
      }

      function isTrainingStarted() {
        return Boolean(state.draft.trainingType);
      }

      function resetHistorySelection() {
        state.historyUi.activeType = "";
      }

      function renderAll() {
        renderShell();
        renderCurrentPanel();
        scheduleTimerViewportSync();
      }

      function renderShell() {
        updateMeta();
        renderTabs();
        renderTodayMode();
        updateMainActions();
      }

      function renderCurrentPanel() {
        if (state.tab === "today") {
          renderTodayMode();
          renderDraft();
          updateForm();
          renderExerciseSearchResults(true);
          return;
        }

        if (state.tab === "history") {
          renderHistory();
          return;
        }

        renderProgress();
      }

      function updateMeta() {
        text(
          el.screenTitle,
          {
            today: "Трена",
            history: "История",
            progress: "Прогресс"
          }[state.tab]
        );

        if (state.tab === "today") {
          if (!isTrainingStarted()) {
            text(el.screenMeta, "Выбери тип тренировки и начни");
          } else {
            const stats = getStats(state.draft);
            text(
              el.screenMeta,
              `${getTypeLabel(state.draft.trainingType)} · ${stats.exercises} упражнений · ${stats.sets} подходов · ${Math.round(stats.volume)} кг`
            );
          }
        } else if (state.tab === "history") {
          if (state.historyUi.activeType) {
            text(el.screenMeta, getTypeLabel(state.historyUi.activeType));
          } else {
            text(el.screenMeta, "Все типы тренировок");
          }
        } else {
          let syncText = "Локально";
          if (state.cloud.enabled) {
            if (state.cloud.status === "syncing") syncText = "Синхронизация...";
            else if (state.cloud.status === "synced") syncText = "Облако синхронизировано";
            else if (state.cloud.status === "failed") syncText = "Ошибка синхронизации";
            else syncText = "Облако подключено";
          }
          text(el.screenMeta, syncText);
        }
      }

      function renderTabs() {
        el.tabsNav.dataset.active = String(tabOrder.indexOf(state.tab));
        el.tabs.forEach((tab) => {
          const active = tab.dataset.tab === state.tab;
          tab.classList.toggle("active", active);
          el.panels[tab.dataset.tab].classList.toggle("active", active);
        });
      }

      function renderTypeChooser() {
        el.typeChooser.replaceChildren();

        HISTORY_TYPE_ORDER.forEach((type) => {
          const item = TRAINING_TYPES[type];
          const btn = make("button", `premium-type${state.selectedStartType === type ? " active" : ""}`);
          btn.type = "button";
          btn.dataset.type = type;
          btn.innerHTML = `
            <span class="premium-icon">${item.icon}</span>
            <span class="premium-copy">
              <span class="premium-title">${item.label}</span>
              <span class="premium-sub">${item.sub}</span>
            </span>
            <span class="premium-check">✓</span>
          `;
          btn.addEventListener("click", () => {
            state.selectedStartType = type;
            renderTodayMode();
            haptic();
          });
          el.typeChooser.appendChild(btn);
        });

        el.startTrainingBtn.disabled = !state.selectedStartType;
      }

      function renderTodayMode() {
        const started = isTrainingStarted();

        el.typeChooserBlock.style.display = started ? "none" : "block";
        el.trainingScreen.style.display = started ? "block" : "none";

        if (!started) {
          renderTypeChooser();
        } else {
          text(el.trainingHeadTitle, getTypeLabel(state.draft.trainingType));
        }
      }

      function updateExerciseClear() {
        const hasValue = Boolean(el.exerciseInput.value.trim());
        el.exerciseInputWrap.classList.toggle("has-value", hasValue);
      }

      function getCurrentExerciseDraftCount(name) {
        const ex = state.draft.exercises.find((item) => sameName(item.name, name));
        return ex ? ex.sets.length : 0;
      }

      function getTemplateReference(exerciseName) {
        const type = state.draft.trainingType;
        if (!exerciseName || !type || !isComparableType(type)) return null;

        const key = exerciseKey(exerciseName);

        for (const workout of state.workouts) {
          if (workout.trainingType !== type) continue;
          const ex = workout.exercises.find((item) => exerciseKey(item.name) === key);
          if (ex) {
            return { workout, exercise: ex };
          }
        }

        return null;
      }

      function getPrefillSetForCurrentExercise(name) {
        if (!name || !isComparableType(state.draft.trainingType)) return null;
        const template = getTemplateReference(name);
        if (!template) return null;

        const currentCount = getCurrentExerciseDraftCount(name);
        return template.exercise.sets[currentCount] || null;
      }

      function updatePlaceholdersByExercise() {
        const name = el.exerciseInput.value.trim();

        if (!name || !isComparableType(state.draft.trainingType)) {
          el.weightInput.placeholder = "Вес, кг";
          el.repsInput.placeholder = "Повторы";
          return;
        }

        const prefill = getPrefillSetForCurrentExercise(name);
        if (!prefill) {
          el.weightInput.placeholder = "Вес, кг";
          el.repsInput.placeholder = "Повторы";
          return;
        }

        el.weightInput.placeholder = `Вес, кг · напр. ${trimNumber(prefill.weight)}`;
        el.repsInput.placeholder = `Повторы · напр. ${prefill.reps}`;
      }

      function updateForm() {
        const name = el.exerciseInput.value.trim();
        const parsed = parseSetInput(el.weightInput.value, el.repsInput.value);
        const valid = Boolean(name) && Boolean(parsed);

        el.addSetBtn.disabled = !valid;
        el.prefillSetBtn.disabled = !getPrefillSetForCurrentExercise(name);

        updateExerciseClear();
        updatePlaceholdersByExercise();

        text(
          el.formHint,
          valid ? "Готово к добавлению" : "Выбери упражнение, вес и повторы"
        );
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function highlightTextByTokens(textValue, queryTokens) {
        const textValueSafe = String(textValue || "");
        if (!queryTokens || !queryTokens.length) return escapeHtml(textValueSafe);

        const normalized = textValueSafe.toLowerCase().replace(/ё/g, "е");
        const ranges = [];

        queryTokens
          .slice()
          .sort((a, b) => b.length - a.length)
          .forEach((token) => {
            let from = 0;
            while (from < normalized.length) {
              const index = normalized.indexOf(token, from);
              if (index < 0) break;
              ranges.push([index, index + token.length]);
              from = index + token.length;
            }
          });

        if (!ranges.length) return escapeHtml(textValueSafe);

        ranges.sort((a, b) => a[0] - b[0]);
        const merged = [];
        for (const range of ranges) {
          const last = merged[merged.length - 1];
          if (!last || range[0] > last[1]) {
            merged.push(range.slice());
          } else {
            last[1] = Math.max(last[1], range[1]);
          }
        }

        let result = "";
        let cursor = 0;
        for (const [start, end] of merged) {
          result += escapeHtml(textValueSafe.slice(cursor, start));
          result += `<span class="history-highlight">${escapeHtml(textValueSafe.slice(start, end))}</span>`;
          cursor = end;
        }
        result += escapeHtml(textValueSafe.slice(cursor));
        return result;
      }

      function scoreExerciseRecord(record, queryTokens, normalizedQuery) {
        if (!normalizedQuery) return 0;
        if (record.normalized === normalizedQuery) return 1000;
        if (record.normalized.startsWith(normalizedQuery)) return 850;
        if (record.normalized.includes(` ${normalizedQuery}`)) return 740;
        if (record.normalized.includes(normalizedQuery)) return 620;

        let score = 0;
        for (const token of queryTokens) {
          if (record.normalized.startsWith(token)) score += 120;
          else if (record.normalized.includes(` ${token}`)) score += 90;
          else if (record.normalized.includes(token)) score += 50;
          else return 0;
        }
        return score;
      }

      function renderExerciseSearchResults(force = false) {
        if (!isTrainingStarted()) {
          closeExerciseDropdown();
          return;
        }

        const query = el.exerciseInput.value.trim();
        const normalizedQuery = normalizeSearchText(query);
        const queryTokens = tokenize(query);

        let nextResults;
        if (!normalizedQuery) {
          nextResults = state.exerciseCatalog.searchIndex
            .slice(0, CONFIG.searchMaxResults)
            .map((item) => item.name);
        } else {
          nextResults = state.exerciseCatalog.searchIndex
            .map((record) => ({
              name: record.name,
              score: scoreExerciseRecord(record, queryTokens, normalizedQuery)
            }))
            .filter((item) => item.score > 0)
            .sort((a, b) => {
              if (b.score !== a.score) return b.score - a.score;
              return a.name.localeCompare(b.name, "ru");
            })
            .slice(0, CONFIG.searchMaxResults)
            .map((item) => item.name);
        }

        if (
          !force &&
          state.search.exerciseQuery === query &&
          state.search.results.length === nextResults.length &&
          state.search.results.every((value, index) => value === nextResults[index])
        ) {
          return;
        }

        state.search.exerciseQuery = query;
        state.search.results = nextResults;
        el.exerciseDropdown.replaceChildren();

        if (!document.activeElement || document.activeElement !== el.exerciseInput) {
          closeExerciseDropdown();
          return;
        }

        if (!nextResults.length) {
          closeExerciseDropdown();
          return;
        }

        const fragment = document.createDocumentFragment();
        nextResults.forEach((name) => {
          const btn = make("button", "search-option");
          btn.type = "button";

          const template = getTemplateReference(name);
          btn.innerHTML = `
            <div class="search-main">${highlightTextByTokens(name, queryTokens)}</div>
            <div class="search-secondary">${
              template
                ? `Есть прошлое выполнение в типе «${getTypeLabel(state.draft.trainingType)}»`
                : "Есть в общей истории упражнений"
            }</div>
          `;
          btn.addEventListener("click", () => selectExerciseSuggestion(name));
          fragment.appendChild(btn);
        });

        el.exerciseDropdown.appendChild(fragment);
        el.exerciseDropdown.classList.add("open");
      }

      function closeExerciseDropdown() {
        el.exerciseDropdown.classList.remove("open");
      }

      function scheduleExerciseSearchRender() {
        clearTimeout(state.search.debounceTimer);
        state.search.debounceTimer = setTimeout(() => {
          renderExerciseSearchResults();
        }, CONFIG.searchDebounce);
      }

      function fillSetPrefillForCurrentExercise() {
        const exerciseName = el.exerciseInput.value.trim();
        const prefill = getPrefillSetForCurrentExercise(exerciseName);
        if (!prefill) return false;

        el.weightInput.value = prefill.weight;
        el.repsInput.value = prefill.reps;
        updateForm();
        return true;
      }

      function selectExerciseSuggestion(name) {
        el.exerciseInput.value = name;
        closeExerciseDropdown();
        updatePlaceholdersByExercise();
        fillSetPrefillForCurrentExercise();
        updateForm();
        haptic();
      }

      function clearExerciseInput() {
        el.exerciseInput.value = "";
        el.weightInput.value = "";
        el.repsInput.value = "";
        updateForm();
        el.exerciseInput.focus();
      }

      function addExerciseNameToIndex(name) {
        const clean = String(name || "").trim();
        if (!clean) return;
        const key = exerciseKey(clean);
        if (!state.exerciseCatalog.namesByKey.has(key)) {
          state.exerciseCatalog.namesByKey.set(key, clean);
          rebuildIndexes();
        }
      }

      function getOrCreateDraftExercise(name) {
        let ex = state.draft.exercises.find((item) => sameName(item.name, name));
        if (!ex) {
          ex = { id: id(), name, sets: [] };
          state.draft.exercises.push(ex);
          addExerciseNameToIndex(name);
        }
        return ex;
      }

      function addSet() {
        const name = el.exerciseInput.value.trim();
        const parsed = parseSetInput(el.weightInput.value, el.repsInput.value);

        if (!name || !parsed) {
          toast("Проверь вес и повторы");
          return;
        }

        getOrCreateDraftExercise(name).sets.push({ id: id(), ...parsed });

        el.weightInput.value = "";
        el.repsInput.value = "";
        updatePlaceholdersByExercise();
        hideKeyboard();
        haptic();

        persistCritical();
        renderDraft();
        updateForm();

        el.draftList.classList.remove("flash");
        requestAnimationFrame(() => el.draftList.classList.add("flash"));
      }

      function describeSetDelta(currentSet, previousSet) {
        if (!previousSet) {
          return {
            status: "equal",
            label: "Новый подход",
            compareText: "Раньше такого подхода не было"
          };
        }

        const weightDiff = currentSet.weight - previousSet.weight;
        const repsDiff = currentSet.reps - previousSet.reps;

        if (weightDiff > 0 || (weightDiff === 0 && repsDiff > 0)) {
          const pieces = [];
          if (weightDiff !== 0) pieces.push(`${weightDiff > 0 ? "+" : ""}${trimNumber(weightDiff)} кг`);
          if (repsDiff !== 0) pieces.push(`${repsDiff > 0 ? "+" : ""}${repsDiff} повт.`);
          return {
            status: "progress",
            label: "Прогресс",
            compareText: pieces.length ? pieces.join(" · ") : "Лучше прошлого раза"
          };
        }

        if (weightDiff === 0 && repsDiff === 0) {
          return {
            status: "equal",
            label: "Ровно",
            compareText: "Без изменений"
          };
        }

        const pieces = [];
        if (weightDiff !== 0) pieces.push(`${weightDiff > 0 ? "+" : ""}${trimNumber(weightDiff)} кг`);
        if (repsDiff !== 0) pieces.push(`${repsDiff > 0 ? "+" : ""}${repsDiff} повт.`);
        return {
          status: "regress",
          label: "Регресс",
          compareText: pieces.length ? pieces.join(" · ") : "Ниже прошлого раза"
        };
      }

      function renderDraft() {
        el.draftList.replaceChildren();

        if (!isTrainingStarted()) {
          el.draftList.appendChild(make("div", "empty", "Сначала начни тренировку"));
          return;
        }

        if (!state.draft.exercises.length) {
          el.draftList.appendChild(make("div", "empty", "Пока нет подходов"));
          return;
        }

        const fragment = document.createDocumentFragment();

        state.draft.exercises.forEach((ex) => {
          const box = make("div", "exercise");
          const volume = ex.sets.reduce((sum, set) => sum + set.weight * set.reps, 0);

          });

          fragment.appendChild(box);
        });

        el.draftList.appendChild(fragment);

      function moveOrUpdateSet(workout, exId, setId, newName, weight, reps) {
        const oldExercise = workout.exercises.find((ex) => ex.id === exId);
        if (!oldExercise) return;

        const index = oldExercise.sets.findIndex((set) => set.id === setId);
        if (index < 0) return;

        const updated = { ...oldExercise.sets[index], weight, reps };
        oldExercise.sets.splice(index, 1);

        let target = workout.exercises.find((ex) => sameName(ex.name, newName));
        if (!target) {
          target = { id: id(), name: newName, sets: [] };
          workout.exercises.push(target);
        }

        target.sets.push(updated);

        if (!oldExercise.sets.length) {
          workout.exercises = workout.exercises.filter((ex) => ex.id !== oldExercise.id);
        }

        rebuildIndexes();
        haptic();
        persistCritical();
        renderDraft();
        updateForm();
        toast("Подход обновлен");
      }

        const answer = await showPopup(`Завершить тренировку "${getTypeLabel(state.draft.trainingType)}"?`);

      function formatDateTitle(iso) {
        const date = new Date(iso);
        const now = new Date();

        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const day = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diff = Math.round((today - day) / 86400000);

        if (diff === 0) return "Сегодня";
        if (diff === 1) return "Вчера";

        return date.toLocaleDateString("ru-RU", {
          day: "numeric",
          month: "long",
          year: "numeric"
        });
      }

      function formatDateWithWeekday(iso) {
        const date = new Date(iso);
        const now = new Date();

        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const day = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diff = Math.round((today - day) / 86400000);

        const weekday = date.toLocaleDateString("ru-RU", { weekday: "long" });
        if (diff === 0) return `сегодня, ${weekday}`;

        return `${weekday}, ${date.toLocaleDateString("ru-RU")}`;
      }

      function formatDateInputValue(iso) {
        const d = new Date(iso);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
      }
